    if(childTimers.current[pid]) clearTimeout(childTimers.current[pid]);
    childTimers.current[pid]=setTimeout(()=>childPush(pid),1500);
  }
  // Veilig opslaan: eerst de cloud ophalen, SAMENVOEGEN met lokaal (hoogste wint), dan pas terugschrijven.
  // Zo kan een toestel de centrale stand nooit verlagen/overschrijven → scores convergeren i.p.v. verdwijnen.
  async function childPush(pid){
    const s=storeRef.current; const acc=accVan(s,pid); if(!acc.code||!acc.pw) return;
    const localProg=normalizeProg(s.prog[pid]);
    try{
      const r=await cloudCall('oefenapp_load',{p_household:acc.code,p_pin:acc.pw});
      const merged=mergeProg(localProg, (r&&r.data&&r.data.prog)||{});
      setStore(prev=>{ const n={...prev, prog:{...prev.prog,[pid]:merged}}; saveStore(n); return n; });
      await cloudCall('oefenapp_save',{p_household:acc.code,p_pin:acc.pw,p_data:{prog:normalizeProg(merged)}});
    }catch(e){
      // account bestaat waarschijnlijk nog niet → aanmaken met de lokale stand
      try{ await cloudCall('oefenapp_register',{p_household:acc.code,p_pin:acc.pw,p_data:{prog:localProg}}); }catch(e2){}
    }
  }
  // Haal stilletjes de nieuwste stand van ALLE kinderen op en voeg samen (voor de landingspagina/scorebord op elk toestel)
  async function pullAllChildren(){
    for(const pid of Object.keys(PROFILES)){
      const acc=accVan(storeRef.current,pid);
      try{ const r=await cloudCall('oefenapp_load',{p_household:acc.code,p_pin:acc.pw});
        if(r&&r.data&&r.data.prog){ setStore(prev=>{ const n={...prev, prog:{...prev.prog,[pid]:mergeProg(prev.prog[pid], r.data.prog)}}; saveStore(n); return n; }); }
      }catch(e){}
    }
  }
  async function childRegister(pid, code, pw){   // maak een nieuw account voor dit kind
    code=String(code||'').trim().toLowerCase();
    await cloudCall('oefenapp_register',{p_household:code,p_pin:pw,p_data:{prog:normalizeProg(storeRef.current.prog[pid])}});
    persist(prev=>({...prev, kidacc:{...(prev.kidacc||{}), [pid]:{code,pw}}}));
    return true;
  }
  async function childLogin(pid, code, pw){       // log in met naam + wachtwoord; haal scores op (of maak account aan)
    code=String(code||'').trim().toLowerCase();
    let r;
    try{ r=await cloudCall('oefenapp_load',{p_household:code,p_pin:pw}); }
    catch(e){
      // account bestaat waarschijnlijk nog niet → probeer aan te maken met de huidige scores.
      // Lukt dat, dan is het account nieuw; lukt het niet (bestaat al met ander wachtwoord), dan is het een echte fout.
      try{
        await cloudCall('oefenapp_register',{p_household:code,p_pin:pw,p_data:{prog:normalizeProg(storeRef.current.prog[pid])}});
        persist(prev=>({...prev, kidacc:{...(prev.kidacc||{}), [pid]:{code,pw}}}));
        return true;
      }catch(e2){ throw e; }                           // onjuist wachtwoord of geen verbinding
    }
    const cloudProg=(r.data&&r.data.prog)||{};        // gevonden → samenvoegen (geen verlies)
    let snap=null;
    setStore(prev=>{
      const merged={...prev, prog:{...prev.prog, [pid]:mergeProg(prev.prog[pid], cloudProg)}, kidacc:{...(prev.kidacc||{}), [pid]:{code,pw}}};
      saveStore(merged); snap=merged; return merged;
    });
    if(snap){ try{ await cloudCall('oefenapp_save',{p_household:code,p_pin:pw,p_data:{prog:normalizeProg(snap.prog[pid])}}); }catch(e){} }
    return true;
  }
  async function cloudMerge(){   // haal op, voeg samen, en zet terug → zelfde score overal
    const c=store.cloud; if(!c||!c.household||!c.pin){ setCloudStatus('Koppel eerst een familiecode.'); return; }
    setCloudStatus('Bezig met samenvoegen…');
    const r=await cloudCall('oefenapp_load',{p_household:c.household,p_pin:c.pin});
    let snap=null;
    setStore(prev=>{ const merged=mergeStore(prev, r.data||{}); merged.cloud={...prev.cloud, lastServer:r.updated_at, lastSync:Date.now()};
      for(const pid of Object.keys(PROFILES)) merged.prog[pid]=normalizeProg(merged.prog[pid]); saveStore(merged); snap=merged; return merged; });
    if(snap) await cloudPush(snap);
    setCloudStatus('Alles samengevoegd — elk toestel toont nu dezelfde score ✓');
  }

  // wedstrijd-link geopend (#w=CODE)? → toon de wedstrijd voor de vriend
  useEffect(()=>{
    try{ const m=(location.hash||'').match(/[#&]w=([a-z0-9]+)/i); if(m){ setWedstrijdCode(m[1]); setView('wedstrijd-vriend'); } }catch(e){}
  },[]);
  // bij openen: haal stilletjes de nieuwste stand van alle kind-accounts op → scorebord op elk toestel gelijk
  const pulledKidsOnce=useRef(false);
  useEffect(()=>{ if(pulledKidsOnce.current) return; pulledKidsOnce.current=true; pullAllChildren(); },[]);
  // 🏆 Toernooi-van-de-week: de winnaar van de afgelopen week krijgt € 10 (eenmalig per week).
  // We houden een 'peak'-momentopname per week bij; als de week omslaat betalen we de koploper uit.
  useEffect(()=>{
    const nu=weekKey();
    persist(prev=>{
      const huidige={};
      for(const pid of Object.keys(PROFILES)){ const p=normalizeProg(prev.prog[pid]); huidige[pid]=(p.weekKey===nu?(p.weekPunten||0):0); }
      const stand=prev.toernooiStand;
      if(stand && stand.week && stand.week!==nu){
        const entries=Object.entries(stand.punten||{}).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
        let prog2=prev.prog, winnaar=null;
        if(entries.length){ const winPid=entries[0][0]; const wp=normalizeProg(prev.prog[winPid]);
          wp.bonus=halfRond((wp.bonus||0)+BELONING.toernooiBonus);
          prog2={...prev.prog,[winPid]:wp}; winnaar={pid:winPid, week:stand.week, bedrag:BELONING.toernooiBonus};
          setTimeout(()=>scheduleChildPush(winPid),60);
        }
        return {...prev, prog:prog2, toernooiStand:{week:nu,punten:huidige}, toernooiWinnaar:winnaar};
      }
      const merged={};
      for(const pid of Object.keys(PROFILES)) merged[pid]=Math.max((stand&&stand.punten&&stand.punten[pid])||0, huidige[pid]||0);
      return {...prev, toernooiStand:{week:nu,punten:merged}};
    });
  },[]);
  // bij openen: als er een familiecode is, haal stilletjes de nieuwste resultaten op
  useEffect(()=>{
    if(pulledOnce.current) return; pulledOnce.current=true;
    const c=store.cloud;
    if(c&&c.household&&c.pin){
      cloudCall('oefenapp_load',{p_household:c.household,p_pin:c.pin}).then(r=>{
        if(r&&r.data){
          let snap=null;
          setStore(prev=>{
            const merged=mergeStore(prev, r.data);   // altijd samenvoegen → zelfde score op elk toestel
            merged.cloud={...prev.cloud, lastServer:r.updated_at, lastSync:Date.now()};
            merged.custom=merged.custom||[]; merged.pin=merged.pin||'1234'; merged.prog=merged.prog||{};
            for(const pid of Object.keys(PROFILES)) merged.prog[pid]=normalizeProg(merged.prog[pid]);
            saveStore(merged); snap=merged; return merged;
          });
          if(snap) cloudPush(snap);
          setCloudStatus('Samengevoegd met de cloud ✓');
        }
      }).catch(()=>{});
    }
  },[]);

  const allEx=useMemo(()=>[...SEED, ...TEMPLATES, ...store.custom],[store.custom]);

  // kind kiest profiel → eerst wachtwoord (standaard 'Bennaclan')
  function kiesProfiel(pid){ setPendingPid(pid); setView('kidlogin'); }
  // dagstreak + dagdoel bijwerken bij starten (na wachtwoord)
  function openProfile(pid){
    persist(prev=>{
      const pr=normalizeProg(prev.prog[pid]);
      const today=todayStr();
      if(pr.lastDay!==today){
        pr.dagstreak = (pr.lastDay===yesterdayStr())? (pr.dagstreak||0)+1 : 1;
        pr.lastDay=today; pr.todayCount=0;        // nieuwe dag → dagdoel-teller reset
      }
      return {...prev, prog:{...prev.prog,[pid]:pr}};
    });
    setProfile(pid); setVak(PROFILES[pid].vakken[0]); setView('hub');
  }

  function setGoal(pid, g){
    persist(prev=>{const pr=normalizeProg(prev.prog[pid]); pr.goal=g; return {...prev, prog:{...prev.prog,[pid]:pr}};});
    scheduleChildPush(pid);
  }
  function setNiveau(pid, n){
    persist(prev=>{const pr=normalizeProg(prev.prog[pid]); pr.niveau=n; if(n!=='auto'){pr.autoLvl=n;} pr.correctRun=0; return {...prev, prog:{...prev.prog,[pid]:pr}};});
    scheduleChildPush(pid);
  }
  const geluid = store.geluid!==false;
  function toggleGeluid(){ persist(prev=>({...prev, geluid: !(prev.geluid!==false)})); }
  const voorlezen = store.voorlezen!==false;
  function toggleVoorlezen(){ if(voorlezen) stopVoorlezen(); persist(prev=>({...prev, voorlezen: !(prev.voorlezen!==false)})); }
  function setWeekbudget(pid, val){
    persist(prev=>{const pr=normalizeProg(prev.prog[pid]); pr.weekbudget=Math.max(0,Math.min(50,val)); return {...prev, prog:{...prev.prog,[pid]:pr}};});
    scheduleChildPush(pid);
  }
  function markeerBetaald(pid){
    persist(prev=>{
      const pr=normalizeProg(prev.prog[pid]); const vandaag=todayStr();
      // betaal het totale openstaande bedrag (totaal verdiend − totaal uitbetaald), incl. toernooibonus
      const open=openstaand(pr);
      if(open<=0) return prev;
      pr.betalingen=[...(pr.betalingen||[]), {d:vandaag, bedrag:open}];
      pr.betaaldOp=vandaag;
      return {...prev, prog:{...prev.prog,[pid]:pr}};
    });
    scheduleChildPush(pid);
  }
  function corrigeerVerdiend(pid, delta){        // ouder past de weekverdiensten handmatig bij (+/−)
    persist(prev=>{ const pr=normalizeProg(prev.prog[pid]);
      pr.verdiendBij=halfRond((pr.verdiendBij||0)+delta);
      return {...prev, prog:{...prev.prog,[pid]:pr}}; });
    scheduleChildPush(pid);
  }
  function resetAlles(){
    persist(prev=>{ const prog={}; for(const pid of Object.keys(PROFILES)) prog[pid]=blankProg();
      // ook de oude hele-gezin-koppeling loskoppelen, zodat oude scores niet terugkomen via 'hoogste wint'
      const n={...prev, prog, games:{}, cloud:{household:'',pin:'',lastServer:null,lastSync:null}}; saveStore(n); return n; });
    // blank naar elk kind-account zetten (overschrijven of aanmaken)
    setTimeout(()=>{ for(const pid of Object.keys(PROFILES)){ const a=accVan(storeRef.current,pid);
      cloudCall('oefenapp_save',{p_household:a.code,p_pin:a.pw,p_data:{prog:normalizeProg(blankProg())}})
        .catch(()=>cloudCall('oefenapp_register',{p_household:a.code,p_pin:a.pw,p_data:{prog:normalizeProg(blankProg())}}).catch(()=>{})); } }, 250);
  }
  function setGameScore(spel, score, lager){
    persist(prev=>{const g={...(prev.games||{})}; const cur=g[spel];
      if(cur===undefined || (lager? score<cur : score>cur)) g[spel]=score; return {...prev, games:g};});
  }
  function setKidPw(pid, pw){
    persist(prev=>({...prev, kidpw:{...(prev.kidpw||{}), [pid]: String(pw||'').trim()||STANDAARD_WACHTWOORD}}));
  }
  const cloudApi={status:cloudStatus, register:cloudRegister, login:cloudLogin, sync:()=>cloudPush(), merge:cloudMerge, disconnect:cloudDisconnect, setStatus:setCloudStatus};

  // resultaat verwerken: punten + Leitner-doosje + dagdoel + foutenschrift
  function recordResult(pid, card, inst, correct, usedHint){
    persist(prev=>{
      const pr=normalizeProg(prev.prog[pid]);
      pr.cards={...pr.cards}; pr.solved={...pr.solved}; pr.foutLog=[...(pr.foutLog||[])];
      const wasMastered=isMastered(pr,card.id);
      const c={...(pr.cards[card.id]||{box:0,ok:0,wrong:0,last:0})};
      // eerlijke dagteller (voor zakgeld): reset bij nieuwe dag
      const vandaag=todayStr();
      if(!pr.dag||pr.dag.d!==vandaag) pr.dag={d:vandaag,goed:0,sterk:0,sterkPunten:0,fout:0,sterkIds:[]};
      else pr.dag={...pr.dag, sterkIds:[...(pr.dag.sterkIds||[])]};
      const lvl=(inst&&inst.lvl)||card.lvl||1;                    // moeilijkheidsgraad van deze vraag
      // wekelijks toernooi: punten resetten bij een nieuwe week
      const wk=weekKey(); if(pr.weekKey!==wk){ pr.weekKey=wk; pr.weekPunten=0; }
      if(correct){
        const gain=(wasMastered?3:(usedHint?5:10));
        pr.punten=(pr.punten||0)+gain;
        pr.weekPunten=(pr.weekPunten||0)+gain;
        pr.streak=(pr.streak||0)+1;
        pr.todayCount=(pr.todayCount||0)+1;
        pr.dag.goed++;
        // 'sterk' telt maar één keer per kaart per dag; punten schalen met het niveau (moeilijker = meer waard)
        if(!wasMastered && !usedHint && !pr.dag.sterkIds.includes(card.id)){
          pr.dag.sterk++; pr.dag.sterkPunten=(pr.dag.sterkPunten||0)+(NIVEAUGEWICHT[lvl]||1); pr.dag.sterkIds.push(card.id);
        }
        c.ok=(c.ok||0)+1; c.box=Math.min(5,(c.box||0)+1);
        pr.solved[card.id]={ok:((pr.solved[card.id]||{}).ok||0)+1};
        if(c.box>=4) pr.foutLog=pr.foutLog.filter(f=>f.id!==card.id);   // beheerst → uit foutenschrift
      }else{
        pr.streak=0; c.wrong=(c.wrong||0)+1; c.box=1; pr.dag.fout++;
        const entry={id:card.id,t:card.t,v:card.v,q:inst.q,a:inst.a,u:inst.u||'',when:Date.now()};
        pr.foutLog=[entry, ...pr.foutLog.filter(f=>f.id!==card.id)].slice(0,40);
      }
      // automatisch niveau: 3 goed op rij → een tikje moeilijker; fout → een tikje makkelijker
      if(correct){ pr.correctRun=(pr.correctRun||0)+1; if(pr.correctRun>=3 && (pr.autoLvl||1)<3){pr.autoLvl=(pr.autoLvl||1)+1; pr.correctRun=0;} }
      else { pr.correctRun=0; if((pr.autoLvl||1)>1) pr.autoLvl=(pr.autoLvl||1)-1; }
      c.last=Date.now(); pr.cards[card.id]=c;
      crediteerMissie(pr);                        // dagmissie-bonus + streak
      pr.badges=[...(pr.badges||[])];
      BADGES.forEach(b=>{if(!pr.badges.includes(b.id)&&b.test(pr)) pr.badges.push(b.id);});
      upsertVerdiend(pr);                          // verdiensten persistent bijhouden (telt per week, synct online)
      return {...prev, prog:{...prev.prog,[pid]:pr}};
    });
    scheduleChildPush(pid);
  }

  // toets-uitslag bewaren (voor 'klaar voor toets'-bonus bij de beloning)
  function recordToets(pid, isProef, pct){
    persist(prev=>{
      const pr=normalizeProg(prev.prog[pid]); const vandaag=todayStr();
      const td=(pr.toetsDag&&pr.toetsDag.d===vandaag)?{...pr.toetsDag}:{d:vandaag,oefen:0,proef:0};
      if(isProef) td.proef=Math.max(td.proef||0,pct); else td.oefen=Math.max(td.oefen||0,pct);
      pr.toetsDag=td;
      const wk=weekKey(); if(pr.weekKey!==wk){ pr.weekKey=wk; pr.weekPunten=0; }
      crediteerMissie(pr);                        // toets afgerond kan de dagmissie voltooien
      upsertVerdiend(pr);                          // toetsbonus telt mee in de weekverdiensten
      return {...prev, prog:{...prev.prog,[pid]:pr}};
    });
    scheduleChildPush(pid);
  }
  const prog = profile? normalizeProg(store.prog[profile]) : null;
  const goTopic=(t,jr)=>{setTopic(t);setJaar(jr||'nu');setView('practice');};

  return (
    <div>
      {view==='home' && <Home onPick={kiesProfiel} store={store} allEx={allEx} onAuthor={()=>setView('author')} onFormules={()=>setView('formules')} onLeertips={()=>setView('leertips')} onSpellen={()=>setView('spellen')} spelNaDoel={store.spelNaDoel===true} geluid={geluid} onToggleGeluid={toggleGeluid} voorlezen={voorlezen} onToggleVoorlezen={toggleVoorlezen}/>}
      {view==='kidlogin' && <KidLogin pid={pendingPid} store={store} onLogin={childLogin} onBack={()=>{setPendingPid(null);setView('home');}} onOk={()=>{const p=pendingPid;setPendingPid(null);openProfile(p);}}/>}
      {view==='spellen' && <Spellen store={store} onBack={()=>setView('home')} onScore={setGameScore} geluid={geluid}/>}
      {view==='wedstrijd-maak' && <WedstrijdMaken profile={profile} allEx={allEx} onBack={()=>setView('hub')} geluid={geluid}/>}
      {view==='wedstrijd-vriend' && <WedstrijdSpelen code={wedstrijdCode} geluid={geluid} onBack={()=>{try{history.replaceState(null,'',location.href.split('#')[0]);}catch(e){} setWedstrijdCode(null); setView('home');}}/>}
      {view==='formules' && <FormulesView onBack={()=>setView('home')}/>}
      {view==='leertips' && <LeertipsView onBack={()=>setView('home')}/>}
      {view==='hub' && <Hub profile={profile} prog={prog} vak={vak} setVak={setVak} allEx={allEx}
        onBack={()=>setView('home')} onTopic={goTopic} onSetGoal={(g)=>setGoal(profile,g)} onSetNiveau={(n)=>setNiveau(profile,n)}
        wedstrijdAan={store.wedstrijdAan!==false} onWedstrijd={()=>setView('wedstrijd-maak')}
        onSpellen={()=>setView('spellen')} spelNaDoel={store.spelNaDoel===true}
        weektaakItems={(store.weektaak&&store.weektaak[profile]&&store.weektaak[profile].items)||[]}/>}
      {view==='practice' && <Practice profile={profile} vak={vak} topic={topic} jaar={jaar} allEx={allEx}
        onBack={()=>setView('hub')} onResult={recordResult} onToets={recordToets} prog={prog} onTopic={goTopic} geluid={geluid} voorlezen={voorlezen}/>}
      {view==='author' && <Author store={store} persist={persist} onBack={()=>setView('home')}
        onSetWeekbudget={setWeekbudget} onMarkeerBetaald={markeerBetaald} onCorrigeerVerdiend={corrigeerVerdiend} cloud={cloudApi} onSetKidPw={setKidPw}
        accApi={{register:childRegister, login:childLogin, pullAll:pullAllChildren}} onReset={resetAlles}/>}
    </div>
  );
}

/* ---------- HOME = levendige familie-landingspagina ---------- */
function Home({onPick,store,allEx,onAuthor,onFormules,onLeertips,onSpellen,spelNaDoel,geluid,onToggleGeluid,voorlezen,onToggleVoorlezen}){
  const tip = TIP_VAN_DE_DAG[Math.floor(Date.now()/86400000) % TIP_VAN_DE_DAG.length];
  const kinderen = Object.entries(PROFILES).map(([id,p])=>{
    const pr=normalizeProg(store.prog[id]);
    const th=themaVan(id), rang=rangVoor(th, pr.punten||0);
    const eigen=(allEx||[]).filter(e=>e.p===id);
    const beheerst=eigen.filter(e=>isMastered(pr,e.id)).length;
    const masteryPct=eigen.length?Math.round(beheerst/eigen.length*100):0;
    return {id,p,pr,th,rang,masteryPct};
  });
  const ranglijst=[...kinderen].sort((a,b)=>(b.pr.punten||0)-(a.pr.punten||0));
  const medals=['🥇','🥈','🥉','🏅'];
  return (
    <div>
      <div className="hero">
        <div style={{fontSize:40}}>🌟</div>
        <h1 style={{color:'#fff',fontSize:30,margin:'2px 0'}}>Benna Oefenclub</h1>
        <p style={{opacity:.95,margin:0}}>Oefen, verzamel punten en ga voor de volgende trofee! 🏆</p>
      </div>

      {/* ranglijst / podium */}
      <div className="card" style={{marginTop:14}}>
        <b>🏆 Ranglijst</b>
        {ranglijst.map((k,i)=>(
          <div key={k.id} className="rankrow">
            <span className="medal">{medals[i]||'⭐'}</span>
            <span style={{fontSize:22}}>{k.p.emoji}</span>
            <b style={{flex:1}}>{k.p.naam} <span className="muted" style={{fontWeight:400,fontSize:13}}>· {k.rang.emoji} {k.rang.naam}</span></b>
            <span style={{fontWeight:800,color:'#a8730a'}}>{k.pr.punten||0}</span>
            <span className="muted" style={{fontSize:12}}>{k.th.xp}</span>
          </div>
        ))}
      </div>

      {/* familie-toernooi van de week (op punten van deze week) */}
      {(()=>{ const tk=[...kinderen].sort((a,b)=>(b.pr.weekPunten||0)-(a.pr.weekPunten||0));
        const leider=tk[0]&&(tk[0].pr.weekPunten||0)>0?tk[0]:null;
        const nu=new Date(); const dow=nu.getDay()||7; const dagenTot=8-dow;
        return (
        <div className="card" style={{marginTop:12,background:'linear-gradient(120deg,#eafaf0,#e6f0fb)'}}>
          <div className="row" style={{justifyContent:'space-between'}}><b>🏆 Toernooi van de week</b>
            <span className="muted" style={{fontSize:12}}>nieuwe ronde over {dagenTot} {dagenTot===1?'dag':'dagen'}</span></div>
          <div style={{fontSize:13,color:'#a8730a',fontWeight:700,marginTop:2}}>💶 De winnaar krijgt € 10!</div>
          {store.toernooiWinnaar && PROFILES[store.toernooiWinnaar.pid] &&
            <div style={{margin:'4px 0',fontSize:13,color:'#2c7a2c',fontWeight:600}}>🎉 Vorige week won {PROFILES[store.toernooiWinnaar.pid].emoji} {PROFILES[store.toernooiWinnaar.pid].naam} {euro(store.toernooiWinnaar.bedrag)}! (staat in de ouder-modus klaar)</div>}
          {leider && <div style={{margin:'6px 0',fontWeight:700}}>👑 Aan kop: {leider.p.emoji} {leider.p.naam} ({leider.pr.weekPunten} punten deze week) — wint € 10 als de week zo eindigt</div>}
          {tk.map((k,i)=>(
            <div key={k.id} className="rankrow" style={{background:'transparent',border:'none',padding:'4px 0'}}>
              <span className="medal">{medals[i]||'⭐'}</span><span style={{fontSize:20}}>{k.p.emoji}</span>
              <b style={{flex:1}}>{k.p.naam}</b><span style={{fontWeight:700}}>{k.pr.weekPunten||0}</span><span className="muted" style={{fontSize:12}}>deze week</span>
            </div>
          ))}
        </div>);
      })()}

      {/* week-uitslag (verdiend deze week) */}
      {(()=>{ const rows=kinderen.map(k=>({k, v:weekVerdiend(k.pr)})); const tot=rows.reduce((s,r)=>s+r.v,0);
        const nu=new Date(); const isZo=nu.getDay()===0;
        return (
        <div className="card" style={{marginTop:12}}>

/* ---------- KIND-LOGIN (account: scores volgen het kind, op elk toestel) ---------- */
function KidLogin({pid,store,onLogin,onBack,onOk}){
  const P=PROFILES[pid]||{naam:'',emoji:'🔒',kleur:'#5EA03A'};
  const acc=accVan(store,pid);
  const [pw,setPw]=useState('');
  const [msg,setMsg]=useState('');
  const [busy,setBusy]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{setTimeout(()=>ref.current&&ref.current.focus(),80);},[]);
  async function probeer(){
    const lokaalOk=pwGelijk(pw, kidPw(store,pid)) || pwGelijk(pw, acc.pw);
    if(onLogin){
      setBusy(true);
      try{ await onLogin(pid, acc.code, pw); setBusy(false); onOk(); return; }
      catch(e){ setBusy(false);
        if(lokaalOk){ onOk(); return; }                       // offline of mismatch → lokaal wachtwoord klopt: tóch starten
        setMsg((e&&/pincode|wachtwoord/i.test(e.message||''))?'Onjuist wachtwoord.':'Geen verbinding — probeer opnieuw.'); setPw(''); setTimeout(()=>setMsg(''),2200); return; }
    }
    if(lokaalOk) onOk();
    else { setMsg('Oeps, probeer nog eens.'); setPw(''); setTimeout(()=>setMsg(''),1500); }
  }
  return (
    <div>
      <div className="topbar"><button className="back" onClick={onBack}>← terug</button><span className="pill">Inloggen</span></div>
      <div className="card center" style={{marginTop:20,background:P.kleur,color:'#fff'}}>
        <div style={{fontSize:46}}>{P.emoji}</div>
        <h2 style={{color:'#fff'}}>Hoi {P.naam}!</h2>
        <p style={{opacity:.95}}>Log in op je eigen account</p>
      </div>
      <div className="card" style={{marginTop:12}}>
        <input ref={ref} className="f" type="password" value={pw} placeholder="wachtwoord"
          onChange={e=>setPw(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')probeer();}}/>
        {msg && <div style={{color:'var(--accent)',fontWeight:600,marginTop:8}}>{msg}</div>}
        <div className="center" style={{marginTop:12}}><button className="btn" disabled={busy} onClick={probeer}>{busy?'Bezig…':'Start 🚀'}</button></div>
        <p className="muted center" style={{fontSize:12,marginTop:8}}>Log in met je naam + wachtwoord <b>Bennaclan</b>. Je scores staan op je account — op elk toestel gelijk.</p>
      </div>
    </div>
  );
}

    {id:'memory',emoji:'🃏',naam:'Geheugenspel',uitleg:'Vind alle paren in zo min mogelijk beurten.',best:games.memory,eenh:'beurten',lager:true},
    {id:'hoger', emoji:'🔢',naam:'Hoger of lager',uitleg:'Raad het getal met zo min mogelijk gokken.',best:games.hoger,eenh:'punten'},
    {id:'groter',emoji:'🐘',naam:'Groter getal',uitleg:'Tik snel het grootste getal aan.',best:games.groter,eenh:'goed'},
    {id:'paroon',emoji:'🔀',naam:'Even of oneven',uitleg:'Kies snel: even of oneven?',best:games.paroon,eenh:'goed'},

/* ===== 9 extra spelletjes ===== */
function SpelKader({titel,children,onBack}){ return (
  <div><div className="topbar"><button className="back" onClick={onBack}>← terug</button><span className="pill">{titel}</span></div>{children}</div>
); }
function SimonSpel({best,onBack,onScore,geluid}){
  const kleuren=['#e3405a','#22aa77','#3399ff','#f5b301'];
  const [reeks,setReeks]=useState([]);
  const [actief,setActief]=useState(-1);
  const [beurt,setBeurt]=useState(false);
  const [pos,setPos]=useState(0);
  const [af,setAf]=useState(false);
  function toon(r){ setBeurt(false); let i=0;
    const stap=()=>{ if(i>=r.length){ setBeurt(true); setPos(0); return; }
      setActief(r[i]); if(geluid) speel('goed',geluid);
      setTimeout(()=>{ setActief(-1); i++; setTimeout(stap,240); },440); };
    setTimeout(stap,500);
  }
  function start(){ setAf(false); const r=[ri(0,3)]; setReeks(r); toon(r); }
  function tik(n){ if(!beurt||af) return; setActief(n); setTimeout(()=>setActief(-1),160);
    if(n===reeks[pos]){ if(pos+1>=reeks.length){ const r=[...reeks,ri(0,3)]; setReeks(r); toon(r); } else setPos(pos+1); }
    else { speel('fout',geluid); setAf(true); setBeurt(false); onScore(reeks.length-1); }
  }
  return <SpelKader titel="🎨 Volg de kleuren" onBack={onBack}>
    <div className="card center"><div style={{fontWeight:700}}>Niveau: {reeks.length} · record {best||'—'}</div>
      {(!beurt&&!reeks.length)||af ? <button className="btn" style={{marginTop:10}} onClick={start}>{af?'Nog een keer 🔁':'Start 🚀'}</button>
        : <div className="muted" style={{marginTop:6}}>{beurt?'Jouw beurt — herhaal de reeks':'Kijk goed…'}</div>}
      {af && <p style={{marginTop:8,fontWeight:600}}>Je haalde niveau {reeks.length-1}! {(reeks.length-1)>=best?'🎉 Record!':''}</p>}
    </div>
    <div className="gamegrid" style={{gridTemplateColumns:'repeat(2,1fr)',maxWidth:280,margin:'12px auto'}}>
      {kleuren.map((c,i)=>(<div key={i} className="gamecell" style={{background:actief===i?c:c+'66',border:'2px solid '+c,minHeight:90}} onClick={()=>tik(i)}></div>))}
    </div>
  </SpelKader>;
}
function HogerLager({best,onBack,onScore,geluid}){
  const [doel,setDoel]=useState(()=>ri(1,100));
  const [lo,setLo]=useState(1); const [hi,setHi]=useState(100);
  const [gok,setGok]=useState(''); const [pog,setPog]=useState(0);
  const [tip,setTip]=useState('Ik denk aan een getal van 1 t/m 100.');
  const [klaar,setKlaar]=useState(false);
  function raad(){ const g=Number(gok); if(!g) return; setPog(p=>p+1); setGok('');
    if(g===doel){ speel('goed',geluid); setKlaar(true); const punten=Math.max(1,12-(pog+1)); setTip('🎉 Goed! In '+(pog+1)+' keer.'); onScore(punten); }
    else if(g<doel){ setTip('Hoger! ⬆️'); setLo(Math.max(lo,g+1)); }
    else { setTip('Lager! ⬇️'); setHi(Math.min(hi,g-1)); }
  }
  function opnieuw(){ setDoel(ri(1,100)); setLo(1); setHi(100); setPog(0); setGok(''); setKlaar(false); setTip('Nieuw getal — 1 t/m 100.'); }
  return <SpelKader titel="🔢 Hoger of lager" onBack={onBack}>
    <div className="card center"><div style={{fontWeight:700}}>Pogingen: {pog} · record {best||'—'} punten</div>
      <p style={{fontSize:18,margin:'10px 0'}}>{tip}</p>
      <div className="muted" style={{fontSize:13}}>tussen {lo} en {hi}</div>
      {!klaar ? <div className="answerrow" style={{maxWidth:220,margin:'10px auto'}}>
          <input className="f" inputMode="numeric" value={gok} onChange={e=>setGok(e.target.value.replace(/\D/g,''))} onKeyDown={e=>{if(e.key==='Enter')raad();}} placeholder="jouw gok"/>
        </div> : null}
      <button className="btn" onClick={klaar?opnieuw:raad}>{klaar?'Nog een keer 🔁':'Raad!'}</button>
    </div>
  </SpelKader>;
}
function TijdSpel({titel,best,onBack,onScore,geluid,duur,maak,render,juist}){
  const [actief,setActief]=useState(false);
  const [tijd,setTijd]=useState(duur);
  const [score,setScore]=useState(0);
  const [item,setItem]=useState(maak);
  useEffect(()=>{ if(!actief) return;
    if(tijd<=0){ setActief(false); onScore(score); return; }
    const to=setTimeout(()=>setTijd(t=>t-1),1000); return ()=>clearTimeout(to);
  },[tijd,actief]);
  function start(){ setScore(0); setTijd(duur); setItem(maak()); setActief(true); }
  function kies(keuze){ if(!actief) return;
    if(juist(item,keuze)){ setScore(s=>s+1); speel('goed',geluid); } else { speel('fout',geluid); }
    setItem(maak());
  }
  return <SpelKader titel={titel} onBack={onBack}>
    <div className="card center"><div style={{fontWeight:700}}>⏱ {tijd}s · 🏆 {score} · record {best||'—'}</div>
      {actief ? render(item,kies) : <div style={{marginTop:10}}>{score>0&&<p style={{fontWeight:600}}>Je had er {score} goed! {score>=best?'🎉 Record!':''}</p>}<button className="btn" onClick={start}>{score>0?'Nog een keer 🔁':'Start 🚀'}</button></div>}
    </div>
  </SpelKader>;
}
function GroterGetal(p){ return <TijdSpel {...p} titel="🐘 Groter getal" duur={30}
  maak={()=>{let a=ri(1,999),b=ri(1,999); if(a===b)b++; return {a,b};}}
  juist={(it,k)=>k===(it.a>it.b?'a':'b')}

function EvenOneven(p){ return <TijdSpel {...p} titel="🔀 Even of oneven" duur={30}

      <button className="btn" onClick={()=>kies('even')}>Even</button>

function WoordWar({best,onBack,onScore,geluid}){
  const woorden=['appel','banaan','school','vriend','zomer','winter','boek','fiets','tafel','bloem','vogel','strand','muziek','kikker','wolk','sleutel','koning','trein','ballon','draak'];

  function check(){ if(norm(val)===norm(woord)){ speel('goed',geluid); setGoed(g=>g+1); setMsg('✅ Goed!'); setTimeout(()=>{setMsg('');setVal('');setWoord(pick(woorden));},600);} else { speel('fout',geluid); setMsg('Nog niet…'); setTimeout(()=>setMsg(''),900);} }
  return <SpelKader titel="🔤 Woord-warwinkel" onBack={onBack}>
    <div className="card center"><div style={{fontWeight:700}}>Goed: {goed} · record {best||'—'}</div>
      <div style={{fontSize:34,fontWeight:800,letterSpacing:4,margin:'12px 0',textTransform:'uppercase'}}>{door}</div>
      <div className="answerrow" style={{maxWidth:260,margin:'0 auto'}}>
        <input className="f" value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')check();}} placeholder="welk woord?"/>
      </div>
      {msg && <div style={{fontWeight:600,marginTop:8}}>{msg}</div>}
      <div className="wrap center" style={{marginTop:10}}>
        <button className="btn" onClick={check}>Controleer</button>
        <button className="btn ghost sm" onClick={()=>{onScore(goed);setWoord(pick(woorden));setVal('');}}>Stoppen &amp; opslaan</button>
      </div>
    </div>
  </SpelKader>; }
function KlokRace(p){ return <TijdSpel {...p} titel="🕐 Klok-race" duur={40}
  maak={()=>{const u=ri(1,12); const m=pick([0,15,30,45]); const goed=(u%12)+':'+(m<10?'0'+m:m);
    const opts=new Set([goed]); while(opts.size<3){ const uu=ri(1,12), mm=pick([0,15,30,45]); opts.add((uu%12)+':'+(mm<10?'0'+mm:mm)); }
    return {u,m,goed,opts:shuffle([...opts])}; }}
  juist={(it,k)=>k===it.goed}
  render={(it,kies)=>(<div style={{marginTop:8}}><div style={{display:'flex',justifyContent:'center'}}><Figure ill={{type:'klok',uur:it.u,min:it.m}}/></div>
    <div className="wrap center" style={{marginTop:8}}>{it.opts.map((o,i)=><button key={i} className="btn" onClick={()=>kies(o)}>{o}</button>)}</div></div>)}/>; }
function Veelvouden({best,onBack,onScore,geluid}){
  const [tafel,setTafel]=useState(()=>ri(2,9));
  const [getallen,setGetallen]=useState([]);
  const [actief,setActief]=useState(false);
  const [score,setScore]=useState(0); const [tijd,setTijd]=useState(30);
  const [gekozen,setGekozen]=useState({});
  function nieuwRij(t){ const arr=[]; for(let i=0;i<9;i++){ if(Math.random()<0.45) arr.push(t*ri(1,9)); else { let x; do{x=ri(2,90);}while(x%t===0); arr.push(x);} } return arr; }
  useEffect(()=>{ if(!actief) return;
    if(tijd<=0){ setActief(false); onScore(score); return; }
    const to=setTimeout(()=>setTijd(x=>x-1),1000); return ()=>clearTimeout(to);
  },[tijd,actief]);
  function start(){ const t=ri(2,9); setTafel(t); setGetallen(nieuwRij(t)); setScore(0); setTijd(30); setGekozen({}); setActief(true); }
  function tik(i){ if(!actief||gekozen[i]) return; const n=getallen[i];
    if(n%tafel===0){ setScore(s=>s+1); speel('goed',geluid); setGekozen({...gekozen,[i]:'ok'}); }
    else { setScore(s=>Math.max(0,s-1)); speel('fout',geluid); setGekozen({...gekozen,[i]:'no'}); }
    setTimeout(()=>{ setGetallen(nieuwRij(tafel)); setGekozen({}); }, 500);
  }

    </div>

    </div>}

function BoterKaasEieren({best,onBack,onScore,geluid}){
  const leeg=Array(9).fill('');
  const [bord,setBord]=useState(leeg); const [klaar,setKlaar]=useState(''); const [winst,setWinst]=useState(best||0);
  const lijnen=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  function win(b,s){ return lijnen.some(l=>l.every(i=>b[i]===s)); }
  function zet(i){ if(bord[i]||klaar) return; const b=bord.slice(); b[i]='🙂'; if(win(b,'🙂')){ setBord(b); setKlaar('jij'); speel('goed',geluid); const nw=(best||0)+1; setWinst(nw); onScore(nw); return; }
    if(b.every(x=>x)){ setBord(b); setKlaar('gelijk'); return; }
    // computer: win, anders blokkeer, anders midden/random
    const leegIdx=b.map((x,j)=>x?null:j).filter(x=>x!==null);
    let keuze=null;
    for(const j of leegIdx){ const t=b.slice(); t[j]='🤖'; if(win(t,'🤖')){keuze=j;break;} }
    if(keuze===null) for(const j of leegIdx){ const t=b.slice(); t[j]='🙂'; if(win(t,'🙂')){keuze=j;break;} }
    if(keuze===null && !b[4]) keuze=4;
    if(keuze===null) keuze=pick(leegIdx);
    b[keuze]='🤖'; if(win(b,'🤖')){ setBord(b); setKlaar('computer'); speel('fout',geluid); return; }
    if(b.every(x=>x)){ setBord(b); setKlaar('gelijk'); return; }
    setBord(b);
  }
  function opnieuw(){ setBord(leeg); setKlaar(''); }
  return <SpelKader titel="⭕ Boter-kaas-eieren" onBack={onBack}>
    <div className="card center"><div style={{fontWeight:700}}>Gewonnen: {winst} keer</div>
      {klaar && <p style={{fontWeight:700,marginTop:6}}>{klaar==='jij'?'🎉 Jij wint!':klaar==='computer'?'🤖 De computer wint.':'🤝 Gelijkspel!'}</p>}
      <div className="gamegrid" style={{gridTemplateColumns:'repeat(3,1fr)',maxWidth:240,margin:'12px auto'}}>
        {bord.map((c,i)=>(<div key={i} className="gamecell" style={{fontSize:30,minHeight:64}} onClick={()=>zet(i)}>{c}</div>))}
      </div>
      <button className="btn" onClick={opnieuw}>Nieuw potje 🔁</button>
    </div>
  </SpelKader>; }

function MemorySpel({best,onBack,onScore,geluid}){
  const emojis=['⚽','🎮','🍕','🐶','🌟','🚀'];
  const nieuw=()=>shuffle([...emojis,...emojis].map((e,i)=>({i,e,open:false,klaar:false})));
  const [kaarten,setKaarten]=useState(nieuw);
  const [open,setOpen]=useState([]);
  const [beurten,setBeurten]=useState(0);
  const [klaar,setKlaar]=useState(false);
  function klik(idx){
    if(klaar) return; const k=kaarten[idx]; if(k.open||k.klaar||open.length>=2) return;
    const nk=kaarten.map((c,j)=>j===idx?{...c,open:true}:c); setKaarten(nk);
    const no=[...open,idx];
    if(no.length===2){
      setBeurten(b=>b+1);
      if(nk[no[0]].e===nk[no[1]].e){
        speel('goed',geluid);
        const done=nk.map((c,j)=>no.includes(j)?{...c,klaar:true}:c);
        setTimeout(()=>{ setKaarten(done); setOpen([]); if(done.every(c=>c.klaar)){ setKlaar(true); onScore(beurten+1); } },350);
      } else {
        setTimeout(()=>{ setKaarten(nk.map((c,j)=>no.includes(j)&&!c.klaar?{...c,open:false}:c)); setOpen([]); },700);
      }
      setOpen(no);
    } else setOpen(no);
  }
  function reset(){ setKaarten(nieuw()); setOpen([]); setBeurten(0); setKlaar(false); }
  return (
    <div>
      <div className="topbar"><button className="back" onClick={onBack}>← terug</button><span className="pill">🃏 Geheugenspel</span></div>
      <div className="card center">
        <div style={{fontSize:18,fontWeight:700}}>Beurten: {beurten} · record {best?best+' (minst)':'—'}</div>
        {klaar && <p style={{marginTop:8,fontWeight:600}}>Alle paren gevonden in {beurten} beurten! {(!best||beurten<=best)?'🎉 Top!':''}</p>}
        <button className="btn ghost sm" style={{marginTop:8}} onClick={reset}>Nieuw spel 🔁</button>
      </div>
      <div className="gamegrid" style={{gridTemplateColumns:'repeat(4,1fr)',maxWidth:320,margin:'12px auto'}}>
        {kaarten.map((c,idx)=>(
          <div key={idx} className="gamecell" style={{background:c.klaar?'#eaf7e2':(c.open?'#fff':'#dfe7d8')}} onClick={()=>klik(idx)}>
            {(c.open||c.klaar)?c.e:'❓'}
          </div>
        ))}
      </div>
    </div>
  );
}

function QuizSpel({vragen, onKlaar, geluid}){
  const [n,setN]=useState(0);
  const [val,setVal]=useState('');
  const [goed,setGoed]=useState(0);
  const [start]=useState(()=>Date.now());
  const [flits,setFlits]=useState(null);
  const ref=useRef(null);
  const v=vragen[n];
  useEffect(()=>{ setVal(''); setTimeout(()=>ref.current&&ref.current.focus(),60); },[n]);
  function na(ok){
    setFlits(ok?'goed':'fout'); speel(ok?'goed':'fout',geluid);
    const ng=goed+(ok?1:0); setGoed(ng);
    setTimeout(()=>{ setFlits(null);
      if(n+1>=vragen.length){ onKlaar({correct:ng, secs:Math.round((Date.now()-start)/1000)}); }
      else setN(n+1);
    },500);
  }
  function nakijk(){ if(flits) return; na(checkAnswer({a:v.a,alt:v.alt,opties:v.opties,u:v.u}, val)); }
  if(!v) return null;
  return (
    <div className="card">
      <div className="row" style={{justifyContent:'space-between',marginBottom:6}}>
        <span className="pill">Vraag {n+1} / {vragen.length}</span>
        <span className="muted" style={{fontSize:13}}>{v.t} · goed: {goed}</span>
      </div>
      <div className="pbar" style={{marginBottom:12}}><i style={{width:Math.round(n/vragen.length*100)+'%'}}></i></div>
      <div className="qbox">{v.q}</div>
      {v.opties ? (
        <div className="optiegrid">
          {v.opties.map((opt,i)=><button key={i} className={'optiebtn'+(norm(val)===norm(opt)?' sel':'')} disabled={!!flits} onClick={()=>setVal(opt)}>{opt}</button>)}
        </div>
      ) : (
        <div className="answerrow">
          <input ref={ref} value={val} placeholder="jouw antwoord" disabled={!!flits}
            onChange={e=>setVal(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')nakijk();}} inputMode="text"/>
          {v.u && <div className="unit">{v.u}</div>}
        </div>
      )}
      {flits==='goed' && <div className="feedback ok">✅ Goed!</div>}
      {flits==='fout' && <div className="feedback no">❌ Het was: <b>{v.a} {v.u}</b></div>}
      <div className="center" style={{marginTop:14}}><button className="btn" disabled={!!flits} onClick={nakijk}>Nakijken →</button></div>
    </div>
  );
}

function WeektaakKaart({profile,prog,allEx,items,onKies}){
  if(!items||!items.length) return null;
  const rows=items.map(key=>{ const sp=key.split('|'); const v=sp[0], t=sp.slice(1).join('|');
      const exs=allEx.filter(e=>e.p===profile&&e.v===v&&e.t===t);
      const beheerst=exs.filter(e=>isMastered(prog,e.id)).length;
      return {v,t,total:exs.length,beheerst}; }).filter(r=>r.total>0);
  if(!rows.length) return null;
  const totB=rows.reduce((s,r)=>s+r.beheerst,0), totT=rows.reduce((s,r)=>s+r.total,0);
  const pct=totT?Math.round(totB/totT*100):0;
  return (
    <div className="card" style={{marginTop:12,background:'#eef6ff',borderLeftColor:'#3a6ea0'}}>
      <div className="row" style={{justifyContent:'space-between',alignItems:'center'}}>
        <b>📌 Jouw weektaak</b>
        <span className="muted" style={{fontSize:13}}>{pct}% beheerst</span>
      </div>
      <div className="pbar" style={{marginTop:8}}><i style={{width:pct+'%'}}></i></div>
      <div className="wrap" style={{marginTop:10}}>
        {rows.map((r,i)=>(
          <button key={i} className={'btn sm '+(r.beheerst>=r.total?'ghost':'')} onClick={()=>onKies(r.v,r.t)} title={'Oefen '+r.t}>
            {r.beheerst>=r.total?'✅ ':'▶️ '}{r.t} <span className="muted" style={{fontSize:12}}>({r.beheerst}/{r.total})</span>
          </button>
        ))}
      </div>
    </div>
  );
}
/* ---- Weektaak beheren (ouder-modus): per kind onderwerpen voor de week aanvinken ---- */
function WeektaakBeheer({store,persist}){
  const [open,setOpen]=useState(false);
  const [sel,setSel]=useState(()=>{ const o={}; for(const pid of Object.keys(PROFILES)){ const w=store.weektaak&&store.weektaak[pid]; o[pid]=(w&&Array.isArray(w.items))?w.items.slice():[]; } return o; });
  const [msg,setMsg]=useState('');
  const allEx=[...SEED,...store.custom];
  function toggle(pid,key){ setSel(s=>{ const arr=(s[pid]||[]).slice(); const i=arr.indexOf(key); if(i>=0)arr.splice(i,1); else arr.push(key); return {...s,[pid]:arr}; }); }
  function bewaar(){ persist(prev=>{ const wt={...(prev.weektaak||{})}; for(const pid of Object.keys(sel)){ wt[pid]={items:sel[pid]||[],set:todayStr()}; } return {...prev, weektaak:wt}; }); setMsg('✅ Weektaken opgeslagen — de kinderen zien ze meteen.'); setTimeout(()=>setMsg(''),3500); }
  return (
    <div className="card" style={{marginBottom:16,background:'#eef6ff',borderLeftColor:'#3a6ea0'}}>
      <div className="row" style={{justifyContent:'space-between',alignItems:'center',cursor:'pointer'}} onClick={()=>setOpen(!open)}>
        <b>📌 Weektaak klaarzetten</b>
        <span className="muted" style={{fontSize:13}}>{open?'▲ inklappen':'▼ kies per kind de onderwerpen van de week'}</span>
      </div>
      {open && <div className="muted" style={{fontSize:12,marginTop:4}}>Vink onderwerpen aan; het kind ziet ze als “Jouw weektaak” bovenaan, met voortgang. Tip: 2 tot 4 per kind.</div>}
      {open && Object.entries(PROFILES).map(([pid,P])=>{
        const perVak={}; allEx.filter(e=>e.p===pid).forEach(e=>{ (perVak[e.v]=perVak[e.v]||{})[e.t]=1; });
        const gekozen=sel[pid]||[];
        return (
          <div key={pid} style={{marginTop:12,paddingTop:12,borderTop:'1px solid var(--line)'}}>
            <div style={{fontWeight:700}}>{P.emoji} {P.naam} <span className="muted" style={{fontWeight:400,fontSize:13}}>· {gekozen.length} gekozen</span></div>
            {Object.keys(perVak).map(v=>(
              <div key={v} style={{marginTop:6}}>
                <div className="muted" style={{fontSize:12}}>{VAKNAAM[v]||v}</div>
                <div className="wrap" style={{marginTop:4}}>
                  {Object.keys(perVak[v]).map(t=>{ const key=v+'|'+t; const aan=gekozen.indexOf(key)>=0;
                    return <button key={key} className={'btn sm '+(aan?'gold':'ghost')} onClick={()=>toggle(pid,key)}>{aan?'✓ ':''}{t}</button>; })}
                </div>
              </div>
            ))}
          </div>
        );
      })}
      {open && <div style={{marginTop:12}}><button className="btn" onClick={bewaar}>💾 Weektaken opslaan</button>{msg && <span style={{color:'#2c7a2c',fontWeight:600,marginLeft:10,fontSize:13}}>{msg}</span>}</div>}
    </div>
  );
}
function Hub({profile,prog,vak,setVak,allEx,onBack,onTopic,onSetGoal,onSetNiveau,wedstrijdAan,onWedstrijd,onSpellen,spelNaDoel,weektaakItems}){
  const P=PROFILES[profile];
  const [jaar,setJaar]=useState('nu');     // 'nu' | 'next'
  const heeftVolgend=useMemo(()=>allEx.some(e=>e.p===profile&&(e.jaar||'nu')==='next'),[allEx,profile]);
  const topics=useMemo(()=>{
    const list=allEx.filter(e=>e.p===profile&&e.v===vak&&(e.jaar||'nu')===jaar);
    const map={};
    list.forEach(e=>{(map[e.t]=map[e.t]||[]).push(e);});
    return Object.entries(map).map(([t,exs])=>{
      const beheerst=exs.filter(e=>isMastered(prog,e.id)).length;
      const begonnen=exs.filter(e=>cardInfo(prog,e.id).box>0).length;
      return {t, total:exs.length, beheerst, begonnen};

  },[allEx,profile,vak,prog,jaar]);

  const goal=prog.goal||10, done=Math.min(prog.todayCount||0,goal), goalPct=Math.round(done/goal*100);
  const foutAantal=(prog.foutLog||[]).length;
  const th=themaVan(profile), rang=rangVoor(th, prog.punten||0);

  return (
    <div>
      <div className="topbar">
        <button className="back" onClick={onBack}>← terug</button>
        <div className="scorechip">
          <span className="s">{rang.emoji} {prog.punten||0} {th.xp}</span>
          <span className="s">🔥 {prog.streak||0}</span>
          <span className="s">📅 {prog.dagstreak||0}</span>
        </div>
      </div>
      <h1 style={{fontSize:26}}>{P.emoji} {P.naam}</h1>

      {/* rang / niveau-voortgang */}
      <div className="card" style={{marginTop:12}}>
        <div className="row" style={{justifyContent:'space-between'}}>
          <b>{rang.emoji} {rang.naam}</b>
          <span className="muted" style={{fontSize:13}}>{rang.volgendeNaam? ('Nog '+rang.naar+' '+th.xp+' → '+rang.volgendeNaam) : 'Hoogste rang! 👑'}</span>
        </div>
        <div className="pbar" style={{marginTop:8}}><i style={{width:rang.pct+'%'}}></i></div>
      </div>

      <WeektaakKaart profile={profile} prog={prog} allEx={allEx} items={weektaakItems}
        onKies={(v,t)=>{ setVak(v); const hasNu=allEx.some(e=>e.p===profile&&e.v===v&&e.t===t&&(e.jaar||'nu')==='nu'); onTopic(t, hasNu?'nu':'next'); }}/>

      {/* dagmissie: 3 sterren + missie-streak */}
      {(()=>{ const m=dagMissie(prog); return (
        <div className="card" style={{marginTop:12,background:m.klaar?'#eaf7e2':'#fff'}}>
          <div className="row" style={{justifyContent:'space-between'}}>
            <b>⭐ Dagmissie {m.klaar?'— gehaald! 🎉':''}</b>
            <span className="muted" style={{fontSize:13}}>🔥 missie-streak: {prog.missieStreak||0}</span>
          </div>
          <div style={{marginTop:6}}>
            {m.taken.map((t,i)=>(<div key={i} style={{fontSize:14,padding:'2px 0'}}>{t.ok?'✅':'⬜'} {t.tekst}</div>))}
          </div>
          {!m.klaar && <div className="muted" style={{fontSize:12,marginTop:4}}>Rond alle drie af → +25 punten en je missie-streak groeit!</div>}
        </div>
      );})()}

      {/* dagdoel */}
      <div className="card" style={{marginTop:12,background:done>=goal?'#eaf7e2':'#fff'}}>
        <div className="row" style={{justifyContent:'space-between'}}>
          <b>🎯 Dagdoel{done>=goal?(th.doel==='doelpunten'?' — gehaald! ⚽':' — gehaald! 🎉'):''}</b>
          <span className="muted" style={{fontSize:13}}>{prog.todayCount||0} / {goal} {th.doel}</span>
        </div>
        <div className="pbar" style={{marginTop:8}}><i style={{width:goalPct+'%'}}></i></div>
        <div className="wrap" style={{marginTop:10,alignItems:'center'}}>
          <span className="muted" style={{fontSize:13}}>Doel aanpassen:</span>
          <button className="btn ghost sm" onClick={()=>onSetGoal(Math.max(5,goal-5))}>−</button>
          <span style={{fontWeight:700,minWidth:24,textAlign:'center'}}>{goal}</span>
          <button className="btn ghost sm" onClick={()=>onSetGoal(Math.min(40,goal+5))}>+</button>
        </div>
      </div>

      {/* eerlijke beloning (zakgeld) — alleen bij profielen met beloning */}
      {P.beloning && (()=>{ const b=berekenBeloning(prog); const wv=weekVerdiend(prog); const pct=b.weekbudget?Math.round(wv/b.weekbudget*100):0; return (
        <div className="card" style={{marginTop:12,background:'linear-gradient(135deg,#fff9e6,#fff4d1)',border:'1px solid #f0d67a'}}>
          <div className="row" style={{justifyContent:'space-between'}}>
            <b>💶 Verdiend vandaag</b>
            <span style={{fontWeight:800,fontSize:18,color:'#a8730a'}}>{b.betaald?'uitbetaald ✓':euro(b.bedrag)}</span>
          </div>
          <div className="muted" style={{fontSize:13,marginTop:8,lineHeight:1.5}}>
            {b.poort}<br/>
            🎯 Goed op niveau (moeilijker = meer): <b>{b.punten}</b> punten · nauwkeurigheid <b>{b.pogingen?Math.round(b.nauw*100):0}%</b><br/>
            {b.toetsEuro>0 ? <span>✅ Toets gehaald ({b.proef>=70?'proeftoets '+b.proef+'%':'oefentoets '+b.oefen+'%'}) → bonus {euro(b.toetsEuro)}</span>
                           : <span>💡 Haal een oefentoets voor een bonus — hoe hoger je score, hoe meer.</span>}
          </div>
          <div className="row" style={{justifyContent:'space-between',marginTop:8,fontSize:12}}>
            <span className="muted">Deze week verdiend: <b>{euro(wv)}</b> van {euro(b.weekbudget)}</span>
            <span className="muted">nog {euro(Math.max(0,halfRond(b.weekbudget-wv)))} mogelijk</span>
          </div>
          <div className="pbar" style={{marginTop:4}}><i style={{width:Math.min(100,pct)+'%'}}></i></div>
          <div className="muted" style={{fontSize:12,marginTop:8,fontStyle:'italic'}}>Papa/mama betaalt uit via de ouder-modus.</div>
        </div>
      );})()}

      {/* moeilijkheidsniveau */}
      <div className="card" style={{marginTop:12}}>
        <div className="row" style={{justifyContent:'space-between'}}>
          <b>📈 Niveau</b>
          <span className="muted" style={{fontSize:13}}>{prog.niveau==='auto'?'Automatisch (nu niveau '+(prog.autoLvl||1)+')':'Vast op niveau '+prog.niveau}</span>
        </div>
        <div className="wrap" style={{marginTop:10}}>
          {[['auto','Auto'],[1,'1 · makkelijk'],[2,'2 · middel'],[3,'3 · moeilijk']].map(([v,label])=>(
            <button key={String(v)} className={'btn sm '+(prog.niveau===v?'':'ghost')} onClick={()=>onSetNiveau(v)}>{label}</button>
          ))}
        </div>
        <p className="muted" style={{fontSize:12,marginTop:8}}>
          {prog.niveau==='auto'
            ? 'Bij Auto wordt het vanzelf een tikje moeilijker als het goed gaat, en makkelijker als het even niet lukt.'
            : 'Bij een vast niveau krijg je vooral oefeningen van dat niveau.'}
        </p>
      </div>

      {/* proeftoets over alle vakken (examen-/IEP-stijl) */}
      <div className="center" style={{marginTop:12}}>
        <button className="btn gold" onClick={()=>onTopic('__proeftoets__',jaar)}>📝 Proeftoets — 20 vragen, alle vakken door elkaar</button>
      </div>

      {/* vriend uitdagen (wedstrijd via link) */}
      {wedstrijdAan && <div className="center" style={{marginTop:10}}>
        <button className="btn accent" onClick={onWedstrijd}>⚔️ Daag een vriend uit</button>
      </div>}

      {/* speeltijd: spelletjes (evt. pas na het dagdoel) */}
      {onSpellen && (()=>{ const doelGehaald=(prog.todayCount||0)>=(prog.goal||10); const slot=spelNaDoel&&!doelGehaald; return (
        <div className="center" style={{marginTop:10}}>
          {slot
            ? <button className="btn ghost" onClick={()=>{}} disabled title="Haal eerst je dagdoel">🔒 Spelletjes — haal eerst je dagdoel</button>
            : <button className="btn gold" onClick={onSpellen}>🎮 Spelletjes{spelNaDoel?' (verdiend!)':''}</button>}
        </div>
      );})()}

      {/* leerjaar: dit jaar / volgend jaar (vooruitkijken) */}
      {heeftVolgend && <div className="wrap" style={{margin:'14px 0 0',alignItems:'center'}}>
        <span className="muted" style={{fontSize:13}}>📅 Leerjaar:</span>
        <button className={'btn sm '+(jaar==='nu'?'':'ghost')} onClick={()=>setJaar('nu')}>Dit jaar ({P.niveau})</button>
        <button className={'btn sm '+(jaar==='next'?'gold':'ghost')} onClick={()=>setJaar('next')}>🔭 Volgend jaar ({P.volgend})</button>
      </div>}

      <div className="wrap" style={{margin:'14px 0 16px'}}>
        {P.vakken.map(v=>(
          <button key={v} className={'btn sm '+(v===vak?'':'ghost')} onClick={()=>setVak(v)}>{VAKNAAM[v]}</button>
        ))}
      </div>

      {/* mix + foutenschrift */}
      {topics.length>0 && <div className="wrap" style={{marginBottom:14}}>
        <button className="btn" onClick={()=>onTopic('__mix__',jaar)}>🎲 Mix-oefening (door elkaar)</button>
        <button className="btn gold" onClick={()=>onTopic('__toets__',jaar)}>📝 Oefentoets (10 vragen)</button>
        {foutAantal>0 && <button className="btn accent" onClick={()=>onTopic('__fouten__')}>📕 Mijn fouten oefenen ({foutAantal})</button>}
      </div>}

      {topics.length===0 && <div className="card center" style={{marginBottom:14}}>
        <div style={{fontSize:32}}>{jaar==='next'?'🔭':'🌱'}</div>
        <p style={{fontSize:16}}>{jaar==='next'?'Voor dit vak is er nog geen stof van volgend jaar.':'Voor dit vak staan nog geen opgaven klaar.'}</p>
        <p className="muted" style={{fontSize:13}}>{jaar==='next'?'Kies een ander vak of ga terug naar "Dit jaar".':'Een ouder kan opgaven toevoegen via de ouder-modus op het beginscherm.'}</p>
      </div>}

      {topics.map(({t,total,beheerst,begonnen})=>{
        const pct=total?Math.round(beheerst/total*100):0;
        const sterren=pct>=100?'⭐⭐⭐':pct>=60?'⭐⭐':beheerst>0?'⭐':'☆☆☆';
        return (
          <div key={t} className="topic" onClick={()=>onTopic(t,jaar)}>
            <div className="ico">{TOPICICON[t]||'📘'}</div>
            <div className="grow">
              <div className="tt">{t}</div>
              <div className="muted" style={{fontSize:13}}>{beheerst} / {total} beheerst · <span className="stars">{sterren}</span></div>
              <div className="pbar"><i style={{width:pct+'%'}}></i></div>
            </div>
            <div>›</div>
          </div>
        );
      })}

      <div className="card" style={{marginTop:18}}>
        <b>Badges</b>
        <div className="wrap" style={{marginTop:10}}>
          {BADGES.map(b=>(
            <span key={b.id} className={'badge '+(prog.badges.includes(b.id)?'':'locked')}>{b.emoji} {b.naam}</span>
          ))}
        </div>
      </div>
      <p className="muted center" style={{marginTop:14,fontSize:13}}>
        Een som is <b>beheerst</b> als je hem een paar keer achter elkaar goed hebt. Foute sommen komen vaker terug. 🌱
      </p>
    </div>
  );
}

/* ---------- PRACTICE (slim herhalen + mix + fouten + samenvatting) ---------- */
function Practice({profile,vak,topic,jaar,allEx,onBack,onResult,onToets,prog,onTopic,geluid,voorlezen}){
  const jr=jaar||'nu';
  const th=themaVan(profile);
  const [pool,setPool]=useState([]);
  const [card,setCard]=useState(null);
  const [inst,setInst]=useState(null);
  const [val,setVal]=useState('');
  const [hintN,setHintN]=useState(0);
  const [state,setState]=useState('open');   // open | goed | fout
  const [showSol,setShowSol]=useState(false);
  const [tries,setTries]=useState(0);
  const [earned,setEarned]=useState(10);
  const [celebrate,setCelebrate]=useState(false);
  const [showUitleg,setShowUitleg]=useState(true);
  const [session,setSession]=useState({good:0,wrong:0});
  const [finished,setFinished]=useState(false);
  const [foutTip,setFoutTip]=useState(null);
  const [toets,setToets]=useState({n:0,fout:[]});
  const [examStart,setExamStart]=useState(0);   // starttijd oefentoets (ms)
  const [examSecs,setExamSecs]=useState(0);      // verstreken seconden
  const inputRef=useRef(null);
  const recentRef=useRef([]);                    // laatst getoonde kaart-id's (tegen herhaling)

  const isMix=topic==='__mix__', isFout=topic==='__fouten__', isToets=topic==='__toets__', isProef=topic==='__proeftoets__';
  const isExam=isToets||isProef;
  const TOETS_LEN=isProef?20:10;
  const uitlegKey=(!isMix&&!isFout&&!isExam&&UITLEG[topic])?topic:null;
  const topicLabel=(isMix?'🎲 Mix':isFout?'📕 Fouten herhalen':isProef?'📝 Proeftoets (alle vakken)':isToets?'📝 Oefentoets':topic)+(jr==='next'?' 🔭 volgend jaar':'');

  function showCard(c){
    // onthoud de laatste kaarten zodat pickNext niet snel dezelfde vraag herhaalt
    const hist=[...recentRef.current.filter(id=>id!==c.id), c.id];
    recentRef.current = hist.slice(-8);
    setCard(c); setInst(instOf(c));
    setVal(''); setHintN(0); setState('open'); setShowSol(false); setTries(0); setFoutTip(null);
    setTimeout(()=>inputRef.current&&inputRef.current.focus(),60);
  }
  useEffect(()=>{
    let p;
    if(isMix||isToets) p=allEx.filter(e=>e.p===profile&&e.v===vak&&(e.jaar||'nu')===jr);
    else if(isProef) p=allEx.filter(e=>e.p===profile&&(e.jaar||'nu')===jr);   // alle vakken door elkaar
    else if(isFout){const ids=new Set((prog.foutLog||[]).map(f=>f.id)); p=allEx.filter(e=>ids.has(e.id));}
    else p=allEx.filter(e=>e.p===profile&&e.v===vak&&e.t===topic&&(e.jaar||'nu')===jr);
    // bij een vast niveau: filter op dat niveau (val terug op alles als er niets is)
    if(!isFout && [1,2,3].includes(prog.niveau)){
      const f=p.filter(e=>(e.lvl||1)===prog.niveau);
      if(f.length) p=f;
    }
    setPool(p); setSession({good:0,wrong:0}); setToets({n:0,fout:[]}); setFinished(false); setShowUitleg(true);
    setExamStart(isExam?Date.now():0); setExamSecs(0);
    recentRef.current=[];
    const first=pickNext(p,prog,null);
    if(first) showCard(first); else {setCard(null); setInst(null);}
  },[topic,vak,profile,jr]);

  // timer voor de oefentoets: tikt elke seconde tot de toets klaar is
  useEffect(()=>{
    if(!isExam || !examStart || finished) return;
    const id=setInterval(()=>setExamSecs(Math.round((Date.now()-examStart)/1000)),1000);
    return ()=>clearInterval(id);
  },[isExam,examStart,finished]);

  function controleer(){
    if(state==='goed'||!inst) return;
    const ok=checkAnswer(inst,val);
    if(isExam){
      if(state!=='open') return;                 // in de toets: één poging per vraag
      onResult(profile,card,inst,ok,false);
      setState(ok?'goed':'fout');
      speel(ok?'goed':'fout', geluid);
      setToets(t=>({n:t.n+1, fout: ok?t.fout:[...t.fout,{t:card.t,q:inst.q,a:inst.a,u:inst.u||''}]}));
      if(ok){setCelebrate(true); setTimeout(()=>setCelebrate(false),900);}
      return;
    }
    setTries(t=>t+1);
    if(ok){
      setEarned(puntenVoor(prog,card.id,hintN>0));
      setState('goed'); setFoutTip(null);
      speel('goed', geluid);
      onResult(profile,card,inst,true,hintN>0);
      setSession(s=>({good:s.good+1,wrong:s.wrong}));
      setCelebrate(true); setTimeout(()=>setCelebrate(false),1100);
    }else{
      setState('fout'); setFoutTip(diagnoseFout(inst,val));
      speel('fout', geluid);
      onResult(profile,card,inst,false,false);
      setSession(s=>({good:s.good,wrong:s.wrong+1}));
    }
  }
  function volgende(){
    if(isExam && toets.n>=TOETS_LEN){
      const pct=Math.round((TOETS_LEN - toets.fout.length)/TOETS_LEN*100);
      if(examStart) setExamSecs(Math.round((Date.now()-examStart)/1000));
      if(onToets) onToets(profile, isProef, pct);
      setFinished(true); return;
    }
    const n=pickNext(pool,prog,recentRef.current); if(n) showCard(n);
  }

  if(!card||!inst){
    return (<div>
      <div className="topbar"><button className="back" onClick={onBack}>← terug</button><span className="pill">{topicLabel}</span></div>
      <div className="card center" style={{marginTop:20}}>
        <div style={{fontSize:40}}>✅</div>
        <p style={{fontSize:18}}>{isFout?'Geen fouten om te herhalen — top!':'Nog geen opgaven hier.'}</p>
        <button className="btn ghost" onClick={onBack} style={{marginTop:10}}>Terug naar overzicht</button>
      </div>
    </div>);
  }

  if(finished && isExam){
    const goed=TOETS_LEN - toets.fout.length, pct=Math.round(goed/TOETS_LEN*100);
    const emoji=pct>=80?'🏆':pct>=50?'🌟':'💪';
    const oordeel=pct>=80?'Knap gedaan!':pct>=50?'Goed bezig — nog even oefenen.':'Blijf oefenen, je komt er!';
    return (<div>

function rapportTekst(store){
  const allEx=[...SEED,...TEMPLATES,...store.custom];
  const L=['Voortgangsrapport — Oefenapp','==============================',''];
  for(const [pid,P] of Object.entries(PROFILES)){
    const prog=normalizeProg(store.prog[pid]);
    L.push(P.naam+' ('+P.niveau+')');
    L.push('  Punten: '+(prog.punten||0)+'  ·  Dagreeks: '+(prog.dagstreak||0)+' dagen  ·  Niveau: '+(prog.niveau==='auto'?'automatisch (nu '+(prog.autoLvl||1)+')':prog.niveau));
    for(const v of P.vakken){
      const cards=allEx.filter(e=>e.p===pid&&e.v===v);
      const beh=cards.filter(e=>isMastered(prog,e.id)).length;
      const beg=cards.filter(e=>cardInfo(prog,e.id).box>0).length;
      L.push('  - '+VAKNAAM[v]+': '+beh+'/'+cards.length+' beheerst ('+beg+' begonnen)');
    }
    const az=zwakteAnalyse(prog, allEx, pid);
    if(az.zwak.length) L.push('  Aandachtspunten: '+az.zwak.map(o=>VAKNAAM[o.v]+' – '+o.t+' ('+o.pct+'% beheerst'+(o.wrong?(', '+o.wrong+'x fout'):'')+')').join('; '));
    if(az.sterk.length) L.push('  Gaat goed: '+az.sterk.map(o=>VAKNAAM[o.v]+' – '+o.t).join('; '));
    if((prog.foutLog||[]).length) L.push('  Nog te herhalen (foutenschrift): '+prog.foutLog.length);
    L.push('');
  }
  return L.join('\n');
}
function downloadRapport(store){
  const blob=new Blob([rapportTekst(store)],{type:'text/plain'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='voortgangsrapport.txt'; a.click();
}

const DOMEIN_KEYWORDS=[
  ['Getallen', ['getal','optel','aftrek','tafel','delen','deel','vermenigvuldig','kommagetal','negatiev','macht','wortel','rekenvolgorde','getalbegrip','rest','automatiseren']],
  ['Verhoudingen', ['breuk','verhouding','procent','schaal','groeifactor']],
  ['Meten & meetkunde', ['meten','maten','oppervlak','omtrek','inhoud','klok','tijd','geld','hoek','pythagoras','meetkunde','figuur','cirkel','driehoek','rechthoek','balk','kubus','hokjes']],
  ['Verbanden', ['tabel','grafiek','diagram','gemiddelde','statistiek','formule','lineair','kwadrat','verband','kans','tellen','combinat','exponent','logaritme','vergelijking','stelsel','haakjes','herleiden','wetenschappelijke']],
];
const DOMEIN_VOLGORDE=['Getallen','Verhoudingen','Meten & meetkunde','Verbanden','Overig'];
const REKENVAKKEN={rekenen:1,wiskunde:1,wiskundeA:1};
function domeinVan(t){ const s=(t||'').toLowerCase();
  for(const [dom,keys] of DOMEIN_KEYWORDS){ if(keys.some(k=>s.includes(k))) return dom; } return 'Overig'; }
function LeerlijnPaneel({store}){
  const [open,setOpen]=useState(false);
  const allEx=[...SEED,...store.custom];   // vaste opgaven (sjablonen zijn parametrisch, niet per stuk 'beheerst')
  return (
    <div className="card" style={{marginBottom:16,background:'#f4f1fb',borderLeftColor:'#7a5ea0'}}>
      <div className="row" style={{justifyContent:'space-between',alignItems:'center',cursor:'pointer'}} onClick={()=>setOpen(!open)}>
        <b>🎯 Leerlijn-overzicht per domein</b>
        <span className="muted" style={{fontSize:13}}>{open?'▲ inklappen':'▼ bekijk voortgang per curriculum-domein'}</span>
      </div>
      {open && <div className="muted" style={{fontSize:12,marginTop:4}}>Beheersing per officieel leerlijndomein (referentieniveaus / examenprogramma), berekend uit de vaste opgaven.</div>}
      {open && Object.entries(PROFILES).map(([pid,P])=>{
        const prog=normalizeProg(store.prog[pid]);
        const eigen=allEx.filter(e=>e.p===pid);
        const rekenEx=eigen.filter(e=>REKENVAKKEN[e.v]);
        const domGroepen={}; rekenEx.forEach(e=>{const d=domeinVan(e.t); (domGroepen[d]=domGroepen[d]||[]).push(e);});
        const overige={}; eigen.filter(e=>!REKENVAKKEN[e.v]).forEach(e=>{(overige[e.v]=overige[e.v]||[]).push(e);});
        return (
          <div key={pid} style={{marginTop:12,paddingTop:12,borderTop:'1px solid var(--line)'}}>
            <div style={{fontWeight:700}}>{P.emoji} {P.naam} <span className="muted" style={{fontWeight:400,fontSize:13}}>· {P.niveau}</span></div>
            {rekenEx.length>0 && <div className="muted" style={{fontSize:12,marginTop:4}}>Rekenen/wiskunde — landelijke domeinen</div>}
            {DOMEIN_VOLGORDE.filter(d=>domGroepen[d]).map(d=>{
              const arr=domGroepen[d]; const beheerst=arr.filter(e=>isMastered(prog,e.id)).length;
              const pct=arr.length?Math.round(beheerst/arr.length*100):0;
              return (
                <div key={d} style={{marginTop:6}}>
                  <div className="row" style={{justifyContent:'space-between',fontSize:13}}><span>{d}</span><span className="muted">{beheerst}/{arr.length} · {pct}%</span></div>
                  <div className="pbar"><i style={{width:pct+'%'}}></i></div>
                </div>
              );
            })}
            {Object.keys(overige).length>0 && <div className="wrap" style={{marginTop:8}}>
              {Object.entries(overige).map(([v,arr])=>{ const beheerst=arr.filter(e=>isMastered(prog,e.id)).length;
                return <span key={v} className="tag">{(VAKNAAM[v]||v)}: {beheerst}/{arr.length}</span>; })}
            </div>}
          </div>
        );
      })}
    </div>
  );
}
