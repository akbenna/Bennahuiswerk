          </div>
        </div>
        {Object.entries(PROFILES).map(([pid,P])=>{
          const prog=normalizeProg(store.prog[pid]);
          const vakRijen=P.vakken.map(v=>{
            const cards=allEx.filter(e=>e.p===pid&&e.v===v);
            return {v, total:cards.length, beheerst:cards.filter(e=>isMastered(prog,e.id)).length};
          });
          const totBeheerst=vakRijen.reduce((s,r)=>s+r.beheerst,0), totKaart=vakRijen.reduce((s,r)=>s+r.total,0);
          const masteryPct=totKaart?Math.round(totBeheerst/totKaart*100):0;
          const analyse=zwakteAnalyse(prog, allEx, pid);
          const b=berekenBeloning(prog);
          const wVerdiend=weekVerdiend(prog);
          const totVerdiend=totaalVerdiend(prog), totBetaald=totaalUitbetaald(prog), open=openstaand(prog);
          const weekPct=b.weekbudget?Math.round(wVerdiend/b.weekbudget*100):0;
          return (
            <div key={pid} style={{marginTop:12,paddingTop:12,borderTop:'1px solid var(--line)'}}>
              <div style={{fontWeight:700}}>{P.emoji} {P.naam} <span className="muted" style={{fontWeight:400,fontSize:13}}>· {P.niveau} · beheersing {masteryPct}% ({totBeheerst}/{totKaart})</span></div>
              <div className="muted" style={{fontWeight:400,fontSize:13,marginTop:2}}>⭐ {prog.punten||0} · 🔥 {prog.streak||0} · 📅 {prog.dagstreak||0} dagen · vandaag {prog.todayCount||0}/{prog.goal||10} · niveau {prog.niveau==='auto'?'auto ('+(prog.autoLvl||1)+')':prog.niveau}</div>
              <div className="wrap" style={{marginTop:6}}>
                {vakRijen.map(r=>(<span key={r.v} className="tag">{VAKNAAM[r.v]}: {r.beheerst}/{r.total}</span>))}
              </div>
              {analyse.zwak.length>0
                ? <div style={{marginTop:8}}>
                    <div style={{fontSize:13,fontWeight:600,color:'#a33'}}>⚠️ Aandachtspunten — zwakste onderwerpen:</div>
                    {analyse.zwak.map((o,i)=>(<div key={i} style={{marginTop:4}}>
                      <div className="row" style={{justifyContent:'space-between',fontSize:12}}>
                        <span>{VAKNAAM[o.v]} – {o.t}{o.jaar==='next'?' (volgend jaar)':''}</span>
                        <span className="muted">{o.pct}% beheerst{o.wrong>0?(' · '+o.wrong+'× fout'):''}</span>
                      </div>
                      <div className="pbar" style={{height:5}}><i style={{width:o.pct+'%',background:o.wrong>0?'#C23728':undefined}}></i></div>
                    </div>))}
                    {analyse.sterk.length>0 && <div className="muted" style={{fontSize:12,marginTop:6}}>💪 Gaat goed: {analyse.sterk.map(o=>VAKNAAM[o.v]+' – '+o.t).join(' · ')}</div>}
                  </div>
                : <div className="muted" style={{marginTop:6,fontSize:13}}>Nog te weinig geoefend om zwakke punten te bepalen.</div>}
              {(prog.foutLog||[]).length>0 && <div className="muted" style={{fontSize:13,marginTop:4}}>📕 Foutenschrift: {(prog.foutLog||[]).length} som(men) om te herhalen</div>}
              {/* beloning: naar resultaat & moeilijkheid, met hard weekbudget */}
              <div style={{marginTop:8,padding:'8px 10px',background:'#fff9e6',border:'1px solid #f0d67a',borderRadius:10}}>
                <div className="row" style={{justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:15}}>💶 <b>Totaal verdiend: {euro(totVerdiend)}</b></span>
                  <button className="btn sm" disabled={open<=0} onClick={()=>onMarkeerBetaald(pid)}>{open>0?('Betaal '+euro(open)):'Betaald ✓'}</button>
                </div>
                <div className="row" style={{justifyContent:'space-between',marginTop:4,fontSize:13}}>
                  <span className="muted">Uitbetaald: <b>{euro(totBetaald)}</b></span>
                  <span style={{fontWeight:700,color:open>0?'#a8730a':'#2c7a2c'}}>nog te betalen: {euro(open)}</span>
                </div>
                <div className="muted" style={{fontSize:12,marginTop:6}}>
                  deze week {euro(wVerdiend)} van {euro(b.weekbudget)} budget{(prog.bonus||0)>0?' · 🏆 toernooibonus '+euro(prog.bonus):''}{(prog.verdiendBij||0)!==0?' · bijstelling '+(prog.verdiendBij>0?'+':'')+euro(prog.verdiendBij):''}
                  <br/>vandaag {euro(b.bedrag)} · nauwkeurigheid {b.pogingen?Math.round(b.nauw*100):0}%{b.toetsEuro>0?' · toetsbonus '+euro(b.toetsEuro):''}{b.factor===0.5?' · half tarief':''}
                </div>
                <div className="pbar" style={{marginTop:4}}><i style={{width:Math.min(100,weekPct)+'%'}}></i></div>
                <div className="wrap" style={{marginTop:8,alignItems:'center',gap:6}}>
                  <span className="muted" style={{fontSize:12}}>Verdiensten bijstellen:</span>
                  <button className="btn ghost sm" onClick={()=>onCorrigeerVerdiend(pid,-0.5)}>− € 0,50</button>
                  <button className="btn ghost sm" onClick={()=>onCorrigeerVerdiend(pid,0.5)}>+ € 0,50</button>
                  {(prog.verdiendBij||0)!==0 && <span className="muted" style={{fontSize:12}}>(bijstelling {prog.verdiendBij>0?'+':''}{euro(prog.verdiendBij)})</span>}
                </div>
                <div className="wrap" style={{marginTop:6,alignItems:'center'}}>
                  <span className="muted" style={{fontSize:12}}>Weekbudget:</span>
                  <button className="btn ghost sm" onClick={()=>onSetWeekbudget(pid, weekbudgetVan(prog)-2.5)}>−</button>
                  <span style={{fontWeight:700,minWidth:64,textAlign:'center'}}>{euro(weekbudgetVan(prog))}</span>
                  <button className="btn ghost sm" onClick={()=>onSetWeekbudget(pid, weekbudgetVan(prog)+2.5)}>+</button>
                </div>
              </div>
            </div>
          );
        })}
        <div className="muted" style={{fontSize:12,marginTop:12,lineHeight:1.5,paddingTop:8,borderTop:'1px solid var(--line)'}}>
          💶 <b>Beloning naar resultaat &amp; niveau:</b> alleen 1e keer goed zónder hint telt, en <b>moeilijker = meer waard</b> (niveau 1/2/3 → 1/2/3 punten × € {String(BELONING.tariefPunt).replace('.',',')}).
          Nauwkeurigheidspoort (≥ 85% vol tarief, ≥ 70% half, daaronder niets). Toetsbonus schaalt met de score. Dagplafond {euro(BELONING.dagMax)} en een <b>hard weekbudget per kind</b> — de app betaalt nooit meer uit dan dat.
        </div>
      </div>
      <ZomerPaneel store={store} persist={persist}/>
      {onSetKidPw && <KidPwPaneel store={store} onSetKidPw={onSetKidPw}/>}
      <div className="card" style={{marginBottom:16}}>
        <div className="row" style={{justifyContent:'space-between',alignItems:'center'}}>
          <span>⚔️ <b>Vriend uitdagen (wedstrijd via link)</b><div className="muted" style={{fontSize:12}}>Kind kan één vriend uitnodigen voor dezelfde quiz. Alleen een spelletje, geen persoonlijke gegevens.</div></span>
          <button className={'btn sm '+((store.wedstrijdAan!==false)?'':'ghost')} onClick={()=>persist(prev=>({...prev, wedstrijdAan: !(prev.wedstrijdAan!==false)}))}>{(store.wedstrijdAan!==false)?'Aan':'Uit'}</button>
        </div>
      </div>
      <div className="card" style={{marginBottom:16}}>
        <div className="row" style={{justifyContent:'space-between',alignItems:'center'}}>
          <span>🎮 <b>Speeltijd verdienen</b><div className="muted" style={{fontSize:12}}>Spelletjes pas beschikbaar nadat het dagdoel gehaald is.</div></span>
          <button className={'btn sm '+((store.spelNaDoel===true)?'':'ghost')} onClick={()=>persist(prev=>({...prev, spelNaDoel: !(prev.spelNaDoel===true)}))}>{(store.spelNaDoel===true)?'Aan':'Uit'}</button>
        </div>
      </div>
    </div>
  );
}
function ZomerPaneel({store,persist}){
  const z=store.zomer||{aan:false,start:null,weken:7,doel:50,bonus:15};
  function upd(patch){ persist(prev=>({...prev, zomer:{...(prev.zomer||{}), ...patch}})); }
  return (
    <div className="card" style={{marginBottom:16,background:'#fff7ea',borderLeftColor:'#e08a2b'}}>
      <div className="row" style={{justifyContent:'space-between',alignItems:'center'}}>
        <span>🏖️ <b>Zomer-challenge (vakantie)</b></span>
        <button className={'btn sm '+(z.aan?'':'ghost')} onClick={()=>upd({aan:!z.aan, start:z.start||todayISO()})}>{z.aan?'Aan':'Uit'}</button>
      </div>
      <p className="muted" style={{fontSize:13,marginTop:4}}>Elk kind spaart over ~{z.weken} weken naar een zomerdoel; bij het doel volgt een bonus. Zo staat er een leuk streefbedrag "na de vakantie" tegenover echt oefenen.</p>
      <div className="row" style={{gap:10,marginTop:8,flexWrap:'wrap'}}>
        <div style={{flex:1,minWidth:130}}><label className="fld">Startdatum</label>
          <input className="f" type="date" value={z.start||todayISO()} onChange={e=>upd({start:e.target.value})}/></div>
        <div style={{width:80}}><label className="fld">Weken</label>
          <input className="f" inputMode="numeric" value={z.weken} onChange={e=>upd({weken:Math.max(1,Number(String(e.target.value).replace(/\D/g,''))||7)})}/></div>
        <div style={{width:100}}><label className="fld">Doel (€)</label>
          <input className="f" inputMode="numeric" value={z.doel} onChange={e=>upd({doel:Number(String(e.target.value).replace(/\D/g,''))||0})}/></div>
        <div style={{width:100}}><label className="fld">Bonus (€)</label>
          <input className="f" inputMode="numeric" value={z.bonus} onChange={e=>upd({bonus:Number(String(e.target.value).replace(/\D/g,''))||0})}/></div>
      </div>
    </div>
  );
}
function KidPwPaneel({store,onSetKidPw}){
  const [vals,setVals]=useState(()=>{const o={};Object.keys(PROFILES).forEach(id=>o[id]=(store.kidpw&&store.kidpw[id])||'');return o;});
  const [msg,setMsg]=useState('');
  return (
    <div className="card" style={{marginBottom:16,background:'#faf3ff',borderLeftColor:'#9c3b7e'}}>
      <b>🔒 Wachtwoord per kind (om te starten)</b>
      <p className="muted" style={{fontSize:13,marginTop:4}}>Standaard is het wachtwoord <b>Bennaclan</b> voor iedereen. Hieronder per kind te wijzigen.</p>
      {Object.entries(PROFILES).map(([id,p])=>(
        <div key={id} className="row" style={{gap:8,alignItems:'center',marginTop:8}}>
          <span style={{width:110}}>{p.emoji} {p.naam}</span>
          <input className="f" style={{flex:1}} value={vals[id]} placeholder="Bennaclan"
            onChange={e=>setVals({...vals,[id]:e.target.value})}/>
          <button className="btn sm" onClick={()=>{onSetKidPw(id, vals[id]||STANDAARD_WACHTWOORD); setMsg('✅ Wachtwoord van '+p.naam+' opgeslagen.'); setTimeout(()=>setMsg(''),2000);}}>Opslaan</button>
        </div>
      ))}
      {msg && <div style={{color:'#2c7a2c',fontWeight:600,marginTop:8,fontSize:13}}>{msg}</div>}
    </div>
  );
}
function Author({store,persist,onBack,onSetWeekbudget,onMarkeerBetaald,onCorrigeerVerdiend,cloud,onSetKidPw,accApi,onReset}){
  const [unlocked,setUnlocked]=useState(false);
  const [pin,setPin]=useState('');
  const [form,setForm]=useState({p:'wassima',v:'wiskunde',t:'',lvl:'1',q:'',a:'',u:'',h1:'',h2:'',s:''});
  const [msg,setMsg]=useState('');
  const [impText,setImpText]=useState('');

  function tryPin(p){
    const np=(pin+p).slice(0,4); setPin(np);
    if(np.length===4){ if(np===store.pin){setUnlocked(true);} else {setMsg('Onjuiste PIN'); setTimeout(()=>{setPin('');setMsg('');},700);} }
  }

  if(!unlocked){
    return (
      <div>
        <button className="back" onClick={onBack}>← terug</button>
        <div className="center" style={{marginTop:30}}>
          <h2>Ouder-modus</h2>
          <p className="muted">Voer de PIN in (standaard 1234)</p>
          <div className="pindots">{'●'.repeat(pin.length)}{'○'.repeat(4-pin.length)}</div>
          {msg && <div style={{color:'var(--accent)',fontWeight:600}}>{msg}</div>}
          <div className="pinpad">
            {['1','2','3','4','5','6','7','8','9'].map(n=><button key={n} onClick={()=>tryPin(n)}>{n}</button>)}
            <button onClick={()=>setPin('')}>C</button>
            <button onClick={()=>tryPin('0')}>0</button>
            <button onClick={()=>setPin(pin.slice(0,-1))}>⌫</button>
          </div>
        </div>
      </div>
    );
  }

  const vakkenVoor = PROFILES[form.p].vakken;
  const bestaandeTopics = [...new Set([...SEED,...store.custom].filter(e=>e.p===form.p&&e.v===form.v).map(e=>e.t))];

  function voegToe(){
    if(!form.q.trim()||!form.a.trim()||!form.t.trim()){setMsg('Vul minstens onderwerp, vraag en antwoord in.');return;}
    const ex={id:'cust_'+Date.now(), p:form.p, v:form.v, t:form.t.trim(), lvl:Number(form.lvl)||1,
      q:form.q.trim(), a:form.a.trim(), u:form.u.trim()||undefined,
      h:[form.h1.trim(),form.h2.trim()].filter(Boolean), s:form.s.trim()||'(geen uitwerking toegevoegd)'};
    persist(prev=>({...prev, custom:[...prev.custom, ex]}));
    setForm({...form,t:form.t,q:'',a:'',u:'',h1:'',h2:'',s:''});
    setMsg('✅ Opgave toegevoegd — staat meteen klaar voor '+PROFILES[form.p].naam+'.');
    setTimeout(()=>setMsg(''),2500);
  }
  function verwijder(id){persist(prev=>({...prev, custom:prev.custom.filter(e=>e.id!==id)}));}
  function exporteer(){
    const blob=new Blob([JSON.stringify(store.custom,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='oefeningen-export.json'; a.click();
  }
  function importeer(){
    try{const arr=JSON.parse(impText); if(!Array.isArray(arr)) throw 0;
      persist(prev=>({...prev, custom:[...prev.custom, ...arr]}));
      setImpText(''); setMsg('✅ '+arr.length+' opgaven geïmporteerd.'); setTimeout(()=>setMsg(''),2500);
    }catch(e){setMsg('Kon JSON niet lezen.');}
  }

  return (
    <div>
      <div className="topbar"><button className="back" onClick={onBack}>← terug</button><span className="pill">Ouder-modus</span></div>
      <OuderDashboard store={store} persist={persist} onSetWeekbudget={onSetWeekbudget} onMarkeerBetaald={onMarkeerBetaald} onCorrigeerVerdiend={onCorrigeerVerdiend} cloud={cloud} onSetKidPw={onSetKidPw} accApi={accApi} onReset={onReset}/>
      <h2>Nieuwe opdracht toevoegen</h2>

      <div className="card" style={{marginTop:12}}>
        <div className="row" style={{gap:10}}>
          <div style={{flex:1}}>
            <label className="fld">Voor wie</label>
            <select className="f" value={form.p} onChange={e=>{const p=e.target.value;setForm({...form,p,v:PROFILES[p].vakken[0]});}}>
              {Object.entries(PROFILES).map(([id,p])=><option key={id} value={id}>{p.naam} ({p.niveau})</option>)}
            </select>
          </div>
          <div style={{flex:1}}>
            <label className="fld">Vak</label>
            <select className="f" value={form.v} onChange={e=>setForm({...form,v:e.target.value})}>
              {vakkenVoor.map(v=><option key={v} value={v}>{VAKNAAM[v]}</option>)}
            </select>
          </div>
        </div>
        <div className="row" style={{gap:10}}>
          <div style={{flex:2}}>
            <label className="fld">Onderwerp</label>
            <input className="f" list="tlist" value={form.t} onChange={e=>setForm({...form,t:e.target.value})} placeholder="bijv. Procenten"/>
            <datalist id="tlist">{bestaandeTopics.map(t=><option key={t} value={t}/>)}</datalist>
          </div>
          <div style={{flex:1}}>
            <label className="fld">Niveau</label>
            <select className="f" value={form.lvl} onChange={e=>setForm({...form,lvl:e.target.value})}>
              <option value="1">1 (makkelijk)</option><option value="2">2 (middel)</option><option value="3">3 (moeilijk)</option>
            </select>
          </div>
        </div>
        <label className="fld">Vraag</label>
        <textarea className="f" value={form.q} onChange={e=>setForm({...form,q:e.target.value})} placeholder="Typ hier de opgave…"/>
        <div className="row" style={{gap:10}}>
          <div style={{flex:2}}>
            <label className="fld">Antwoord</label>
            <input className="f" value={form.a} onChange={e=>setForm({...form,a:e.target.value})} placeholder="bijv. 30"/>
          </div>
          <div style={{flex:1}}>
            <label className="fld">Eenheid (optioneel)</label>
            <input className="f" value={form.u} onChange={e=>setForm({...form,u:e.target.value})} placeholder="bijv. cm²"/>
          </div>
        </div>
        <label className="fld">Hint 1 (optioneel)</label>
        <input className="f" value={form.h1} onChange={e=>setForm({...form,h1:e.target.value})}/>
        <label className="fld">Hint 2 (optioneel)</label>
        <input className="f" value={form.h2} onChange={e=>setForm({...form,h2:e.target.value})}/>
        <label className="fld">Uitwerking (stap voor stap)</label>
        <textarea className="f" value={form.s} onChange={e=>setForm({...form,s:e.target.value})} placeholder="Laat de tussenstappen zien…"/>
        {msg && <div style={{marginTop:12,fontWeight:600,color:'var(--primary-dark)'}}>{msg}</div>}
        <div style={{marginTop:14}}><button className="btn" onClick={voegToe}>+ Opgave toevoegen</button></div>
      </div>

      <h3 style={{marginTop:24}}>Mijn toegevoegde opgaven ({store.custom.length})</h3>
      <div style={{marginTop:10}}>
        {store.custom.length===0 && <p className="muted">Nog niets toegevoegd.</p>}
        {store.custom.map(e=>(
          <div key={e.id} className="exrow">
            <div className="grow" style={{flex:1}}>
              <span className="tag">{PROFILES[e.p].naam}</span> <span className="tag">{VAKNAAM[e.v]}</span> <span className="tag">{e.t}</span>
              <div style={{marginTop:4}}>{e.q}</div>
              <div className="muted" style={{fontSize:13}}>antwoord: {e.a} {e.u||''}</div>
            </div>
            <button className="btn accent sm" onClick={()=>verwijder(e.id)}>verwijder</button>
          </div>
        ))}
      </div>

      <div className="card" style={{marginTop:20}}>
        <b>Opslaan &amp; delen (back-up)</b>
        <p className="muted" style={{fontSize:13,marginTop:6}}>De opgaven staan in deze browser. Exporteer ze om te bewaren of op het apparaat van je dochter te zetten.</p>
        <div className="wrap" style={{marginTop:8}}>
          <button className="btn ghost sm" onClick={exporteer}>⬇️ Exporteer naar bestand</button>
        </div>
        <label className="fld">Importeren — plak hier een eerder geëxporteerde JSON</label>
        <textarea className="f" value={impText} onChange={e=>setImpText(e.target.value)} placeholder='[ {"p":"wassima", ...} ]'/>
        <div style={{marginTop:8}}><button className="btn ghost sm" onClick={importeer} disabled={!impText.trim()}>⬆️ Importeren</button></div>
      </div>
    </div>
  );
}

/* ---------- FORMULES & UITLEG ---------- */
const FORMULEBLOKKEN=[
  {kop:'Oppervlakte & omtrek', items:[
    ['Rechthoek','opp = l × b   ·   omtrek = 2 × (l + b)'],
    ['Vierkant','opp = z²   ·   omtrek = 4 × z'],
    ['Driehoek','opp = ½ × basis × hoogte'],
    ['Parallellogram','opp = basis × hoogte'],
    ['Trapezium','opp = ½ × (a + c) × hoogte'],
    ['Cirkel','opp = π × r²   ·   omtrek = 2 × π × r   (π ≈ 3,14)'],
  ]},
  {kop:'Pythagoras (rechthoekige driehoek)', items:[
    ['Schuine zijde c','a² + b² = c²  →  c = √(a² + b²)'],
    ['Rechthoekszijde','a = √(c² − b²)'],
  ]},
  {kop:'Hoeken', items:[
    ['Driehoek','som van de hoeken = 180°'],
    ['Vierhoek','som van de hoeken = 360°'],
    ['Bij evenwijdige lijnen','F-hoeken gelijk · Z-hoeken gelijk · overstaande hoeken gelijk'],
  ]},
  {kop:'Inhoud (ruimtefiguren)', items:[
    ['Balk','inhoud = l × b × h'],
    ['Kubus','inhoud = z³'],
    ['Prisma / cilinder','inhoud = oppervlakte grondvlak × hoogte'],
    ['Cilinder','inhoud = π × r² × h'],
  ]},
  {kop:'Rekenen & verbanden', items:[
    ['Procent','% = (deel ÷ geheel) × 100'],
    ['Groeifactor','erbij p%: 1 + p/100   ·   eraf p%: 1 − p/100   ·   nieuw = oud × factor'],
    ['Rechte lijn','y = a·x + b   (a = hellingsgetal, b = startgetal)'],
    ['Hellingsgetal','a = (y₂ − y₁) ÷ (x₂ − x₁)'],
    ['Exponentieel','N = beginwaarde × groeifactorᵗ'],
    ['Statistiek','gemiddelde = som ÷ aantal · mediaan = middelste · modus = meest voorkomend'],
  ]},
  {kop:'Wiskunde A — verandering & afgeleide', items:[
    ['Differentiequotiënt','(f(b) − f(a)) ÷ (b − a)   (gemiddelde verandering op [a,b])'],
    ['Afgeleide van xⁿ','f(x) = xⁿ  →  f′(x) = n·xⁿ⁻¹'],
    ['Helling in een punt','de helling van de grafiek in x is f′(x)'],
    ['Exponentiële groei','per n perioden: groeifactor = gⁿ   ·   procent = (g − 1) × 100%'],
  ]},
  {kop:'Wiskunde A — kans & statistiek', items:[
    ['Kans','P = aantal gunstig ÷ aantal mogelijk'],
    ['Faculteit','n! = n × (n−1) × … × 2 × 1   (aantal volgordes)'],
    ['Verwachtingswaarde','E = som van (kans × waarde)'],
    ['Centrummaten','gemiddelde = som ÷ aantal · mediaan = middelste · modus = vaakst'],
  ]},
  {kop:'Natuurkunde — beweging & kracht', items:[
    ['Snelheid','v = s / t   (km/u → m/s: ÷ 3,6)'],
    ['Versnelling','a = Δv / t'],
    ['Eenparig versneld','v = v₀ + a·t   ·   vanuit stilstand: s = ½·a·t²'],
    ['Dichtheid','ρ = m / V'],
    ['Kracht (Newton)','F = m × a'],
    ['Zwaartekracht','Fz = m × g   (g ≈ 9,81 N/kg)'],
    ['Nettokracht','tel krachten met richting op (rechts − links)'],
  ]},
  {kop:'Natuurkunde — energie & warmte', items:[
    ['Arbeid','W = F × s'],
    ['Kinetische energie','Ek = ½ × m × v²'],
    ['Zwaarte-energie','Ez = m × g × h'],
    ['Veerenergie','Ev = ½ × C × u²'],
    ['Energiebehoud (vrije val)','½mv² = mgh  →  v = √(2gh)'],

function FormulesView({onBack}){
  return (
    <div>
      <div className="topbar"><button className="back" onClick={onBack}>← terug</button><span className="pill">Formules &amp; uitleg</span></div>

      <div className="card" style={{marginTop:12,borderLeft:'4px solid var(--accent)'}}>

        <div style={{marginTop:8,fontSize:15,lineHeight:1.7}}>
          <b>1. Gegeven</b> — schrijf op wat je weet, mét eenheid.<br/>
          <b>2. Gevraagd</b> — wat moet je uitrekenen?<br/>
          <b>3. Formule</b> — kies de formule, schrijf hem eerst leeg op.<br/>
          <b>4. Uitwerking</b> — invullen, uitrekenen, eenheid erachter, en vraag: <i>“is dit logisch?”</i>
        </div>
      </div>

      {FORMULEBLOKKEN.map(blok=>(
        <div key={blok.kop} className="card" style={{marginTop:12}}>
          <b>{blok.kop}</b>
          <div style={{marginTop:8}}>
            {blok.items.map(([naam,f])=>(
              <div key={naam} style={{display:'flex',gap:10,alignItems:'baseline',padding:'5px 0',borderTop:'1px solid var(--line)'}}>
                <div style={{flex:'0 0 38%',fontWeight:600,fontSize:14}}>{naam}</div>
                <div className="formule" style={{flex:1,fontSize:14}}>{f}</div>

      <p className="muted center" style={{marginTop:16,fontSize:13}}>

    </div>
  );
}

function Figure({ill}){
  const G='#5EA03A', A='#C23728', M='#5b6157', F='#eaf3e2';
  const cm=x=>x==='?'?'? cm':x+' cm';
  const deg=x=>x==='?'?'?':x+'°';
  switch(ill.type){
    case 'rechthoek': return (
      <svg width="190" height="118" viewBox="0 0 190 118" role="img" aria-label="rechthoek">
        <rect x="22" y="26" width="130" height="66" fill={F} stroke={G} strokeWidth="2.5"/>
        <text x="87" y="18" fontSize="13" textAnchor="middle" fill={M}>{cm(ill.l)}</text>
        <text x="14" y="59" fontSize="13" textAnchor="middle" fill={M} transform="rotate(-90 14 59)">{cm(ill.b)}</text>
      </svg>);
    case 'driehoek': return (
      <svg width="190" height="132" viewBox="0 0 190 132" role="img" aria-label="driehoek">
        <polygon points="28,104 162,104 86,30" fill={F} stroke={G} strokeWidth="2.5"/>
        <line x1="86" y1="30" x2="86" y2="104" stroke={A} strokeWidth="1.6" strokeDasharray="4 4"/>
        <rect x="86" y="94" width="10" height="10" fill="none" stroke={A} strokeWidth="1"/>
        <text x="95" y="122" fontSize="13" textAnchor="middle" fill={M}>basis {cm(ill.basis)}</text>
        <text x="98" y="70" fontSize="12" fill={A}>h {cm(ill.hoogte)}</text>
      </svg>);
    case 'cirkel': return (
      <svg width="170" height="150" viewBox="0 0 170 150" role="img" aria-label="cirkel">
        <circle cx="85" cy="72" r="54" fill={F} stroke={G} strokeWidth="2.5"/>
        <circle cx="85" cy="72" r="2.6" fill="#222"/>
        <line x1="85" y1="72" x2="139" y2="72" stroke={A} strokeWidth="2"/>
        <text x="104" y="66" fontSize="13" fill={A}>r = {ill.r} cm</text>
      </svg>);
    case 'pyth': return (
      <svg width="200" height="140" viewBox="0 0 200 140" role="img" aria-label="rechthoekige driehoek">
        <polygon points="32,112 162,112 32,30" fill={F} stroke={G} strokeWidth="2.5"/>
        <rect x="32" y="100" width="12" height="12" fill="none" stroke={A} strokeWidth="1.2"/>
        <text x="97" y="130" fontSize="13" textAnchor="middle" fill={M}>{cm(ill.a)}</text>
        <text x="14" y="74" fontSize="13" fill={M}>{cm(ill.b)}</text>
        <text x="104" y="64" fontSize="13" fill={A} fontWeight="bold">{cm(ill.c)}</text>
      </svg>);
    case 'hoeken': return (
      <svg width="190" height="118" viewBox="0 0 190 118" role="img" aria-label="driehoek met hoeken">
        <polygon points="22,96 168,96 74,26" fill={F} stroke={G} strokeWidth="2.5"/>
        <text x="40" y="89" fontSize="13" fill={A}>{deg(ill.h[0])}</text>
        <text x="150" y="89" fontSize="13" textAnchor="end" fill={A}>{deg(ill.h[1])}</text>
        <text x="74" y="46" fontSize="13" textAnchor="middle" fill={A}>{deg(ill.h[2])}</text>
      </svg>);
    case 'vierhoek': return (
      <svg width="190" height="120" viewBox="0 0 190 120" role="img" aria-label="vierhoek met hoeken">
        <polygon points="26,96 152,102 166,30 44,22" fill={F} stroke={G} strokeWidth="2.5"/>
        <text x="40" y="88" fontSize="12" fill={A}>{deg(ill.h[0])}</text>
        <text x="146" y="92" fontSize="12" textAnchor="end" fill={A}>{deg(ill.h[1])}</text>
        <text x="158" y="44" fontSize="12" textAnchor="end" fill={A}>{deg(ill.h[2])}</text>
        <text x="50" y="38" fontSize="12" fill={A}>{deg(ill.h[3])}</text>
      </svg>);
    case 'balk': return (
      <svg width="190" height="132" viewBox="0 0 190 132" role="img" aria-label="balk">
        <polygon points="34,58 116,58 116,108 34,108" fill={F} stroke={G} strokeWidth="2.5"/>
        <polygon points="34,58 64,32 146,32 116,58" fill="#d9ead0" stroke={G} strokeWidth="2.5"/>
        <polygon points="116,58 146,32 146,82 116,108" fill="#c9dec0" stroke={G} strokeWidth="2.5"/>
        <text x="75" y="124" fontSize="12" textAnchor="middle" fill={M}>l {ill.l}</text>
        <text x="150" y="78" fontSize="12" fill={M}>b {ill.b}</text>
        <text x="20" y="86" fontSize="12" fill={M}>h {ill.h}</text>
      </svg>);
    case 'kubus': return (
      <svg width="170" height="132" viewBox="0 0 170 132" role="img" aria-label="kubus">
        <polygon points="40,58 100,58 100,108 40,108" fill={F} stroke={G} strokeWidth="2.5"/>
        <polygon points="40,58 66,34 126,34 100,58" fill="#d9ead0" stroke={G} strokeWidth="2.5"/>
        <polygon points="100,58 126,34 126,84 100,108" fill="#c9dec0" stroke={G} strokeWidth="2.5"/>
        <text x="70" y="124" fontSize="12" textAnchor="middle" fill={M}>z {ill.z} cm</text>
      </svg>);
    case 'getallenlijn': {
      const van=ill.van, tot=ill.tot, n=tot-van, W=290, pad=18, span=W-2*pad, step=span/n;
      const x=i=>pad+(i-van)*step, ticks=[];
      for(let i=van;i<=tot;i++) ticks.push(i);
      return (
        <svg width={W} height="58" viewBox={'0 0 '+W+' 58'} role="img" aria-label="getallenlijn">
          <line x1={pad} y1="28" x2={W-pad} y2="28" stroke={M} strokeWidth="2"/>
          <line x1={x(0)} y1="20" x2={x(0)} y2="36" stroke={M} strokeWidth="2.5"/>
          {ticks.map(i=>(<g key={i}>
            <line x1={x(i)} y1="23" x2={x(i)} y2="33" stroke={M} strokeWidth="1.4"/>
            <text x={x(i)} y="50" fontSize="11" textAnchor="middle" fill={i===0?'#222':M}>{i}</text>
          </g>))}
          {ill.punt!==undefined && <circle cx={x(ill.punt)} cy="28" r="5.5" fill={A}/>}
        </svg>);
    }
    case 'klok': {
      const u=((ill.uur||0)%12), m=ill.min||0, cx=70, cy=70;
      const ma=(m/60)*2*Math.PI - Math.PI/2, ha=((u+m/60)/12)*2*Math.PI - Math.PI/2;
      const hx=cx+Math.cos(ha)*30, hy=cy+Math.sin(ha)*30, mx=cx+Math.cos(ma)*46, my=cy+Math.sin(ma)*46;
      const ticks=[]; for(let i=0;i<12;i++){const a=i/12*2*Math.PI-Math.PI/2; ticks.push([cx+Math.cos(a)*52,cy+Math.sin(a)*52,cx+Math.cos(a)*58,cy+Math.sin(a)*58]);}
      return (
        <svg width="140" height="140" viewBox="0 0 140 140" role="img" aria-label="klok">
          <circle cx={cx} cy={cy} r="60" fill="#fff" stroke={G} strokeWidth="3"/>
          {ticks.map((t,i)=><line key={i} x1={t[0]} y1={t[1]} x2={t[2]} y2={t[3]} stroke={M} strokeWidth="2"/>)}
          <line x1={cx} y1={cy} x2={hx} y2={hy} stroke="#222" strokeWidth="4.5" strokeLinecap="round"/>
          <line x1={cx} y1={cy} x2={mx} y2={my} stroke={A} strokeWidth="3" strokeLinecap="round"/>
          <circle cx={cx} cy={cy} r="3.5" fill="#222"/>
        </svg>);
    }
    case 'breukstrook': {
      const d=ill.delen, g=ill.gevuld, W=240, hh=42, w=W/d, rc=[];
      for(let i=0;i<d;i++) rc.push(i);
      return (
        <svg width={W} height={hh+8} viewBox={'0 0 '+W+' '+(hh+8)} role="img" aria-label="breuk">
          {rc.map(i=>(<rect key={i} x={i*w} y="4" width={w} height={hh} fill={i<g?G:F} stroke={M} strokeWidth="1.5"/>))}
        </svg>);
    }
    case 'geodriehoek': {
      const hoek=typeof ill.hoek==='number'?ill.hoek:40, cx=34, cy=112, L=150, rad=hoek*Math.PI/180, arcR=40;
      const ex=cx+L, ey=cy;
      const ax=cx+L*Math.cos(-rad), ay=cy+L*Math.sin(-rad);
      const a0x=cx+arcR, a0y=cy, a1x=cx+arcR*Math.cos(-rad), a1y=cy+arcR*Math.sin(-rad);
      const large=hoek>180?1:0;
      const lx=cx+(arcR+16)*Math.cos(-rad/2), ly=cy+(arcR+16)*Math.sin(-rad/2);
      return (
        <svg width="200" height="140" viewBox="0 0 200 140" role="img" aria-label={'hoek van '+(ill.hoek==='?'?'?':hoek+' graden')}>
          <line x1={cx} y1={cy} x2={ex} y2={ey} stroke={G} strokeWidth="2.5"/>
          <line x1={cx} y1={cy} x2={ax.toFixed(1)} y2={ay.toFixed(1)} stroke={G} strokeWidth="2.5"/>
          <path d={`M ${a0x} ${a0y} A ${arcR} ${arcR} 0 ${large} 0 ${a1x.toFixed(1)} ${a1y.toFixed(1)}`} fill="none" stroke={A} strokeWidth="2"/>
          <text x={lx.toFixed(1)} y={ly.toFixed(1)} fontSize="14" textAnchor="middle" fill={A} fontWeight="bold">{ill.hoek==='?'?'?':hoek+'°'}</text>
        </svg>);
    }
    case 'lijngrafiek': {
      const pts=ill.punten||[], xs=pts.map(p=>p[0]), ys=pts.map(p=>p[1]);
      const W=270,H=150,padL=32,padB=26,padT=12,padR=12;
      const xmin=Math.min.apply(null,xs), xmax=Math.max.apply(null,xs), ymax=Math.max.apply(null,ys.concat([1]));
      const px=x=>padL+((x-xmin)/((xmax-xmin)||1))*(W-padL-padR);
      const py=y=>H-padB-(y/ymax)*(H-padB-padT);
      const poly=pts.map(p=>px(p[0]).toFixed(1)+','+py(p[1]).toFixed(1)).join(' ');
      return (
        <svg width={W} height={H} viewBox={'0 0 '+W+' '+H} role="img" aria-label="lijngrafiek">
          <line x1={padL} y1={padT} x2={padL} y2={H-padB} stroke={M} strokeWidth="1.5"/>
          <line x1={padL} y1={H-padB} x2={W-padR} y2={H-padB} stroke={M} strokeWidth="1.5"/>
          <polyline points={poly} fill="none" stroke={G} strokeWidth="2.5"/>
          {pts.map((p,i)=>(<g key={i}><circle cx={px(p[0])} cy={py(p[1])} r="3.2" fill={A}/>
            <text x={px(p[0])} y={H-padB+14} fontSize="11" textAnchor="middle" fill={M}>{p[0]}</text></g>))}
          {ill.ylabel && <text x={padL-4} y={padT+2} fontSize="10" textAnchor="end" fill={M}>{ill.ylabel}</text>}
          {ill.xlabel && <text x={W-padR} y={H-6} fontSize="10" textAnchor="end" fill={M}>{ill.xlabel}</text>}
        </svg>);
    }
    case 'breukcirkel': {
      const d=Math.max(1,ill.delen), g=Math.min(d,Math.max(0,ill.gevuld)), cx=85, cy=72, r=54;
      const pt=(ang)=>[cx+r*Math.cos(ang), cy+r*Math.sin(ang)];
      const slices=[];
      for(let i=0;i<d;i++){
        const a0=-Math.PI/2 + i*(2*Math.PI/d), a1=-Math.PI/2 + (i+1)*(2*Math.PI/d);
        const [x0,y0]=pt(a0), [x1,y1]=pt(a1), large=(a1-a0)>Math.PI?1:0;
        slices.push({key:i, dstr:`M ${cx} ${cy} L ${x0.toFixed(2)} ${y0.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x1.toFixed(2)} ${y1.toFixed(2)} Z`, vol:i<g});
      }
      return (
        <svg width="170" height="150" viewBox="0 0 170 150" role="img" aria-label={'breuk '+g+' van '+d}>
          {slices.map(s=>(<path key={s.key} d={s.dstr} fill={s.vol?G:F} stroke={M} strokeWidth="1.6"/>))}
          <text x="85" y="142" fontSize="13" textAnchor="middle" fill={M} fontWeight="bold">{g}/{d}</text>
        </svg>);
    }
    case 'staaf': {
      const data=ill.data, n=data.length, max=Math.max.apply(null,data.map(d=>d[1]).concat([1]));
      const pad=22, bw=30, gap=22, baseY=120, top=16, chartH=baseY-top, W=pad*2 + n*bw + (n-1)*gap;
      return (
        <svg width={W} height="150" viewBox={'0 0 '+W+' 150'} role="img" aria-label="staafdiagram">
          <line x1={pad-6} y1={baseY} x2={W-pad+6} y2={baseY} stroke={M} strokeWidth="2"/>
          {data.map((d,i)=>{const h=d[1]/max*chartH, x=pad+i*(bw+gap), y=baseY-h; return (<g key={i}>
            <rect x={x} y={y} width={bw} height={h} fill={F} stroke={G} strokeWidth="2"/>
            <text x={x+bw/2} y={y-4} fontSize="12" textAnchor="middle" fill={M} fontWeight="bold">{d[1]}</text>
            <text x={x+bw/2} y={baseY+15} fontSize="12" textAnchor="middle" fill={M}>{d[0]}</text>
          </g>);})}
        </svg>);
    }
    default: return null;
  }
}
const UITLEG={

function UitlegPaneel({data,open,onToggle}){
  return (
    <div className="card" style={{marginBottom:12,background:'#f0f6ea',borderLeftColor:'#5EA03A'}}>
      <div className="row" style={{justifyContent:'space-between',cursor:'pointer'}} onClick={onToggle}>
        <b>📖 Eerst even uitleg</b><span>{open?'▲':'▼'}</span>
      </div>
      {open && <div style={{marginTop:10}}>
        {data.ill && <div style={{textAlign:'center',marginBottom:8}}><Figure ill={data.ill}/></div>}
        <div style={{fontSize:15}}>{data.tekst}</div>
      </div>}
    </div>
  );
}

  return (
    <div>
      <div className="topbar"><button className="back" onClick={onBack}>← terug</button><span className="pill">Leertips</span></div>
      <h1 style={{fontSize:24}}>💡 Leertips</h1>
      <p className="muted" style={{marginTop:4}}>Kleine gewoontes, groot verschil. Lees er af en toe één — niet alles tegelijk.</p>
      {TIPS_CATS.map(cat=>(
        <div key={cat.kop} className="card" style={{marginTop:12}}>
          <b>{cat.emoji} {cat.kop}</b>
          <div style={{marginTop:8}}>
            {cat.tips.map(([t,u])=>(
              <div key={t} style={{padding:'8px 0',borderTop:'1px solid var(--line)'}}>
                <div style={{fontWeight:600}}>{t}</div>
                <div className="muted" style={{fontSize:14}}>{u}</div>
              </div>
            ))}
          </div>
        </div>
      ))}
      <p className="muted center" style={{marginTop:16,fontSize:13}}>
        De beste tip? Begin gewoon. Eén som is altijd beter dan geen som. 🌟
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
