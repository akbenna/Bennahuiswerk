<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Oefenapp — Wassima &amp; Amaani</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --primary:#5EA03A; --primary-dark:#48792c; --accent:#C23728;
    --blue:#3a6ea0; --blue-dark:#2c5680;
    --ink:#23271f; --muted:#6b7163; --line:#e6eade; --bg:#f4f7ef; --card:#fff;
    --gold:#e0a23a; --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'DM Sans',-apple-system,Segoe UI,Roboto,sans-serif;
    color:var(--ink); background:var(--bg);
    min-height:100vh; line-height:1.5;
  }
  #root{max-width:760px;margin:0 auto;padding:16px 16px 60px;}
  h1,h2,h3{font-family:'Playfair Display',Georgia,serif;margin:0;}
  button{font-family:inherit;cursor:pointer;border:none;}
  .btn{
    background:var(--primary);color:#fff;border-radius:999px;
    padding:12px 22px;font-size:16px;font-weight:700;transition:transform .08s, filter .15s;
  }
  .btn:active{transform:scale(.97);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line);}
  .btn.accent{background:var(--accent);}
  .btn.gold{background:var(--gold);}
  .btn.sm{padding:8px 16px;font-size:14px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;}
  .row{display:flex;gap:10px;align-items:center;}
  .wrap{display:flex;flex-wrap:wrap;gap:10px;}
  .pill{background:#eef4e7;color:var(--primary-dark);border-radius:999px;padding:4px 12px;font-size:13px;font-weight:600;}
  .muted{color:var(--muted);}
  .center{text-align:center;}
  /* top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:8px;}
  .back{background:none;color:var(--muted);font-size:15px;font-weight:600;padding:6px 4px;}
  .scorechip{display:flex;gap:10px;align-items:center;}
  .scorechip .s{background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-weight:700;font-size:14px;}
  /* profile cards */
  .profcard{
    flex:1;min-width:220px;border-radius:var(--radius);padding:22px;color:#fff;cursor:pointer;
    transition:transform .1s; position:relative;overflow:hidden;
  }
  .profcard:active{transform:scale(.98);}
  .profcard:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.16);}
  .profcard .emoji{font-size:46px;}
  .profcard h2{color:#fff;font-size:26px;margin:6px 0 2px;}
  .profcard .niv{opacity:.92;font-weight:600;}
  .profcard .vakken{margin-top:10px;font-size:13px;opacity:.92;}
  /* levendige landingspagina */
  .hero{border-radius:var(--radius);padding:22px;text-align:center;color:#fff;
    background:linear-gradient(120deg,#5EA03A,#3a6ea0 55%,#c94f9a);background-size:200% 200%;animation:heroShift 12s ease infinite;box-shadow:0 8px 24px rgba(0,0,0,.14);}
  @keyframes heroShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  .miniprog{height:10px;background:rgba(255,255,255,.35);border-radius:999px;overflow:hidden;margin-top:8px;}
  .miniprog i{display:block;height:100%;background:#fff;border-radius:999px;transition:width .5s;}
  .medal{font-size:18px;}
  .rankrow{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:12px;background:#fff;border:1px solid var(--line);margin-top:8px;}
  .gamecell{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:30px;border-radius:12px;
    background:#fff;border:2px solid var(--line);cursor:pointer;user-select:none;transition:transform .08s,background .15s;}
  .gamecell:active{transform:scale(.94);}
  .gamegrid{display:grid;gap:8px;margin-top:12px;}
  .mole{background:#eaf3e2;border-color:#bcd9a6;}
  .mole.up{background:#5EA03A;border-color:#48792c;box-shadow:0 4px 10px rgba(94,160,58,.4);}
  /* topic */
  .topic{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--line);border-radius:var(--radius);background:#fff;margin-bottom:10px;cursor:pointer;transition:transform .08s,border-color .15s;}
  .topic:active{transform:scale(.99);}
  .topic .ico{font-size:26px;width:34px;text-align:center;}
  .topic .grow{flex:1;min-width:0;}
  .topic .tt{font-weight:700;}
  .stars{letter-spacing:2px;font-size:14px;}
  .pbar{height:8px;background:#eef1ea;border-radius:999px;overflow:hidden;margin-top:6px;}
  .pbar > i{display:block;height:100%;background:var(--primary);border-radius:999px;transition:width .4s;}
  /* practice */
  .qbox{font-size:20px;font-weight:500;line-height:1.5;white-space:pre-wrap;}
  .answerrow{display:flex;gap:10px;margin-top:18px;align-items:stretch;}
  .answerrow input{
    flex:1;font-family:inherit;font-size:20px;padding:14px 16px;border:2px solid var(--line);
    border-radius:14px;outline:none;min-width:0;
  }
  .answerrow input:focus{border-color:var(--primary);}
  .unit{display:flex;align-items:center;padding:0 14px;background:#eef4e7;border-radius:14px;font-weight:700;color:var(--primary-dark);}
  /* meerkeuze */
  .optiegrid{display:flex;flex-direction:column;gap:9px;margin-top:16px;}
  .optiebtn{text-align:left;padding:13px 16px;border:2px solid var(--line);border-radius:13px;background:#fff;font-size:17px;font-weight:500;transition:transform .06s,border-color .15s;}
  .optiebtn:active{transform:scale(.99);}
  .optiebtn.sel{border-color:var(--primary);background:#eef4e7;font-weight:700;}
  .optiebtn:disabled{opacity:.6;cursor:not-allowed;}
  .hint{background:#fff7e8;border:1px solid #f0d9a8;border-left:4px solid var(--gold);border-radius:12px;padding:12px 14px;margin-top:12px;font-size:15px;}
  .hint b{color:#a9741a;}
  .feedback{border-radius:12px;padding:14px 16px;margin-top:14px;font-weight:600;font-size:16px;}
  .feedback.ok{background:#eaf7e2;border:1px solid #b9e3a0;color:#2f6d18;}
  .feedback.no{background:#fdecea;border:1px solid #f3c2bd;color:#9c2b20;}
  .solution{background:#f4f7ef;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-top:12px;font-size:15px;white-space:pre-wrap;}
  .formule{font-family:'Cambria Math',Georgia,serif;font-weight:700;color:var(--primary-dark);background:#eef4e7;border-radius:8px;padding:2px 7px;display:inline-block;}
  /* celebrate */
  @keyframes pop{0%{transform:scale(.4);opacity:0}50%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
  .celebrate{animation:pop .4s ease-out;font-size:56px;text-align:center;}
  @keyframes floatup{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-120px);opacity:0}}
  .confetti{position:fixed;top:40%;left:0;right:0;pointer-events:none;text-align:center;z-index:50;}
  .confetti span{display:inline-block;font-size:30px;margin:0 6px;animation:floatup 1.1s ease-out forwards;}
  /* badges */
  .badge{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px;font-weight:600;}
  .badge.locked{opacity:.4;}
  /* author */
  label.fld{display:block;margin:12px 0 4px;font-weight:600;font-size:14px;}
  input.f,select.f,textarea.f{
    width:100%;font-family:inherit;font-size:15px;padding:10px 12px;border:1.5px solid var(--line);
    border-radius:10px;outline:none;background:#fff;
  }
  input.f:focus,select.f:focus,textarea.f:focus{border-color:var(--primary);}
  textarea.f{min-height:70px;resize:vertical;}
  .pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:16px auto;}
  .pinpad button{font-size:22px;padding:16px;border-radius:14px;background:#fff;border:1.5px solid var(--line);font-weight:700;}
  .pindots{font-size:30px;letter-spacing:10px;text-align:center;height:34px;}
  .exrow{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;font-size:14px;}
  .tag{font-size:11px;background:#eef1ea;border-radius:6px;padding:2px 6px;font-weight:600;color:var(--muted);}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useMemo,useRef} = React;

/* ============================ CONFIG ============================ */
const PROFILES = {
  wassima:{naam:'Wassima', niveau:'2 havo', volgend:'3 havo', emoji:'🌱', kleur:'linear-gradient(135deg,#5EA03A,#48792c)', vakken:['wiskunde','natuurkunde','nederlands','engels','frans','duits','biologie','aardrijkskunde','geschiedenis','economie'], beloning:true},
  amaani: {naam:'Amaani',  niveau:'4 vwo',  volgend:'5 vwo',  emoji:'🚀', kleur:'linear-gradient(135deg,#3a6ea0,#2c5680)', vakken:['wiskundeA','natuurkunde','scheikunde','nederlands','engels','frans','biologie','aardrijkskunde','geschiedenis','economie'], beloning:true},
  amine:  {naam:'Amine',   niveau:'groep 7', volgend:'groep 8', emoji:'⚽', kleur:'linear-gradient(135deg,#2e8b57,#1f6e43)', vakken:['rekenen','taal','lezen','studievaardigheden','engels'], thema:'voetbal', beloning:true},
  selma:  {naam:'Selma',   niveau:'groep 4', volgend:'groep 5', emoji:'🌸', kleur:'linear-gradient(135deg,#d95b9a,#b34584)', vakken:['rekenen','taal','lezen'], beloning:true},
};

/* ============================ THEMA'S (motivatie) ============================ */
/* Per profiel een thema. Amine = voetbal/game: XP, rangen, doelpunten, voetbal-feedback. */
const THEMES = {
  standaard:{ xp:'punten', doel:'sommen', goal:'✅ Goed gedaan!', feest:['🎉','⭐','🎊','✨','👏'],
    rangen:[[0,'Starter','🌱'],[100,'Op dreef','⭐'],[250,'Kanjer','🌟'],[500,'Uitblinker','🏅'],[900,'Ster','💫'],[1400,'Meester','🎓'],[2000,'Kampioen','🏆'],[3000,'Legende','👑']] },
  voetbal:{ xp:'XP', doel:'doelpunten', goal:'⚽ GOAL!', feest:['⚽','🥅','🎉','🔥','👟'],
    rangen:[[0,'Pupil','⚽'],[100,'Talent','🌟'],[250,'Basisspeler','👕'],[500,'Uitblinker','⭐'],[900,'Aanvoerder','🎽'],[1400,'Topscorer','🥅'],[2000,'Kampioen','🏆'],[3000,'Legende','👑']] },
};
function themaVan(pid){return THEMES[(PROFILES[pid]&&PROFILES[pid].thema)||'standaard']||THEMES.standaard;}
const STANDAARD_WACHTWOORD='Bennaclan';
function kidPw(store,pid){ return (store&&store.kidpw&&store.kidpw[pid]) || STANDAARD_WACHTWOORD; }
function pwGelijk(a,b){ return String(a||'').trim().toLowerCase()===String(b||'').trim().toLowerCase(); }
// Per-kind account: het kind logt in met zijn naam + wachtwoord (standaard 'Bennaclan').
// De accountcode is afgeleid van de naam binnen de 'bennaclan'-familie, zodat het op elk toestel gelijk is.
function accVan(store,pid){ const a=store&&store.kidacc&&store.kidacc[pid];
  return (a&&a.code)? a : {code:'bennaclan-'+pid, pw:STANDAARD_WACHTWOORD}; }
function rangVoor(thema, punten){
  const r=thema.rangen; let i=0;
  for(let k=0;k<r.length;k++){ if(punten>=r[k][0]) i=k; }
  const huidig=r[i], volgende=r[i+1]||null;
  const naar = volgende ? volgende[0]-punten : 0;
  const basis = huidig[0], top = volgende? volgende[0] : huidig[0];
  const pct = volgende ? Math.round((punten-basis)/(top-basis)*100) : 100;
  return {naam:huidig[1], emoji:huidig[2], volgendeNaam:volgende?volgende[1]:null, naar, pct};
}

/* ==================== EERLIJKE BELONING (zakgeld, alleen meiden) ====================
   De app rekent zélf uit wat een sessie eerlijk waard is; de ouder betaalt pas uit.
   Alleen ÉCHT bewezen prestatie telt:
   - alleen 'sterk goed' = eerste keer, zónder hint, op een som die nog niet beheerst was;
   - een nauwkeurigheidspoort tegen gok-/haastwerk (te veel fouten → geen of half tarief);
   - een bonus als een oefentoets/proeftoets écht gehaald is (klaar voor de toets);
   - een dagplafond (standaard € 20) zodat het eerlijk en begrensd blijft.               */
/* Beloning naar RESULTAAT en MOEILIJKHEIDSGRAAD, met een hard weekbudget per kind (standaard € 20).
   - elke 'sterk goed' (1e keer, zonder hint, nog niet beheerst) telt naar moeilijkheid:
     niveau 1 = 1 punt, niveau 2 = 2, niveau 3 = 3. Hoger niveau = meer waard.
   - nauwkeurigheidspoort tegen gok-/haastwerk.
   - toetsbonus schaalt met de score (hoe beter, hoe hoger).
   - dagplafond + weekbudget: nooit meer dan het weekbudget per kind. */
/* Richtlijn: een goede, succesvolle oefensessie van ~1 uur ≈ € 5; een kind mag ruim
   meer dan € 1 per dag verdienen. Begrensd door een hard weekbudget per kind (€ 20). */
const BELONING = { weekbudget:20, dagMax:6, tariefPunt:0.06, werkMax:5, drempel:12, oefenBonus:2, proefBonus:3, hoog:0.85, mid:0.70, toernooiBonus:10 };
const NIVEAUGEWICHT = {1:1, 2:2, 3:3};
function euro(n){ return '€ '+(Math.round(n*2)/2).toFixed(2).replace('.',','); }
function halfRond(n){ return Math.round(n*2)/2; }
function parseDag(s){ const p=String(s||'').split('-').map(Number); return new Date(p[0]||2000,(p[1]||1)-1,p[2]||1).getTime(); }
function weekUitbetaald(pr){ const grens=Date.now()-7*86400000; return (pr.betalingen||[]).filter(b=>parseDag(b.d)>=grens).reduce((s,b)=>s+(b.bedrag||0),0); }

/* ---- Geluid: korte, zelfgemaakte tonen (Web Audio, geen bestanden, werkt offline) ---- */
let _actx=null;
function speel(kind, aan){
  if(!aan) return;
  try{
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
    _actx=_actx||new AC(); const ac=_actx, t0=ac.currentTime;
    if(ac.state==='suspended') ac.resume();
    const noten = kind==='goed' ? [[660,0],[990,0.10]] : [[220,0]];
    noten.forEach(([f,dt])=>{
      const o=ac.createOscillator(), g=ac.createGain();
      o.type = kind==='goed'?'sine':'square'; o.frequency.value=f;
      const dur = kind==='goed'?0.18:0.26;
      g.gain.setValueAtTime(0.0001, t0+dt);
      g.gain.exponentialRampToValueAtTime(0.14, t0+dt+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+dt+dur);
      o.connect(g); g.connect(ac.destination);
      o.start(t0+dt); o.stop(t0+dt+dur+0.02);
    });
  }catch(e){}
}
/* ---- Voorlezen: tekst-naar-spraak (Web Speech API, gratis, offline, geen bestanden) ---- */
let _nlStem=null;
function kiesNlStem(){
  try{
    const ss=window.speechSynthesis; if(!ss) return null;
    const vs=ss.getVoices()||[];
    _nlStem = vs.find(v=>/nl[-_]NL/i.test(v.lang)) || vs.find(v=>/^nl/i.test(v.lang)) || _nlStem;
  }catch(e){}
  return _nlStem;
}
try{ if(window.speechSynthesis){ window.speechSynthesis.onvoiceschanged=kiesNlStem; kiesNlStem(); } }catch(e){}
/* maak wiskundige tekens uitspreekbaar in het Nederlands */
function spreekbaar(t){
  return String(t==null?'':t)
    .replace(/√/g,' wortel ').replace(/²/g,' kwadraat ').replace(/³/g,' tot de derde ')
    .replace(/×/g,' keer ').replace(/÷/g,' gedeeld door ').replace(/·/g,' keer ')
    .replace(/−/g,' min ').replace(/π/g,' pi ').replace(/°/g,' graden ')
    .replace(/€\s?/g,' euro ').replace(/\s+/g,' ').trim();
}
function leesVoor(tekst, aan){
  if(!aan) return;
  try{
    const ss=window.speechSynthesis; if(!ss) return;
    const txt=spreekbaar(tekst); if(!txt) return;
    ss.cancel();
    const u=new SpeechSynthesisUtterance(txt);
    u.lang='nl-NL'; u.rate=0.95; u.pitch=1;
    const stem=_nlStem||kiesNlStem(); if(stem) u.voice=stem;
    ss.speak(u);
  }catch(e){}
}
function stopVoorlezen(){ try{ if(window.speechSynthesis) window.speechSynthesis.cancel(); }catch(e){} }
function mmss(sec){const m=Math.floor(sec/60), s=sec%60; return m+':'+(s<10?'0':'')+s;}
function weekbudgetVan(pr){ return (typeof pr.weekbudget==='number' && pr.weekbudget>=0) ? pr.weekbudget : BELONING.weekbudget; }
// ISO-weeksleutel (jaar-week) voor het wekelijkse toernooi
function weekKey(dd){ const d=dd?new Date(dd):new Date();
  const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); const day=t.getUTCDay()||7;
  t.setUTCDate(t.getUTCDate()+4-day); const ys=new Date(Date.UTC(t.getUTCFullYear(),0,1));
  const wk=Math.ceil((((t-ys)/86400000)+1)/7); return t.getUTCFullYear()+'-w'+wk; }
// dagelijkse missie: 3 taken op basis van vandaag
function dagMissie(prog){
  const goal=prog.goal||10, td=prog.todayCount||0;
  const d=(prog.dag&&prog.dag.d===todayStr())?prog.dag:{goed:0,fout:0};
  const pog=(d.goed||0)+(d.fout||0), nauw=pog?d.goed/pog:0;
  const t=(prog.toetsDag&&prog.toetsDag.d===todayStr())?prog.toetsDag:{oefen:0,proef:0};
  const taken=[
    {k:'doel', ok:td>=goal, tekst:'Haal je dagdoel ('+td+'/'+goal+' sommen)'},
    {k:'nauw', ok:(pog>=8&&nauw>=0.8), tekst:'Werk nauwkeurig (≥ 80% van '+Math.max(8,pog)+')'},
    {k:'toets',ok:((t.oefen||0)>0||(t.proef||0)>0), tekst:'Doe een oefentoets'},
  ];
  return {taken, klaar:taken.every(x=>x.ok)};
}
// dagmissie afgerond? → streak bijwerken en een XP-bonus (één keer per dag). Muteert pr.
function crediteerMissie(pr){
  const vandaag=todayStr();
  if(pr.missieLaatst===vandaag) return false;
  if(!dagMissie(pr).klaar) return false;
  pr.missieStreak=(pr.missieLaatst===yesterdayStr())?(pr.missieStreak||0)+1:1;
  pr.missieLaatst=vandaag;
  pr.punten=(pr.punten||0)+25; pr.weekPunten=(pr.weekPunten||0)+25;   // missiebonus (XP)
  return true;
}
// zomer-challenge: hoeveel al verdiend sinds de startdatum, en de stand t.o.v. het doel
function zomerStand(prog, zomer){
  if(!zomer||!zomer.aan||!zomer.start) return null;
  const startMs=parseDag(zomer.start), nu=Date.now();
  const verdiend=(prog.betalingen||[]).filter(b=>parseDag(b.d)>=startMs).reduce((s,b)=>s+(b.bedrag||0),0);
  const wekenTotaal=zomer.weken||7;
  const wekenVoorbij=Math.max(0, Math.min(wekenTotaal, Math.floor((nu-startMs)/(7*86400000))));
  const doel=zomer.doel||0, bonus=zomer.bonus||0, gehaald=doel>0&&verdiend>=doel;
  return {verdiend:Math.round(verdiend*2)/2, doel, bonus, gehaald,
    pct:doel?Math.min(100,Math.round(verdiend/doel*100)):0,
    wekenVoorbij, wekenTotaal, wekenOver:Math.max(0,wekenTotaal-wekenVoorbij)};
}
function berekenBeloning(pr){
  const d=pr.dag||{}, t=pr.toetsDag||{};
  const goed=(d.goed||0), fout=(d.fout||0), sterk=(d.sterk||0), punten=(d.sterkPunten||0);
  const pogingen=goed+fout;
  const nauw = pogingen? goed/pogingen : 0;
  const genoeg = pogingen>=BELONING.drempel;
  let factor=0, poort='';
  if(!genoeg){ poort='Doe eerst minstens '+BELONING.drempel+' sommen om mee te tellen.'; }
  else if(nauw>=BELONING.hoog){ factor=1;   poort='Top nauwkeurig 💯 — vol tarief'; }
  else if(nauw>=BELONING.mid){  factor=0.5; poort='Redelijk — half tarief. Werk nog wat rustiger.'; }
  else {                        factor=0;   poort='Te veel fouten — dit telt nog niet. Rustig en goed = beloning.'; }
  // werk: naar moeilijkheid (sterkPunten) i.p.v. puur aantal → hoger niveau = meer waard
  const werkEuro = Math.min(BELONING.werkMax, punten*BELONING.tariefPunt) * factor;
  // toetsbonus schaalt met de score (pas vanaf een voldoende, 70%)
  const proef=t.proef||0, oefen=t.oefen||0;
  const toetsEuro = proef>=70 ? halfRond(BELONING.proefBonus*(proef/100))
                  : (oefen>=70 ? halfRond(BELONING.oefenBonus*(oefen/100)) : 0);
  const vandaagBruto = Math.min(BELONING.dagMax, halfRond(werkEuro+toetsEuro));
  // hard weekbudget per kind: nooit meer dan het budget deze week
  const weekbudget = weekbudgetVan(pr);
  const weekPaid = weekUitbetaald(pr);
  const restWeek = Math.max(0, halfRond(weekbudget-weekPaid));
  const bedrag = Math.min(vandaagBruto, restWeek);
  const betaald = pr.betaaldOp===todayStr();
  return {bedrag, vandaagBruto, nauw, genoeg, factor, poort, sterk, punten, goed, fout, pogingen,
    werkEuro:halfRond(werkEuro), toetsEuro, proef, oefen, betaald, weekbudget, weekPaid, restWeek};
}
// Verdiensten worden persistent bijgehouden (net als punten) zodat ze niet verloren gaan bij een nieuwe dag
// en online meesynchroniseren. Per dag wordt het bruto-verdiende opgeslagen; de weekstand telt de laatste 7 dagen.
function upsertVerdiend(pr){
  const vandaag=todayStr(), bruto=berekenBeloning(pr).vandaagBruto;
  const lijst=(pr.verdiend||[]).filter(x=>x&&x.d!==vandaag);
  if(bruto>0) lijst.push({d:vandaag, bedrag:bruto});
  pr.verdiend=lijst.slice(-400);
}
function weekVerdiend(pr){    // deze week eerlijk verdiend met oefenen (gecapt op het weekbudget)
  const grens=Date.now()-7*86400000;
  const som=(pr.verdiend||[]).filter(x=>x&&parseDag(x.d)>=grens).reduce((s,x)=>s+(x.bedrag||0),0);
  return Math.max(0, Math.min(weekbudgetVan(pr), halfRond(som)));
}
// TOTALEN (net als de punten: alles-bij-elkaar, blijvend). Werk telt per week gecapt op het budget;
// toernooibonus (pr.bonus) en handmatige bijstelling (pr.verdiendBij) komen daar bovenop.
function totaalVerdiend(pr){
  const perWeek={};
  for(const x of (pr.verdiend||[])){ if(!x||!x.d) continue; const wk=weekKey(parseDag(x.d)); perWeek[wk]=(perWeek[wk]||0)+(x.bedrag||0); }
  const budget=weekbudgetVan(pr); let som=0;
  for(const wk in perWeek) som+=Math.min(budget, perWeek[wk]);
  return Math.max(0, halfRond(som + (pr.bonus||0) + (pr.verdiendBij||0)));
}
function totaalUitbetaald(pr){ return halfRond((pr.betalingen||[]).reduce((s,b)=>s+(b.bedrag||0),0)); }
function openstaand(pr){ return Math.max(0, halfRond(totaalVerdiend(pr)-totaalUitbetaald(pr))); }

  {p:'wassima',v:'natuurkunde',t:'Geluid',lvl:1,q:'Geluid gaat ongeveer 340 m/s. Hoe ver komt het in 2 s?',a:'680',u:'m',h:['afstand = snelheid × tijd.'],s:'s = v × t = 340 × 2 = 680 m.'},

  {p:'wassima',v:'natuurkunde',t:'Druk',lvl:2,q:'Een kracht van 200 N drukt op een vlak van 4 m². Bereken de druk. (p = F ÷ A, druk in pascal)',a:'50',u:'Pa',h:['p = F ÷ A. 1 Pa = 1 N/m².'],s:'p = F ÷ A = 200 ÷ 4 = 50 Pa.'},

  {p:'amaani',v:'natuurkunde',t:'Rendement',lvl:3,q:'Een lamp gebruikt 60 W en zet daarvan 9 W om in licht. Bereken het rendement.',a:'15',u:'%',h:['η = (nuttig vermogen ÷ totaal vermogen) × 100%.'],s:'η = (9 ÷ 60) × 100 = 15%.'},
  {p:'amaani',v:'natuurkunde',t:'Warmte',lvl:2,q:'Hoeveel warmte is nodig om 2 kg water 10 °C op te warmen? (c = 4180 J/kg·°C)',a:'83600',alt:['83.600','83600'],u:'J',h:['Q = c × m × ΔT.'],s:'Q = 4180 × 2 × 10 = 83 600 J.'},
  {p:'amaani',v:'natuurkunde',t:'Elektriciteit',lvl:2,q:'Een apparaat van 1500 W staat 2 uur aan. Hoeveel kWh verbruikt het?',a:'3',u:'kWh',h:['Energie (kWh) = vermogen (kW) × tijd (uur). 1500 W = 1,5 kW.'],s:'E = 1,5 kW × 2 uur = 3 kWh.'},
  {p:'amaani',v:'natuurkunde',t:'Elektriciteit',lvl:3,q:'Door een draad loopt 3 A gedurende 10 s. Hoeveel lading is dat?',a:'30',u:'C',h:['Q = I × t (lading in coulomb).'],s:'Q = 3 × 10 = 30 C.'},

  {p:'amaani',v:'wiskundeA',t:'Differentiëren',lvl:1,q:'Gegeven f(x) = x². De afgeleide is f′(x) = 2x. Bereken f′(3).',a:'6',h:['Vul x = 3 in de afgeleide 2x in.'],s:'f′(x) = 2x → f′(3) = 2 × 3 = 6.'},
  {p:'amaani',v:'wiskundeA',t:'Differentiëren',lvl:2,q:'Gegeven f(x) = x³. De afgeleide is f′(x) = 3x². Bereken f′(2).',a:'12',h:['f′(x) = 3x². Vul x = 2 in.'],s:'f′(2) = 3 × 2² = 3 × 4 = 12.'},
  {p:'amaani',v:'wiskundeA',t:'Differentiëren',lvl:2,q:'Gegeven f(x) = 4x² − 3x. De afgeleide is f′(x) = 8x − 3. Bereken f′(2).',a:'13',h:['Per term: 4x² → 8x, −3x → −3.'],s:'f′(x) = 8x − 3 → f′(2) = 8 × 2 − 3 = 16 − 3 = 13.'},
  {p:'amaani',v:'wiskundeA',t:'Differentiëren',lvl:3,q:'Gegeven f(x) = x². Bereken het differentiequotiënt op het interval [2, 5].',a:'7',h:['differentiequotiënt = (f(5) − f(2)) ÷ (5 − 2).','f(5) = 25, f(2) = 4.'],s:'(25 − 4) ÷ (5 − 2) = 21 ÷ 3 = 7.'},
  {p:'amaani',v:'wiskundeA',t:'Exponentieel verband',lvl:2,q:'Iets groeit met 3% per maand. Wat is de groeifactor per maand?',a:'1.03',alt:['1,03'],h:['Toename met p%: groeifactor = 1 + p/100.'],s:'1 + 3/100 = 1,03.'},
  {p:'amaani',v:'wiskundeA',t:'Exponentieel verband',lvl:3,q:'De groeifactor per maand is 1,03. Wat is de groeifactor per jaar (12 maanden)? Rond af op 2 decimalen.',a:'1.43',alt:['1,43','1.4258','1.426'],h:['Per jaar = (per maand)^12.','1,03^12 ≈ 1,4258.'],s:'1,03^12 = 1,4258… ≈ 1,43.'},
  {p:'amaani',v:'wiskundeA',t:'Exponentieel verband',lvl:3,q:'De jaarlijkse groeifactor is 1,08. Met hoeveel procent groeit het per jaar?',a:'8',u:'%',h:['percentage = (groeifactor − 1) × 100.'],s:'(1,08 − 1) × 100 = 8%.'},
  {p:'amaani',v:'wiskundeA',t:'Kansrekening',lvl:1,q:'Je gooit met een dobbelsteen. Hoeveel procent kans op een even getal?',a:'50',u:'%',h:['Even getallen: 2, 4, 6 → 3 van de 6.'],s:'3 ÷ 6 = 0,5 = 50%.'},
  {p:'amaani',v:'wiskundeA',t:'Kansrekening',lvl:2,q:'Op hoeveel verschillende volgordes kun je 4 boeken op een plank zetten? (4!)',a:'24',h:['4! = 4 × 3 × 2 × 1.'],s:'4! = 4 × 3 × 2 × 1 = 24.'},
  {p:'amaani',v:'wiskundeA',t:'Kansrekening',lvl:3,q:'Bij een spel win je met kans 0,2 een bedrag van € 10, anders niets. Wat is de verwachte winst?',a:'2',u:'€',h:['Verwachtingswaarde = kans × waarde.'],s:'0,2 × 10 = € 2.'},
  // --- Amaani · natuurkunde · laatste half jaar ---
  {p:'amaani',v:'natuurkunde',t:'Bewegingsvergelijkingen',lvl:3,q:'Eenparig versnelde beweging vanuit stilstand: a = 2 m/s², t = 5 s. Bereken de afgelegde afstand.',a:'25',u:'m',h:['Vanuit stilstand: s = ½ × a × t².','t² = 25.'],s:'s = ½ × 2 × 5² = ½ × 2 × 25 = 25 m.'},
  {p:'amaani',v:'natuurkunde',t:'Bewegingsvergelijkingen',lvl:3,q:'Een voorwerp heeft beginsnelheid 4 m/s en versnelt met 2 m/s² gedurende 3 s. Bereken de eindsnelheid.',a:'10',u:'m/s',h:['v = v₀ + a × t.'],s:'v = 4 + 2 × 3 = 4 + 6 = 10 m/s.'},
  {p:'amaani',v:'natuurkunde',t:'Arbeid & energie',lvl:3,q:'Een steen valt van 5 m hoogte. Wat is de snelheid vlak voor de grond? (g = 9,81, wrijving verwaarloosd)',a:'9.9',alt:['9,9','10','9.90'],u:'m/s',h:['Energiebehoud: ½mv² = mgh → v = √(2gh).','2 × 9,81 × 5 = 98,1.'],s:'v = √(2 × 9,81 × 5) = √98,1 ≈ 9,9 m/s.'},
  {p:'amaani',v:'natuurkunde',t:'Arbeid & energie',lvl:3,q:'Een veer met veerconstante C = 200 N/m wordt 0,1 m uitgerekt. Bereken de veerenergie.',a:'1',u:'J',h:['Ev = ½ × C × u².','u² = 0,01.'],s:'Ev = ½ × 200 × 0,1² = ½ × 200 × 0,01 = 1 J.'},
  {p:'amaani',v:'natuurkunde',t:'Elektriciteit',lvl:2,q:'Twee weerstanden in serie: 4 Ω en 6 Ω. Bereken de vervangingsweerstand.',a:'10',u:'Ω',h:['In serie tel je de weerstanden op.'],s:'Rv = 4 + 6 = 10 Ω.'},
  {p:'amaani',v:'natuurkunde',t:'Elektriciteit',lvl:3,q:'Een apparaat van 2000 W staat 3 uur aan. De stroomprijs is € 0,30 per kWh. Wat kost dat?',a:'1.80',alt:['1,80','1.8'],u:'€',h:['Eerst kWh: 2000 W = 2 kW; E = 2 × 3 = 6 kWh.','Kosten = kWh × prijs.'],s:'E = 2 kW × 3 uur = 6 kWh → 6 × € 0,30 = € 1,80.'},

  {p:'amaani',v:'wiskundeA',t:'Kwadratische functies',lvl:2,q:'Gegeven f(x) = x² − 4x + 3. Bereken f(2).',a:'-1',alt:['−1'],h:['Vul x = 2 in.'],s:'f(2) = 4 − 8 + 3 = −1.'},
  {p:'amaani',v:'wiskundeA',t:'Kwadratische functies',lvl:3,q:'De parabool y = x² − 6x + 5 heeft nulpunten x = 1 en x = 5. Wat is de x-coördinaat van de top?',a:'3',h:['De top ligt precies midden tussen de nulpunten.'],s:'(1 + 5) ÷ 2 = 3.'},
  {p:'amaani',v:'wiskundeA',t:'Kwadratische functies',lvl:2,q:'Opent de parabool y = x² naar boven of naar beneden?',a:'boven',alt:['naar boven','omhoog'],h:['Kijk naar het teken vóór x².'],s:'De coëfficiënt van x² is +1 > 0 → de parabool opent naar boven (dalparabool).'},
  {p:'amaani',v:'wiskundeA',t:'Vergelijkingen oplossen',lvl:2,q:'Los op: 2x² = 50 (geef de positieve oplossing).',a:'5',h:['Deel eerst door 2, dan worteltrekken.'],s:'x² = 25 → x = 5.'},
  {p:'amaani',v:'wiskundeA',t:'Vergelijkingen oplossen',lvl:2,q:'Los op: 3(x − 4) = 18.',a:'10',h:['Deel beide kanten door 3.'],s:'x − 4 = 6 → x = 10.'},
  {p:'amaani',v:'wiskundeA',t:'Vergelijkingen oplossen',lvl:3,q:'Bereken de discriminant van x² + 2x − 3. (D = b² − 4ac, met a = 1, b = 2, c = −3)',a:'16',h:['Vul in: D = 2² − 4·1·(−3).'],s:'D = 4 − (−12) = 4 + 12 = 16.'},
  {p:'amaani',v:'wiskundeA',t:'Vergelijkingen oplossen',lvl:3,q:'Los op: (x − 2)(x + 5) = 0. Geef de kleinste oplossing.',a:'-5',alt:['−5'],h:['Een product is 0 als één van de factoren 0 is.'],s:'x − 2 = 0 of x + 5 = 0 → x = 2 of x = −5. De kleinste is −5.'},
  {p:'amaani',v:'wiskundeA',t:'Machten & exponenten',lvl:2,q:'Reken uit: 2³ × 2².',a:'32',h:['Bij vermenigvuldigen tel je de exponenten op: 2^(3+2).'],s:'2³ × 2² = 2⁵ = 32.'},
  {p:'amaani',v:'wiskundeA',t:'Machten & exponenten',lvl:2,q:'Reken uit: 5⁰.',a:'1',h:['Elk getal (behalve 0) tot de macht 0 is 1.'],s:'5⁰ = 1.'},
  {p:'amaani',v:'wiskundeA',t:'Machten & exponenten',lvl:3,q:'Reken uit: 2⁻¹ (geef als decimaal).',a:'0.5',alt:['0,5','1/2'],h:['Een negatieve exponent betekent 1 gedeeld door: 2⁻¹ = 1/2.'],s:'2⁻¹ = 1/2 = 0,5.'},
  {p:'amaani',v:'wiskundeA',t:'Procentuele groei',lvl:2,q:'Iets groeit met 4% per jaar. Wat is de groeifactor?',a:'1.04',alt:['1,04'],h:['1 + p/100.'],s:'1 + 4/100 = 1,04.'},
  {p:'amaani',v:'wiskundeA',t:'Procentuele groei',lvl:2,q:'Beginwaarde 1000, groeifactor 0,9 per jaar. Wat is de waarde na 3 jaar?',a:'729',h:['× 0,9 per jaar → × 0,9³.'],s:'1000 × 0,9³ = 1000 × 0,729 = 729.'},
  {p:'amaani',v:'wiskundeA',t:'Procentuele groei',lvl:3,q:'De groeifactor per jaar is 1,21. Wat is de groeifactor per half jaar?',a:'1.1',alt:['1,1'],h:['Half jaar → wortel uit de jaarfactor: √1,21.'],s:'√1,21 = 1,1.'},
  {p:'amaani',v:'wiskundeA',t:'Procentuele groei',lvl:3,q:'Een bacterie verdubbelt elk uur (groeifactor 2). Na hoeveel uur is het aantal 8× zo groot?',a:'3',u:'uur',h:['Zoek de macht: 2^? = 8.'],s:'2³ = 8, dus na 3 uur.'},
  {p:'amaani',v:'wiskundeA',t:'Logaritmen',lvl:2,q:'Los op: 10^x = 1000. Wat is x?',a:'3',h:['Schrijf 1000 als macht van 10.'],s:'1000 = 10³ → x = 3.'},
  {p:'amaani',v:'wiskundeA',t:'Logaritmen',lvl:2,q:'Bereken: log(100). (grondtal 10)',a:'2',h:['10 tot welke macht is 100?'],s:'log(100) = 2, want 10² = 100.'},
  {p:'amaani',v:'wiskundeA',t:'Logaritmen',lvl:2,q:'Bereken: log(1).',a:'0',h:['10 tot welke macht is 1?'],s:'log(1) = 0, want 10⁰ = 1.'},
  {p:'amaani',v:'wiskundeA',t:'Rijen',lvl:1,q:'Rekenkundige rij: 3, 7, 11, ... Wat is het volgende getal?',a:'15',h:['Er komt steeds hetzelfde bij: +4.'],s:'11 + 4 = 15.'},
  {p:'amaani',v:'wiskundeA',t:'Rijen',lvl:2,q:'Meetkundige rij: 2, 6, 18, ... Wat is het volgende getal?',a:'54',h:['Er wordt steeds met dezelfde factor vermenigvuldigd: ×3.'],s:'18 × 3 = 54.'},

  {p:'amaani',v:'wiskundeA',t:'Differentiëren',lvl:2,q:'Gegeven f(x) = x² − 4x, met f′(x) = 2x − 4. Voor welke x is de helling 0 (de top)?',a:'2',h:['Stel 2x − 4 = 0.'],s:'2x − 4 = 0 → 2x = 4 → x = 2.'},
  {p:'amaani',v:'wiskundeA',t:'Differentiëren',lvl:2,q:'Gegeven f(x) = 2x², met f′(x) = 4x. Bereken de helling in x = 3.',a:'12',h:['Vul x = 3 in 4x.'],s:'f′(3) = 4 × 3 = 12.'},

  {p:'amaani',v:'wiskundeA',t:'Statistiek',lvl:2,q:'Bereken de mediaan van 2, 5, 7, 9.',a:'6',h:['Even aantal getallen: neem het gemiddelde van de twee middelste.'],s:'(5 + 7) ÷ 2 = 6.'},
  {p:'amaani',v:'wiskundeA',t:'Statistiek',lvl:3,q:'Wat is de standaardafwijking van 10, 10, 10?',a:'0',h:['Alle waarden zijn gelijk.'],s:'Geen spreiding → standaardafwijking = 0.'},
  {p:'amaani',v:'wiskundeA',t:'Kansrekening',lvl:2,q:'Kans op kop bij een munt is 1/2. Kans op twee keer kop achter elkaar?',a:'1/4',alt:['0.25','0,25'],h:['Onafhankelijke kansen vermenigvuldig je: ½ × ½.'],s:'½ × ½ = 1/4.'},
  {p:'amaani',v:'wiskundeA',t:'Kansrekening',lvl:2,q:'Op hoeveel manieren kies je 2 personen uit 4 (volgorde maakt niet uit)?',a:'6',h:['Combinaties: 4! ÷ (2!·2!).'],s:'C(4,2) = 6.'},
  {p:'amaani',v:'wiskundeA',t:'Kansrekening',lvl:2,q:'De kans op een 6 met een dobbelsteen is 1/6. Wat is de kans op géén 6? (geef als breuk)',a:'5/6',h:['Complementregel: 1 − 1/6.'],s:'1 − 1/6 = 5/6.'},

  {p:'amaani',v:'natuurkunde',t:'Golven & trillingen',lvl:2,q:'Een golf heeft frequentie 5 Hz en golflengte 2 m. Bereken de golfsnelheid. (v = f·λ)',a:'10',u:'m/s',h:['v = f × λ.'],s:'v = 5 × 2 = 10 m/s.'},
  {p:'amaani',v:'natuurkunde',t:'Golven & trillingen',lvl:2,q:'De trillingstijd is 0,25 s. Bereken de frequentie. (f = 1/T)',a:'4',u:'Hz',h:['f = 1 ÷ T.'],s:'f = 1 ÷ 0,25 = 4 Hz.'},

  {p:'amaani',v:'natuurkunde',t:'Schakelingen',lvl:3,q:'Twee gelijke weerstanden van 6 Ω staan parallel. Bereken de vervangingsweerstand.',a:'3',u:'Ω',h:['1/Rv = 1/6 + 1/6.'],s:'1/Rv = 2/6 = 1/3 → Rv = 3 Ω.'},
  {p:'amaani',v:'natuurkunde',t:'Schakelingen',lvl:2,q:'Over een weerstand van 2 Ω loopt 3 A. Bereken de spanning. (U = I·R)',a:'6',u:'V',h:['U = I × R.'],s:'U = 3 × 2 = 6 V.'},
  {p:'amaani',v:'natuurkunde',t:'Druk',lvl:2,q:'Een kracht van 600 N drukt op een vlak van 0,5 m². Bereken de druk. (p = F/A)',a:'1200',u:'Pa',h:['p = F ÷ A.'],s:'p = 600 ÷ 0,5 = 1200 Pa.'},
  {p:'amaani',v:'natuurkunde',t:'Druk',lvl:3,q:'De druk is 2000 Pa op een oppervlak van 0,3 m². Bereken de kracht. (F = p·A)',a:'600',u:'N',h:['F = p × A.'],s:'F = 2000 × 0,3 = 600 N.'},
  {p:'amaani',v:'natuurkunde',t:'Radioactiviteit',lvl:2,q:'De halveringstijd is 3 uur. Je begint met 800 atomen. Hoeveel zijn er na 6 uur?',a:'200',h:['6 uur = 2 halveringstijden: elke keer de helft.'],s:'800 → 400 (na 3 u) → 200 (na 6 u).'},

  {p:'wassima',v:'nederlands',t:'Spelling',lvl:1,q:'Wat is het meervoud van "kat"?',a:'katten',h:['Korte klank → medeklinker verdubbelen.'],s:'Korte a-klank → verdubbel de t: katten.'},

  {p:'amine',v:'lezen',t:'Leesteksten',lvl:2,q:'Lees:\n"Youssef had de hele week hard getraind. Toch zat hij bij de wedstrijd op de bank. In de tweede helft mocht hij eindelijk invallen. Meteen gaf hij een strakke pass, en even later scoorde hij de winnende goal. Zijn teamgenoten renden juichend op hem af. ‘Het wachten was het waard,’ dacht hij."\n\nNaar wie verwijst "hem" in "renden op hem af"? (kies)',a:'Youssef',opties:['Youssef','de trainer','de tegenstander'],h:['Wie maakte de winnende goal?'],s:'"hem" verwijst naar Youssef.'},
  {p:'amine',v:'lezen',t:'Leesteksten',lvl:3,q:'Lees:\n"Youssef had de hele week hard getraind. Toch zat hij bij de wedstrijd op de bank. In de tweede helft mocht hij eindelijk invallen. Meteen gaf hij een strakke pass, en even later scoorde hij de winnende goal. Zijn teamgenoten renden juichend op hem af. ‘Het wachten was het waard,’ dacht hij."\n\nWaarom dacht Youssef "het wachten was het waard"? (kies)',a:'omdat hij eerst op de bank zat en tóch de winnende goal maakte',opties:['omdat hij eerst op de bank zat en tóch de winnende goal maakte','omdat de wedstrijd kort was','omdat hij naar huis mocht'],h:['Trek een conclusie: wat was er eerst, en wat gebeurde er daarna?'],s:'Hij zat eerst op de bank, maar scoorde na zijn invalbeurt tóch de winnende goal.'},
  {p:'amine',v:'lezen',t:'Leesteksten',lvl:3,q:'Lees:\n"Youssef had de hele week hard getraind. Toch zat hij bij de wedstrijd op de bank. In de tweede helft mocht hij eindelijk invallen. Meteen gaf hij een strakke pass, en even later scoorde hij de winnende goal. Zijn teamgenoten renden juichend op hem af. ‘Het wachten was het waard,’ dacht hij."\n\nWelke samenvatting past het best? (kies)',a:'Youssef valt in en maakt de winnende goal',opties:['Youssef valt in en maakt de winnende goal','Youssef traint de hele week thuis','Youssef wordt de nieuwe trainer'],h:['Een samenvatting geeft alleen het belangrijkste weer.'],s:'De kern: Youssef valt in en maakt de winnende goal.'},
  /* Tekst 3 — informatief: gamen (feit of mening) */
  {p:'amine',v:'lezen',t:'Leesteksten',lvl:2,q:'Lees:\n"Videogames zijn populair bij veel kinderen. Sommige games trainen je reactiesnelheid en samenwerking. Toch is te lang gamen niet gezond: je beweegt weinig en slaapt soms slechter. Deskundigen raden aan om af te wisselen met sport en buitenspelen. Volgens mij is een uurtje per dag prima."\n\n"Videogames zijn populair bij veel kinderen." Is dit een feit of een mening? (kies)',a:'feit',opties:['feit','mening'],h:['Kun je het controleren? Dan is het een feit.'],s:'Dit is te controleren → een feit.'},

  {p:'amine',v:'lezen',t:'Leesteksten',lvl:3,q:'Lees:\n"Videogames zijn populair bij veel kinderen. Sommige games trainen je reactiesnelheid en samenwerking. Toch is te lang gamen niet gezond: je beweegt weinig en slaapt soms slechter. Deskundigen raden aan om af te wisselen met sport en buitenspelen. Volgens mij is een uurtje per dag prima."\n\nWat is een "deskundige"? (kies)',a:'iemand die er veel verstand van heeft',opties:['iemand die er veel verstand van heeft','een spelcomputer','een soort game'],h:['Woordbetekenis uit de context: wie geeft advies?'],s:'Een deskundige is iemand die er veel verstand van heeft.'},
  {p:'amine',v:'lezen',t:'Leesteksten',lvl:3,q:'Lees:\n"Videogames zijn populair bij veel kinderen. Sommige games trainen je reactiesnelheid en samenwerking. Toch is te lang gamen niet gezond: je beweegt weinig en slaapt soms slechter. Deskundigen raden aan om af te wisselen met sport en buitenspelen. Volgens mij is een uurtje per dag prima."\n\nWat is de belangrijkste boodschap van de tekst? (kies)',a:'gamen kan leuk zijn, maar wissel af met bewegen',opties:['gamen kan leuk zijn, maar wissel af met bewegen','gamen is altijd slecht','je moet nooit sporten'],h:['Wat is de hoofdgedachte, niet één los detail?'],s:'De kern: gamen kan leuk zijn, maar wissel af met sport en bewegen.'},

  /* Tekst 3 — informatief: de winterslaap van de egel */
  {p:'amine',v:'lezen',t:'Leesteksten',lvl:2,q:'Lees:\n"Als het kouder wordt, zoekt de egel een hoopje bladeren op. Daarin kruipt hij weg en houdt hij zijn winterslaap. Zijn hart klopt dan heel langzaam en zijn lichaam koelt af. Zo verbruikt hij bijna geen energie en heeft hij geen eten nodig. Pas in het voorjaar, als het warmer wordt, wordt hij weer wakker. Egels zijn daarom in de winter bijna nooit te zien."\n\nWaarin kruipt de egel voor zijn winterslaap? (kies)',a:'in een hoopje bladeren',opties:['in een hoopje bladeren','in een hol in een boom','onder water'],h:['Zoek het antwoord in de eerste zin (opzoeken).'],s:'De egel kruipt weg in een hoopje bladeren.'},
  {p:'amine',v:'lezen',t:'Leesteksten',lvl:3,q:'Lees:\n"Als het kouder wordt, zoekt de egel een hoopje bladeren op. Daarin kruipt hij weg en houdt hij zijn winterslaap. Zijn hart klopt dan heel langzaam en zijn lichaam koelt af. Zo verbruikt hij bijna geen energie en heeft hij geen eten nodig. Pas in het voorjaar, als het warmer wordt, wordt hij weer wakker. Egels zijn daarom in de winter bijna nooit te zien."\n\nWat betekent “winterslaap”? (kies)',a:'een lange slaap in de winter met bijna geen energieverbruik',opties:['een lange slaap in de winter met bijna geen energieverbruik','een korte middagslaap','wakker blijven de hele winter'],h:['Lees de zinnen erna: wat gebeurt er met zijn hart en lichaam? (woordbetekenis uit de context)'],s:'Winterslaap is een lange slaap in de winter waarbij het lichaam bijna geen energie verbruikt.'},
  {p:'amine',v:'lezen',t:'Leesteksten',lvl:2,q:'Lees:\n"Als het kouder wordt, zoekt de egel een hoopje bladeren op. Daarin kruipt hij weg en houdt hij zijn winterslaap. Zijn hart klopt dan heel langzaam en zijn lichaam koelt af. Zo verbruikt hij bijna geen energie en heeft hij geen eten nodig. Pas in het voorjaar, als het warmer wordt, wordt hij weer wakker. Egels zijn daarom in de winter bijna nooit te zien."\n\nWanneer wordt de egel weer wakker? (kies)',a:'in het voorjaar, als het warmer wordt',opties:['in het voorjaar, als het warmer wordt','midden in de winter','elke ochtend'],h:['Zoek het woord “voorjaar” op in de tekst.'],s:'Hij wordt pas in het voorjaar wakker, als het warmer wordt.'},
  {p:'amine',v:'lezen',t:'Leesteksten',lvl:3,q:'Lees:\n"Als het kouder wordt, zoekt de egel een hoopje bladeren op. Daarin kruipt hij weg en houdt hij zijn winterslaap. Zijn hart klopt dan heel langzaam en zijn lichaam koelt af. Zo verbruikt hij bijna geen energie en heeft hij geen eten nodig. Pas in het voorjaar, als het warmer wordt, wordt hij weer wakker. Egels zijn daarom in de winter bijna nooit te zien."\n\nWaar gaat de tekst vooral over? (kies)',a:'hoe en waarom de egel een winterslaap houdt',opties:['hoe en waarom de egel een winterslaap houdt','wat egels het liefst eten','waar egels precies wonen'],h:['Wat is de hoofdgedachte van het hele stukje?'],s:'De tekst gaat vooral over hoe en waarom de egel een winterslaap houdt.'},
  {p:'amine',v:'lezen',t:'Leesteksten',lvl:2,q:'Lees:\n"Als het kouder wordt, zoekt de egel een hoopje bladeren op. Daarin kruipt hij weg en houdt hij zijn winterslaap. Zijn hart klopt dan heel langzaam en zijn lichaam koelt af. Zo verbruikt hij bijna geen energie en heeft hij geen eten nodig. Pas in het voorjaar, als het warmer wordt, wordt hij weer wakker. Egels zijn daarom in de winter bijna nooit te zien."\n\n“Egels zijn in de winter bijna nooit te zien.” Is dit een feit of een mening? (kies)',a:'feit',opties:['feit','mening'],h:['Kun je het controleren, of is het iemands idee?'],s:'Het is een feit: je kunt het controleren.'},
  /* Tekst 4 — verhaal: de verloren sleutel */
  {p:'amine',v:'lezen',t:'Leesteksten',lvl:2,q:'Lees:\n"Sara kwam thuis, maar de deur zat op slot. Ze zocht in haar tas, haar jaszakken en zelfs in haar schoenen, maar de sleutel was nergens. Net toen ze wilde opgeven, hoorde ze gerinkel: de sleutel lag onder de deurmat, precies waar haar moeder hem altijd verstopte. Opgelucht deed ze de deur open. ‘Volgende keer kijk ik daar meteen,’ lachte ze."\n\nNaar wie of wat verwijst “hem” in “waar haar moeder hem altijd verstopte”? (kies)',a:'de sleutel',opties:['de sleutel','de deurmat','de tas'],h:['Wat verstopte haar moeder onder de deurmat?'],s:'“hem” verwijst naar de sleutel.'},
  {p:'amine',v:'lezen',t:'Leesteksten',lvl:3,q:'Lees:\n"Sara kwam thuis, maar de deur zat op slot. Ze zocht in haar tas, haar jaszakken en zelfs in haar schoenen, maar de sleutel was nergens. Net toen ze wilde opgeven, hoorde ze gerinkel: de sleutel lag onder de deurmat, precies waar haar moeder hem altijd verstopte. Opgelucht deed ze de deur open. ‘Volgende keer kijk ik daar meteen,’ lachte ze."\n\nHoe voelde Sara zich toen ze de sleutel vond? (kies)',a:'opgelucht',opties:['opgelucht','boos','verdrietig'],h:['Let op het woord vlak vóór “deed ze de deur open”.'],s:'Ze was opgelucht — dat staat in de tekst en blijkt uit haar lach.'},
  {p:'amine',v:'lezen',t:'Leesteksten',lvl:3,q:'Lees:\n"Sara kwam thuis, maar de deur zat op slot. Ze zocht in haar tas, haar jaszakken en zelfs in haar schoenen, maar de sleutel was nergens. Net toen ze wilde opgeven, hoorde ze gerinkel: de sleutel lag onder de deurmat, precies waar haar moeder hem altijd verstopte. Opgelucht deed ze de deur open. ‘Volgende keer kijk ik daar meteen,’ lachte ze."\n\nWaarom lag de sleutel onder de deurmat? (kies)',a:'omdat haar moeder hem daar altijd verstopt',opties:['omdat haar moeder hem daar altijd verstopt','omdat Sara hem daar liet vallen','omdat de buurman hem daar legde'],h:['Trek een conclusie uit de zin over haar moeder.'],s:'Haar moeder verstopte de sleutel daar altijd.'},
  {p:'amine',v:'lezen',t:'Leesteksten',lvl:2,q:'Lees:\n"Sara kwam thuis, maar de deur zat op slot. Ze zocht in haar tas, haar jaszakken en zelfs in haar schoenen, maar de sleutel was nergens. Net toen ze wilde opgeven, hoorde ze gerinkel: de sleutel lag onder de deurmat, precies waar haar moeder hem altijd verstopte. Opgelucht deed ze de deur open. ‘Volgende keer kijk ik daar meteen,’ lachte ze."\n\nWelke samenvatting past het best? (kies)',a:'Sara vindt haar verloren sleutel onder de deurmat',opties:['Sara vindt haar verloren sleutel onder de deurmat','Sara koopt een nieuwe deur','Sara gaat bij een vriendin logeren'],h:['Een samenvatting geeft alleen het belangrijkste weer.'],s:'De kern: Sara vindt haar verloren sleutel onder de deurmat.'},
  {p:'amine',v:'lezen',t:'Leesteksten',lvl:3,q:'Lees:\n"Sara kwam thuis, maar de deur zat op slot. Ze zocht in haar tas, haar jaszakken en zelfs in haar schoenen, maar de sleutel was nergens. Net toen ze wilde opgeven, hoorde ze gerinkel: de sleutel lag onder de deurmat, precies waar haar moeder hem altijd verstopte. Opgelucht deed ze de deur open. ‘Volgende keer kijk ik daar meteen,’ lachte ze."\n\nWat betekent “opgeven” in “toen ze wilde opgeven”? (kies)',a:'stoppen met zoeken',opties:['stoppen met zoeken','harder gaan zoeken','de politie bellen'],h:['Wat wilde ze bijna doen voordat ze het gerinkel hoorde? (woordbetekenis uit de context)'],s:'“opgeven” betekent hier: stoppen met zoeken.'},

/* ============================ SJABLONEN met WISSELENDE GETALLEN ============================ */
/* Elke sjabloon-som krijgt bij elke beurt nieuwe getallen, zodat de méthode geoefend wordt
   en niet het antwoord uit het hoofd geleerd wordt. gen() levert {q,a,alt?,u?,h,s,ill?}. */
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=a[i];a[i]=a[j];a[j]=t;}return a;}
function rnd(x,d){const f=Math.pow(10,d===undefined?2:d);return Math.round(x*f)/f;}
function nl(x){return String(rnd(x,3)).replace('.',',');}      // Nederlandse komma voor weergave
function pm(b){return b>=0?'+ '+b:'− '+(-b);}                  // teken voor in formules

  {id:'tpl_snelheid',p:'wassima',v:'natuurkunde',t:'Snelheid',lvl:1,gen:()=>{
    const v=ri(2,12), t=pick([5,10,15,20,25,30]), s=v*t;
    return {q:`Iemand legt ${s} m af in ${t} s. Bereken de snelheid.`,a:String(v),u:'m/s',
      h:['v = s ÷ t.'],s:`v = ${s} ÷ ${t} = ${v} m/s.`};
  }},
  {id:'tpl_kmu',p:'wassima',v:'natuurkunde',t:'Snelheid',lvl:2,gen:()=>{
    const ms=pick([5,10,15,20,25,30]), kmu=ms*3.6;
    return {q:`Een voertuig rijdt ${nl(kmu)} km/u. Hoeveel m/s is dat?`,a:String(ms),u:'m/s',
      h:['Van km/u naar m/s: delen door 3,6.'],s:`${nl(kmu)} ÷ 3,6 = ${ms} m/s.`};
  }},
  {id:'tpl_dichtheid',p:'wassima',v:'natuurkunde',t:'Dichtheid',lvl:2,gen:()=>{
    const rho=ri(2,9), V=pick([10,20,25,50,100]), m=rho*V;
    return {q:`Een blok heeft massa ${m} g en volume ${V} cm³. Bereken de dichtheid.`,a:String(rho),u:'g/cm³',
      h:['ρ = m ÷ V.'],s:`ρ = ${m} ÷ ${V} = ${rho} g/cm³.`};
  }},
  {id:'tpl_zwaarte',p:'wassima',v:'natuurkunde',t:'Kracht & zwaartekracht',lvl:1,gen:()=>{
    const m=ri(2,20);
    return {q:`Bereken de zwaartekracht op ${m} kg. (g = 10 N/kg)`,a:String(m*10),u:'N',
      h:['Fz = m × g.'],s:`Fz = m × g = ${m} × 10 = ${m*10} N.`};
  }},
  /* ----- Amaani · wiskunde A ----- */
  {id:'tpl_groeifactor',p:'amaani',v:'wiskundeA',t:'Groeifactoren',lvl:1,gen:()=>{
    const p=pick([2,3,4,5,8,10,12,20,25]), up=pick([true,false]), gf=rnd(up?1+p/100:1-p/100,2);
    return {q:`Een bedrag ${up?'stijgt':'daalt'} met ${p}%. Wat is de groeifactor?`,a:String(gf),
      h:[`${up?'Toename':'Afname'} met p%: groeifactor = ${up?'1 + p/100':'1 − p/100'}.`],
      s:`${up?'1 +':'1 −'} ${p}/100 = ${nl(gf)}.`};
  }},
  {id:'tpl_exp',p:'amaani',v:'wiskundeA',t:'Exponentieel verband',lvl:2,gen:()=>{
    const b=pick([100,200,500,1000]), g=pick([1.1,1.2,1.5,2]), t=ri(2,3), N=rnd(b*Math.pow(g,t),2);
    return {q:`Gegeven N = ${b} × ${nl(g)}^t. Bereken N bij t = ${t}.`,a:String(N),
      h:[`Reken eerst ${nl(g)}^${t} uit.`,`${nl(g)}^${t} = ${nl(rnd(Math.pow(g,t),4))}.`],
      s:`N = ${b} × ${nl(g)}^${t} = ${b} × ${nl(rnd(Math.pow(g,t),4))} = ${nl(N)}.`};
  }},
  {id:'tpl_diff',p:'amaani',v:'wiskundeA',t:'Differentiëren',lvl:2,gen:()=>{
    const n=pick([2,3,4]), x=ri(2,5), fp=n*Math.pow(x,n-1);
    return {q:`Gegeven f(x) = x${EXP[n]}, met afgeleide f′(x) = ${n}x${EXP[n-1]}. Bereken f′(${x}).`,a:String(fp),
      h:[`Vul x = ${x} in de afgeleide ${n}x${EXP[n-1]} in.`],
      s:`f′(${x}) = ${n} × ${x}${EXP[n-1]} = ${n} × ${Math.pow(x,n-1)} = ${fp}.`};
  }},
  {id:'tpl_gemiddelde',p:'amaani',v:'wiskundeA',t:'Statistiek',lvl:1,gen:()=>{
    const m=ri(4,9), nums=shuffle([m-2,m-1,m,m+1,m+2]);
    return {q:`Bereken het gemiddelde van ${nums.join(', ')}.`,a:String(m),
      h:['gemiddelde = som ÷ aantal.'],s:`(${nums.join(' + ')}) ÷ 5 = ${5*m} ÷ 5 = ${m}.`};
  }},
  /* ----- Amaani · natuurkunde ----- */
  {id:'tpl_newton',p:'amaani',v:'natuurkunde',t:'Krachten (Newton)',lvl:2,gen:()=>{
    const m=pick([500,800,1000,1200,1500,2000]), a=ri(2,6);
    return {q:`Een voorwerp van ${m} kg versnelt met ${a} m/s². Bereken de nettokracht.`,a:String(m*a),u:'N',
      h:['Tweede wet van Newton: F = m × a.'],s:`F = ${m} × ${a} = ${m*a} N.`};
  }},
  {id:'tpl_arbeid',p:'amaani',v:'natuurkunde',t:'Arbeid & energie',lvl:2,gen:()=>{
    const F=pick([20,30,40,50,60,80,100]), s=ri(2,12);
    return {q:`Een kracht van ${F} N verplaatst een voorwerp ${s} m. Bereken de arbeid.`,a:String(F*s),u:'J',
      h:['W = F × s.'],s:`W = ${F} × ${s} = ${F*s} J.`};
  }},
  {id:'tpl_vermogen',p:'amaani',v:'natuurkunde',t:'Vermogen',lvl:2,gen:()=>{
    const P=pick([10,20,50,100]), t=pick([5,10,15,20,30,60]), E=P*t;
    return {q:`Een apparaat levert ${E} J in ${t} s. Bereken het vermogen.`,a:String(P),u:'W',
      h:['P = E ÷ t.'],s:`P = ${E} ÷ ${t} = ${P} W.`};
  }},
  /* ----- Wassima · fundament-drills (wisselende getallen) ----- */
  {id:'tpl_rekenvolgorde',p:'wassima',v:'wiskunde',t:'Rekenvolgorde',lvl:1,gen:()=>{
    const a=ri(2,9), b=ri(2,9), c=ri(2,5);
    return {q:`Reken uit: ${a} + ${b} × ${c}`,a:String(a+b*c),
      h:['Keer gaat vóór plus: doe eerst de × .'],s:`${b} × ${c} = ${b*c}; ${a} + ${b*c} = ${a+b*c}.`};
  }},
  {id:'tpl_neg_optel',p:'wassima',v:'wiskunde',t:'Negatieve getallen',lvl:1,gen:()=>{
    const a=ri(-5,5), b=ri(-5,5), ans=a+b;
    return {q:`Reken uit: ${a} ${pm(b)}`,a:String(ans),ill:{type:'getallenlijn',van:-10,tot:10,punt:ans},
      h:['Gebruik de getallenlijn: plus = naar rechts, min = naar links.'],s:`${a} ${pm(b)} = ${ans}.`};
  }},
  {id:'tpl_kwadraat',p:'wassima',v:'wiskunde',t:'Machten & wortels',lvl:1,gen:()=>{
    const n=ri(2,15);
    return {q:`Reken uit: ${n}²`,a:String(n*n),h:[`${n}² = ${n} × ${n}.`],s:`${n} × ${n} = ${n*n}.`};
  }},
  {id:'tpl_breuk_van',p:'wassima',v:'wiskunde',t:'Breuken',lvl:2,gen:()=>{
    const noemer=pick([2,3,4,5,10]), teller=ri(1,noemer-1), getal=noemer*ri(2,12), deel=getal/noemer*teller;
    return {q:`Wat is ${teller}/${noemer} van ${getal}?`,a:String(deel),
      h:[`Eerst ÷ ${noemer} (één deel), dan × ${teller}.`],s:`${getal} ÷ ${noemer} = ${getal/noemer}, en × ${teller} = ${deel}.`};
  }},
  {id:'tpl_eenheden',p:'wassima',v:'natuurkunde',t:'Grootheden & eenheden',lvl:1,gen:()=>{
    const o=pick([['km',1000,'m'],['m',100,'cm'],['kg',1000,'g'],['minuten',60,'seconden']]), val=ri(2,12);
    return {q:`Hoeveel ${o[2]} is ${val} ${o[0]}?`,a:String(val*o[1]),
      h:[`1 ${o[0]} = ${o[1]} ${o[2]}.`],s:`${val} × ${o[1]} = ${val*o[1]} ${o[2]}.`};
  }},
  {id:'tpl_haakjes',p:'wassima',v:'wiskunde',t:'Haakjes & herleiden',lvl:2,gen:()=>{
    const a=ri(2,6), b=ri(1,9);
    return {q:`Werk de haakjes weg: ${a}(x + ${b}). Schrijf als ax + b.`,a:`${a}x+${a*b}`,alt:[`${a}x + ${a*b}`],
      h:[`Vermenigvuldig de ${a} met x én met ${b}.`],s:`${a} × x + ${a} × ${b} = ${a}x + ${a*b}.`};
  }},
  /* ----- Amaani · drills (wisselende getallen) ----- */
  {id:'tpl_golfsnelheid',p:'amaani',v:'natuurkunde',t:'Golven & trillingen',lvl:2,gen:()=>{
    const f=ri(2,8), lam=ri(2,6);
    return {q:`Een golf heeft frequentie ${f} Hz en golflengte ${lam} m. Bereken de golfsnelheid. (v = f·λ)`,a:String(f*lam),u:'m/s',
      h:['v = f × λ.'],s:`v = ${f} × ${lam} = ${f*lam} m/s.`};
  }},
  {id:'tpl_trillingstijd',p:'amaani',v:'natuurkunde',t:'Golven & trillingen',lvl:1,gen:()=>{
    const f=pick([2,4,5,8,10,20]), T=rnd(1/f,4);
    return {q:`Een trilling heeft frequentie ${f} Hz. Bereken de trillingstijd T. (T = 1/f)`,a:String(T),alt:[nl(T)],u:'s',
      h:['T = 1 ÷ f.'],s:`T = 1 ÷ ${f} = ${nl(T)} s.`};
  }},
  {id:'tpl_resultante',p:'amaani',v:'natuurkunde',t:'Krachten & evenwicht',lvl:1,gen:()=>{
    const a=ri(10,90), b=ri(10,90);
    return {q:`Twee krachten van ${a} N en ${b} N werken in dezelfde richting. Bereken de resultante.`,a:String(a+b),u:'N',
      h:['Zelfde richting → optellen.'],s:`${a} + ${b} = ${a+b} N.`};
  }},
  {id:'tpl_fveer',p:'amaani',v:'natuurkunde',t:'Krachten & evenwicht',lvl:2,gen:()=>{
    const C=pick([100,150,200,250,300]), u=pick([0.1,0.2,0.3,0.5]), F=rnd(C*u,2);
    return {q:`Een veer met veerconstante C = ${C} N/m wordt ${nl(u)} m uitgerekt. Bereken de veerkracht. (F = C·u)`,a:String(F),u:'N',
      h:['F = C × u.'],s:`F = ${C} × ${nl(u)} = ${nl(F)} N.`};
  }},
  {id:'tpl_funceval',p:'amaani',v:'wiskundeA',t:'Kwadratische functies',lvl:2,gen:()=>{
    const b=ri(-5,5), c=ri(-5,9), x=ri(-3,5), val=x*x+b*x+c;
    return {q:`Gegeven f(x) = x² ${pm(b)}x ${pm(c)}. Bereken f(${x}).`,a:String(val),
      h:[`Vul x = ${x} in en let op de tekens.`],s:`f(${x}) = (${x})² ${pm(b)}·${x} ${pm(c)} = ${x*x} ${pm(b*x)} ${pm(c)} = ${val}.`};
  }},
  /* ----- Amine · reken-drills (wisselende getallen) ----- */
  {id:'tpl_am_optel',p:'amine',v:'rekenen',t:'Optellen & aftrekken',lvl:1,gen:()=>{
    const a=ri(120,899), b=ri(50,500);
    return {q:`Reken uit: ${a} + ${b}`,a:String(a+b),h:['Tel honderdtallen, tientallen en eenheden apart op.'],s:`${a} + ${b} = ${a+b}.`};
  }},
  {id:'tpl_am_aftrek',p:'amine',v:'rekenen',t:'Optellen & aftrekken',lvl:2,gen:()=>{
    const a=ri(400,999), b=ri(50,a-50);
    return {q:`Reken uit: ${a} − ${b}`,a:String(a-b),h:['Tel op vanaf het kleine getal naar het grote.'],s:`${a} − ${b} = ${a-b}.`};
  }},
  {id:'tpl_am_tafel',p:'amine',v:'rekenen',t:'Tafels & keer',lvl:1,gen:()=>{
    const a=ri(2,12), b=ri(2,12);
    return {q:`Reken uit: ${a} × ${b}`,a:String(a*b),h:[`Tafel van ${b}.`],s:`${a} × ${b} = ${a*b}.`};
  }},
  {id:'tpl_am_deel',p:'amine',v:'rekenen',t:'Delen',lvl:2,gen:()=>{
    const b=ri(2,12), q=ri(2,12), a=b*q;
    return {q:`Reken uit: ${a} ÷ ${b}`,a:String(q),h:[`Welk getal × ${b} = ${a}?`],s:`${b} × ${q} = ${a} → ${a} ÷ ${b} = ${q}.`};
  }},
  {id:'tpl_am_procent',p:'amine',v:'rekenen',t:'Procenten',lvl:2,gen:()=>{
    const pct=pick([10,25,50]), getal=pick([20,40,60,80,100,200]), ans=getal*pct/100;
    return {q:`Hoeveel is ${pct}% van ${getal}?`,a:String(ans),
      h:[pct===50?'50% = de helft.':pct===10?'10% = ÷ 10.':'25% = ÷ 4.'],s:`${pct}% van ${getal} = ${ans}.`};
  }},
  {id:'tpl_am_keer10',p:'amine',v:'rekenen',t:'Kommagetallen',lvl:2,gen:()=>{
    const x=pick([1.5,2.3,0.7,3.2,12.5,4.6]);
    return {q:`Reken uit: ${nl(x)} × 10`,a:String(rnd(x*10,2)),h:['× 10 → de komma één plaats naar rechts.'],s:`${nl(x)} × 10 = ${nl(x*10)}.`};
  }},
  {id:'tpl_am_wisselgeld',p:'amine',v:'rekenen',t:'Geld & rekenen',lvl:1,gen:()=>{
    const prijs=ri(1,19);
    return {q:`Je koopt voor € ${prijs} en betaalt met € 20. Hoeveel krijg je terug?`,a:String(20-prijs),u:'€',
      h:['Wisselgeld = betaald − prijs.'],s:`20 − ${prijs} = € ${20-prijs}.`};
  }},
  {id:'tpl_am_maten',p:'amine',v:'rekenen',t:'Meten & maten',lvl:1,gen:()=>{
    const o=pick([['meter',100,'cm'],['kilogram',1000,'gram'],['liter',1000,'ml'],['uur',60,'minuten']]), val=ri(2,9);
    return {q:`Hoeveel ${o[2]} is ${val} ${o[0]}?`,a:String(val*o[1]),h:[`1 ${o[0]} = ${o[1]} ${o[2]}.`],s:`${val} × ${o[1]} = ${val*o[1]} ${o[2]}.`};
  }},
  {id:'tpl_am_verhouding',p:'amine',v:'rekenen',t:'Verhoudingen',lvl:2,gen:()=>{
    const per=ri(2,6), a=ri(2,4), k=pick([2,3,4]), b=a*k;
    return {q:`${a} ${pick(['pennen','appels','stickers','knikkers'])} kosten samen € ${a*per}. Wat kosten ${b} stuks?`,a:String(b*per),u:'€',
      h:[`${b} is ${k}× zoveel als ${a}.`],s:`Per stuk: ${a*per} ÷ ${a} = € ${per}; ${b} × ${per} = € ${b*per}.`};
  }},
  {id:'tpl_am_afronden',p:'amine',v:'rekenen',t:'Afronden & schatten',lvl:1,gen:()=>{
    const n=ri(11,989), r=Math.round(n/10)*10;
    return {q:`Rond af op tientallen: ${n}`,a:String(r),h:['Kijk naar het laatste cijfer: 5 of meer → naar boven.'],s:`${n} → ${r}.`};
  }},
  /* ----- Selma · groep 4 (dit jaar, oneindig oefenen) ----- */
  {id:'tpl_se4_plus',p:'selma',v:'rekenen',t:'Optellen tot 100',lvl:1,gen:()=>{
    const a=ri(10,60), b=ri(2,30);
    return {q:`Reken uit: ${a} + ${b}`,a:String(a+b),h:['Tel eerst de tientallen, dan de eenheden.'],s:`${a} + ${b} = ${a+b}.`};
  }},
  {id:'tpl_se4_min',p:'selma',v:'rekenen',t:'Aftrekken tot 100',lvl:1,gen:()=>{
    const a=ri(30,99), b=ri(2,a-10);
    return {q:`Reken uit: ${a} − ${b}`,a:String(a-b),h:['Haal eerst de tientallen eraf.'],s:`${a} − ${b} = ${a-b}.`};
  }},
  {id:'tpl_se4_tafel',p:'selma',v:'rekenen',t:'Tafels & keer',lvl:1,gen:()=>{
    const a=pick([1,2,3,4,5,10]), b=ri(1,10);
    return {q:`Reken uit: ${a} × ${b}`,a:String(a*b),h:[`Tafel van ${a}.`],s:`${a} × ${b} = ${a*b}.`};
  }},
  {id:'tpl_se4_helft',p:'selma',v:'rekenen',t:'Breuken',lvl:1,gen:()=>{
    const h=ri(2,15), n=h*2;
    return {q:`Wat is de helft van ${n}?`,a:String(h),h:['De helft = ÷ 2.'],s:`${n} ÷ 2 = ${h}.`};
  }},
  /* ----- Selma · groep 5 (oneindig oefenen) ----- */
  {id:'tpl_se_tafel',p:'selma',jaar:'next',v:'rekenen',t:'Tafels & keer',lvl:1,gen:()=>{

  }},
  {id:'tpl_se_deel',p:'selma',jaar:'next',v:'rekenen',t:'Delen',lvl:2,gen:()=>{
    const b=ri(2,10), q=ri(2,10), a=b*q;

  }},
  {id:'tpl_se_plus',p:'selma',jaar:'next',v:'rekenen',t:'Optellen tot 1000',lvl:1,gen:()=>{

  {id:'tpl_se_min',p:'selma',jaar:'next',v:'rekenen',t:'Aftrekken tot 1000',lvl:2,gen:()=>{
    const a=ri(300,999), b=ri(50,a-50);

  }},
  {id:'tpl_se_geld',p:'selma',jaar:'next',v:'rekenen',t:'Geld',lvl:1,gen:()=>{

    return {q:`Je koopt voor € ${prijs} en betaalt met € 10. Hoeveel krijg je terug?`,a:String(10-prijs),u:'€',

  }},
  {id:'tpl_se_maten',p:'selma',jaar:'next',v:'rekenen',t:'Meten & maten',lvl:1,gen:()=>{
    const o=pick([['meter',100,'cm'],['kilogram',1000,'gram'],['liter',1000,'ml']]), val=ri(2,9);
    return {q:`Hoeveel ${o[2]} is ${val} ${o[0]}?`,a:String(val*o[1]),u:o[2],h:[`1 ${o[0]} = ${o[1]} ${o[2]}.`],s:`${val} × ${o[1]} = ${val*o[1]} ${o[2]}.`};
  }},
  {id:'tpl_se_helft',p:'selma',jaar:'next',v:'rekenen',t:'Breuken',lvl:1,gen:()=>{
    const h=ri(3,25), n=h*2;
    return {q:`Wat is de helft van ${n}?`,a:String(h),h:['De helft = ÷ 2.'],s:`${n} ÷ 2 = ${h}.`};
  }},
  {id:'tpl_se_afronden',p:'selma',jaar:'next',v:'rekenen',t:'Getallen tot 1000',lvl:2,gen:()=>{
    const n=ri(110,890), r=Math.round(n/10)*10;
    return {q:`Rond af op tientallen: ${n}`,a:String(r),h:['Kijk naar het laatste cijfer: 5 of meer → naar boven.'],s:`${n} → ${r}.`};
  }},
  {id:'tpl_se_verhouding',p:'selma',jaar:'next',v:'rekenen',t:'Verhoudingstabellen',lvl:2,gen:()=>{
    const per=ri(2,6), a=ri(2,4), k=pick([2,3,4]), b=a*k;
    return {q:`${a} ${pick(['appels','stickers','knikkers','broodjes'])} kosten samen € ${a*per}. Wat kosten ${b} stuks?`,a:String(b*per),u:'€',
      h:[`${b} is ${k}× zoveel als ${a}.`],s:`Per stuk: ${a*per} ÷ ${a} = € ${per}; ${b} × ${per} = € ${b*per}.`};
  }},
  {id:'tpl_se_kommageld',p:'selma',jaar:'next',v:'rekenen',t:'Kommagetallen',lvl:2,gen:()=>{
    const c1=ri(1,8)+0.5, c2=ri(1,8)+0.5;
    return {q:`Reken uit: € ${nl(c1)} + € ${nl(c2)}`,a:String(c1+c2),u:'€',
      h:['Tel de hele euro\'s en de halve euro\'s apart op.'],s:`€ ${nl(c1)} + € ${nl(c2)} = € ${nl(c1+c2)}.`};
  }},
  /* ----- Amaani · exact (oneindig oefenen) ----- */
  {id:'tpl_am_massa',p:'amaani',v:'scheikunde',t:'Rekenen (mol)',lvl:2,gen:()=>{
    const stof=pick([['H2O',18],['CO2',44],['CH4',16],['O2',32],['NaCl',58]]), n=pick([2,3,4,0.5,5]);
    return {q:`Hoeveel gram is ${nl(n)} mol ${stof[0]}? (molaire massa ${stof[1]} g/mol)`,a:String(rnd(n*stof[1],2)),u:'g',
      h:['massa = aantal mol × molaire massa.'],s:`${nl(n)} × ${stof[1]} = ${nl(n*stof[1])} g.`};
  }},
  {id:'tpl_am_pui',p:'amaani',v:'natuurkunde',t:'Elektriciteit',lvl:2,gen:()=>{
    const U=pick([12,24,230]), I=ri(2,8);
    return {q:`Vermogen P = U·I. Bereken P bij U = ${U} V en I = ${I} A.`,a:String(U*I),u:'W',
      h:['P = U × I.'],s:`P = ${U} × ${I} = ${U*I} W.`};
  }},
  {id:'tpl_am_snelheid',p:'amaani',v:'natuurkunde',t:'Kinematica',lvl:2,gen:()=>{

function normalizeProg(p){

function _max(a,b){ return Math.max(a||0,b||0); }
function mergeCards(a,b){ const out={...(a||{})};
  for(const id of Object.keys(b||{})){ const e=out[id], c=b[id];
    out[id]=e? {box:_max(e.box,c.box), ok:_max(e.ok,c.ok), wrong:_max(e.wrong,c.wrong), last:_max(e.last,c.last)} : c; }

function mergeProg(a,b){

  const badges=[...new Set([...(a.badges||[]),...(b.badges||[])])];
  const bseen=new Set(), betalingen=[];
  for(const x of [...(a.betalingen||[]),...(b.betalingen||[])]){ const k=x.d+'|'+x.bedrag; if(!bseen.has(k)){bseen.add(k); betalingen.push(x);} }
  // verdiensten: per dag het hoogste bruto-bedrag (zodat de weekstand niet verloren gaat en op elk toestel gelijk is)
  const vmap={}; for(const x of [...(a.verdiend||[]),...(b.verdiend||[])]){ if(x&&x.d) vmap[x.d]=Math.max(vmap[x.d]||0, x.bedrag||0); }
  const verdiend=Object.keys(vmap).map(d=>({d,bedrag:vmap[d]})).slice(-400);

  const fseen=new Set(), foutLog=[];
  for(const f of [...(a.foutLog||[]),...(b.foutLog||[])].sort((x,y)=>(y.when||0)-(x.when||0))){ if(f&&!fseen.has(f.id)){fseen.add(f.id); foutLog.push(f);} }
  const sameDag=a.dag&&b.dag&&a.dag.d===b.dag.d;
  const dag= sameDag ? {d:a.dag.d, goed:_max(a.dag.goed,b.dag.goed), sterk:_max(a.dag.sterk,b.dag.sterk), sterkPunten:_max(a.dag.sterkPunten,b.dag.sterkPunten), fout:_max(a.dag.fout,b.dag.fout), sterkIds:[...new Set([...(a.dag.sterkIds||[]),...(b.dag.sterkIds||[])])]}
             : (parseDag((a.dag||{}).d)>=parseDag((b.dag||{}).d)? a.dag : b.dag);
  return {...a, ...b,
    punten:_max(a.punten,b.punten), streak:_max(a.streak,b.streak), dagstreak:_max(a.dagstreak,b.dagstreak),
    missieStreak:_max(a.missieStreak,b.missieStreak), weekPunten:_max(a.weekPunten,b.weekPunten),

    todayCount:_max(a.todayCount,b.todayCount), goal:Math.max(a.goal||10,b.goal||10), weekbudget:Math.max(a.weekbudget||0,b.weekbudget||0),
    autoLvl:Math.max(a.autoLvl||1,b.autoLvl||1), niveau:(b.niveau!=='auto'?b.niveau:a.niveau),
    cards:mergeCards(a.cards,b.cards), solved, badges, betalingen:betalingen.slice(-120), verdiend, verdiendBij, bonus, foutLog:foutLog.slice(0,40), dag,
    lastDay:(parseDag(a.lastDay)>=parseDag(b.lastDay)?a.lastDay:b.lastDay),
    betaaldOp:(parseDag(a.betaaldOp)>=parseDag(b.betaaldOp)?a.betaaldOp:b.betaaldOp),
    toetsDag:(parseDag((a.toetsDag||{}).d)>=parseDag((b.toetsDag||{}).d)?a.toetsDag:b.toetsDag)};

function mergeStore(local, cloud){
  local=local||{}; cloud=cloud||{};
  const out={...local}; out.prog={...(local.prog||{})};
  const pids=new Set([...Object.keys(local.prog||{}),...Object.keys(cloud.prog||{})]);
  pids.forEach(pid=>{ out.prog[pid]=mergeProg(local.prog&&local.prog[pid], cloud.prog&&cloud.prog[pid]); });

/* ----- Leitner: slim herhalen ----- */
const BOX_DAGEN=[0,0,1,3,7,16];                                  // wachttijd per doosje (dagen)
function cardInfo(prog,id){return (prog.cards||{})[id]||{box:0,ok:0,wrong:0,last:0};}
function dueTime(c){return (c.last||0) + (BOX_DAGEN[c.box]||0)*86400000;}
function isMastered(prog,id){return cardInfo(prog,id).box>=4;}
function puntenVoor(prog,id,usedHint){return isMastered(prog,id)?3:(usedHint?5:10);}
// Adaptieve analyse: per onderwerp beheersing% + foutenteller → gerangschikte zwakke/sterke onderwerpen
function zwakteAnalyse(prog, allEx, pid){
  const perTopic={};
  allEx.filter(e=>e.p===pid && !e.gen).forEach(e=>{      // vaste opgaven (sjablonen niet per stuk beheersbaar)
    const c=cardInfo(prog,e.id), k=e.v+'|'+e.t;
    const o=(perTopic[k]=perTopic[k]||{v:e.v,t:e.t,total:0,mastered:0,wrong:0,boxSum:0,beg:0,jaar:e.jaar||'nu'});
    o.total++; if(c.box>=4)o.mastered++; o.wrong+=(c.wrong||0); if(c.box>0){o.beg++; o.boxSum+=c.box;}
  });
  const rows=Object.values(perTopic).map(o=>{ const avg=o.beg?o.boxSum/o.beg:0;
    return {v:o.v,t:o.t,jaar:o.jaar,total:o.total,mastered:o.mastered,wrong:o.wrong,beg:o.beg,avg,
      pct:o.total?Math.round(o.mastered/o.total*100):0, score:o.wrong*2+(4-avg)}; });   // score hoger = zwakker
  const geoefend=rows.filter(o=>o.beg>0);
  const zwak=geoefend.filter(o=>o.wrong>0||o.avg<4).sort((a,b)=>b.score-a.score).slice(0,5);
  const sterk=geoefend.filter(o=>o.avg>=4&&o.wrong===0).sort((a,b)=>b.beg-a.beg).slice(0,3);
  return {zwak, sterk, geoefendAantal:geoefend.length};
}
function instOf(card){return card.gen ? {...card.gen(), id:card.id} : card;}
// huidig doelniveau van een kind: vaste keuze (1/2/3) of automatisch (groeit/daalt mee)
function doelNiveau(prog){return (prog&&[1,2,3].includes(prog.niveau)) ? prog.niveau : (prog&&prog.autoLvl)||1;}
// kies de volgende kaart: eerst 'due'/onbekend, laagste doosje, dichtst bij het doelniveau, langst niet gezien
function pickNext(pool, prog, exclude){
  if(!pool||pool.length===0) return null;
  const now=Date.now(), tgt=doelNiveau(prog);
  const near=card=>Math.abs((card.lvl||1)-tgt);
  const cands=pool.map(card=>{const c=cardInfo(prog,card.id);return {card,c,due:c.box===0?0:dueTime(c),isDue:c.box===0||now>=dueTime(c)};});
  // 'exclude' mag een id of een lijst met recent getoonde id's zijn (oud → nieuw).
  // We sluiten zo veel mogelijk recente kaarten uit, en laten de oudste weer toe
  // zodra er anders niets overblijft. Zo herhaalt dezelfde vraag niet snel.
  const recent = exclude==null ? [] : (Array.isArray(exclude)? exclude.slice() : [exclude]);
  let pickFrom=cands;
  for(let drop=0; drop<=recent.length; drop++){
    const blok=new Set(recent.slice(drop));               // laat de oudste 'drop' weer toe
    const f=cands.filter(s=>!blok.has(s.card.id));
    if(f.length){ pickFrom=f; break; }
  }
  const due=pickFrom.filter(s=>s.isDue);
  const set=due.length?due:pickFrom;
  set.sort((a,b)=> (a.c.box-b.c.box) || (near(a.card)-near(b.card)) || ((a.card.lvl||1)-(b.card.lvl||1)) || (a.c.last-b.c.last) || (a.due-b.due));
  const top=set.filter(s=>s.c.box===set[0].c.box && near(s.card)===near(set[0].card)).slice(0,3);
  return pick(top).card;
}

/* ============================ HULP ============================ */
function norm(x){return String(x==null?'':x).toLowerCase().trim().replace(/[−–—]/g,'-').replace(/\s+/g,'').replace(/€|%/g,'').replace(/,/g,'.');}
function checkAnswer(ex,val){
  const cand=[ex.a,...(ex.alt||[])];
  const nv=norm(val); if(nv==='') return false;
  const numV=parseFloat(nv);
  for(const c of cand){
    const nc=norm(c);
    if(nc===nv) return true;
    if(/[\/:]/.test(nc) || /[\/:]/.test(nv)) continue;   // breuken (3/4) en tijden (3:00): alleen exacte match
    const numC=parseFloat(nc);
    if(!isNaN(numC)&&!isNaN(numV)&&Math.abs(numC-numV)<=Math.max(0.01,Math.abs(numC)*0.005)) return true;
  }
  return false;
}
// Gerichte foutfeedback: herkent veelgemaakte fouten en geeft een gerichte tip.
function diagnoseFout(inst,val){
  const nv=norm(val); if(nv==='') return null;
  const numV=parseFloat(nv), numA=parseFloat(norm(inst.a));
  if(isNaN(numV)||isNaN(numA)||numA===0||numV===0) return null;
  if(numV===-numA) return 'Let op het minteken — je antwoord heeft het verkeerde teken (+ of −).';
  const r=numV/numA;
  if(Math.abs(r-3.6)<1e-6 || Math.abs(r-1/3.6)<1e-6) return 'Bijna! Denk aan km/u ↔ m/s: dat is delen (of juist vermenigvuldigen) met 3,6.';
  for(const f of [1000,100,10,0.1,0.01,0.001]) if(Math.abs(r-f)<1e-9)
    return 'Je hebt het juiste getal, maar een factor '+(f>=1?f:'1/'+Math.round(1/f))+' ernaast — controleer de eenheid of de plaats van de komma.';
  if(Math.abs(numV-numA)<=Math.abs(numA)*0.1) return 'Je zit er heel dichtbij — kijk je rekenwerk of afronding nog even na.';
  return null;
}
