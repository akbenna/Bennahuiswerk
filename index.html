<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Oefenapp — Wassima &amp; Amaani</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --primary:#5EA03A; --primary-dark:#48792c; --accent:#C23728;
    --blue:#3a6ea0; --blue-dark:#2c5680;
    --ink:#23271f; --muted:#6b7163; --line:#e6eade; --bg:#f4f7ef; --card:#fff;
    --gold:#e0a23a; --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'DM Sans',-apple-system,Segoe UI,Roboto,sans-serif;
    color:var(--ink); background:var(--bg);
    min-height:100vh; line-height:1.5;
  }
  #root{max-width:760px;margin:0 auto;padding:16px 16px 60px;}
  h1,h2,h3{font-family:'Playfair Display',Georgia,serif;margin:0;}
  button{font-family:inherit;cursor:pointer;border:none;}
  .btn{
    background:var(--primary);color:#fff;border-radius:999px;
    padding:12px 22px;font-size:16px;font-weight:700;transition:transform .08s, filter .15s;
  }
  .btn:active{transform:scale(.97);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line);}
  .btn.accent{background:var(--accent);}
  .btn.gold{background:var(--gold);}
  .btn.sm{padding:8px 16px;font-size:14px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;}
  .row{display:flex;gap:10px;align-items:center;}
  .wrap{display:flex;flex-wrap:wrap;gap:10px;}
  .pill{background:#eef4e7;color:var(--primary-dark);border-radius:999px;padding:4px 12px;font-size:13px;font-weight:600;}
  .muted{color:var(--muted);}
  .center{text-align:center;}
  /* top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:8px;}
  .back{background:none;color:var(--muted);font-size:15px;font-weight:600;padding:6px 4px;}
  .scorechip{display:flex;gap:10px;align-items:center;}
  .scorechip .s{background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-weight:700;font-size:14px;}
  /* profile cards */
  .profcard{
    flex:1;min-width:220px;border-radius:var(--radius);padding:22px;color:#fff;cursor:pointer;
    transition:transform .1s; position:relative;overflow:hidden;
  }
  .profcard:active{transform:scale(.98);}
  .profcard .emoji{font-size:46px;}
  .profcard h2{color:#fff;font-size:26px;margin:6px 0 2px;}
  .profcard .niv{opacity:.92;font-weight:600;}
  .profcard .vakken{margin-top:10px;font-size:13px;opacity:.92;}
  /* topic */
  .topic{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--line);border-radius:var(--radius);background:#fff;margin-bottom:10px;cursor:pointer;transition:transform .08s,border-color .15s;}
  .topic:active{transform:scale(.99);}
  .topic .ico{font-size:26px;width:34px;text-align:center;}
  .topic .grow{flex:1;min-width:0;}
  .topic .tt{font-weight:700;}
  .stars{letter-spacing:2px;font-size:14px;}
  .pbar{height:8px;background:#eef1ea;border-radius:999px;overflow:hidden;margin-top:6px;}
  .pbar > i{display:block;height:100%;background:var(--primary);border-radius:999px;transition:width .4s;}
  /* practice */
  .qbox{font-size:20px;font-weight:500;line-height:1.5;}
  .answerrow{display:flex;gap:10px;margin-top:18px;align-items:stretch;}
  .answerrow input{
    flex:1;font-family:inherit;font-size:20px;padding:14px 16px;border:2px solid var(--line);
    border-radius:14px;outline:none;min-width:0;
  }
  .answerrow input:focus{border-color:var(--primary);}
  .unit{display:flex;align-items:center;padding:0 14px;background:#eef4e7;border-radius:14px;font-weight:700;color:var(--primary-dark);}
  .hint{background:#fff7e8;border:1px solid #f0d9a8;border-left:4px solid var(--gold);border-radius:12px;padding:12px 14px;margin-top:12px;font-size:15px;}
  .hint b{color:#a9741a;}
  .feedback{border-radius:12px;padding:14px 16px;margin-top:14px;font-weight:600;font-size:16px;}
  .feedback.ok{background:#eaf7e2;border:1px solid #b9e3a0;color:#2f6d18;}
  .feedback.no{background:#fdecea;border:1px solid #f3c2bd;color:#9c2b20;}
  .solution{background:#f4f7ef;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-top:12px;font-size:15px;white-space:pre-wrap;}
  .formule{font-family:'Cambria Math',Georgia,serif;font-weight:700;color:var(--primary-dark);background:#eef4e7;border-radius:8px;padding:2px 7px;display:inline-block;}
  /* celebrate */
  @keyframes pop{0%{transform:scale(.4);opacity:0}50%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
  .celebrate{animation:pop .4s ease-out;font-size:56px;text-align:center;}
  @keyframes floatup{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-120px);opacity:0}}
  .confetti{position:fixed;top:40%;left:0;right:0;pointer-events:none;text-align:center;z-index:50;}
  .confetti span{display:inline-block;font-size:30px;margin:0 6px;animation:floatup 1.1s ease-out forwards;}
  /* badges */
  .badge{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px;font-weight:600;}
  .badge.locked{opacity:.4;}
  /* author */
  label.fld{display:block;margin:12px 0 4px;font-weight:600;font-size:14px;}
  input.f,select.f,textarea.f{
    width:100%;font-family:inherit;font-size:15px;padding:10px 12px;border:1.5px solid var(--line);
    border-radius:10px;outline:none;background:#fff;
  }
  input.f:focus,select.f:focus,textarea.f:focus{border-color:var(--primary);}
  textarea.f{min-height:70px;resize:vertical;}
  .pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:16px auto;}
  .pinpad button{font-size:22px;padding:16px;border-radius:14px;background:#fff;border:1.5px solid var(--line);font-weight:700;}
  .pindots{font-size:30px;letter-spacing:10px;text-align:center;height:34px;}
  .exrow{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;font-size:14px;}
  .tag{font-size:11px;background:#eef1ea;border-radius:6px;padding:2px 6px;font-weight:600;color:var(--muted);}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useMemo,useRef} = React;

/* ============================ CONFIG ============================ */
const PROFILES = {

SEED.forEach((e,i)=> e.id = 'seed_'+i);

/* ============================ STORE (localStorage) ============================ */
const KEY='oefenapp_v1';
function loadStore(){
  try{const r=JSON.parse(localStorage.getItem(KEY)); if(r) return r;}catch(e){}
  return {custom:[], pin:'1234', prog:{wassima:blankProg(), amaani:blankProg()}};
}
function blankProg(){return {punten:0, solved:{}, streak:0, dagstreak:0, lastDay:null, badges:[]};}
function saveStore(s){localStorage.setItem(KEY, JSON.stringify(s));}

/* ============================ HULP ============================ */
function norm(x){return String(x==null?'':x).toLowerCase().trim().replace(/\s+/g,'').replace(/€|%/g,'').replace(/,/g,'.');}
function checkAnswer(ex,val){
  const cand=[ex.a,...(ex.alt||[])];
  const nv=norm(val); if(nv==='') return false;
  const numV=parseFloat(nv);
  for(const c of cand){
    const nc=norm(c);
    if(nc===nv) return true;
    const numC=parseFloat(nc);
    if(!isNaN(numC)&&!isNaN(numV)&&Math.abs(numC-numV)<=Math.max(0.01,Math.abs(numC)*0.005)) return true;
  }
  return false;
}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function yesterdayStr(){const d=new Date();d.setDate(d.getDate()-1);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}

const BADGES=[
  {id:'p50', emoji:'⭐', naam:'50 punten', test:p=>p.punten>=50},
  {id:'p150',emoji:'🌟', naam:'150 punten',test:p=>p.punten>=150},
  {id:'p300',emoji:'🏆', naam:'300 punten',test:p=>p.punten>=300},
  {id:'s5',  emoji:'🔥', naam:'5 op rij goed',test:p=>p.streak>=5},
  {id:'d3',  emoji:'📅', naam:'3 dagen op rij',test:p=>p.dagstreak>=3},
];

/* ============================ APP ============================ */
function App(){
  const [store,setStore]=useState(loadStore);
  const [view,setView]=useState('home');      // home | hub | practice | author
  const [profile,setProfile]=useState(null);
  const [vak,setVak]=useState(null);
  const [topic,setTopic]=useState(null);

  const persist=(updater)=>setStore(prev=>{const next=typeof updater==='function'?updater(prev):updater; saveStore(next); return next;});

  const allEx=useMemo(()=>[...SEED, ...store.custom],[store.custom]);

  // dagstreak bijwerken bij kiezen profiel
  function openProfile(pid){
    persist(prev=>{
      const pr={...(prev.prog[pid]||blankProg())};
      const today=todayStr();
      if(pr.lastDay!==today){
        pr.dagstreak = (pr.lastDay===yesterdayStr())? (pr.dagstreak||0)+1 : 1;
        pr.lastDay=today;
      }
      return {...prev, prog:{...prev.prog,[pid]:pr}};
    });
    setProfile(pid); setVak(PROFILES[pid].vakken[0]); setView('hub');
  }

  function recordResult(pid, ex, correct, usedHint){
    persist(prev=>{
      const pr={...(prev.prog[pid]||blankProg())};
      pr.solved={...pr.solved};
      if(correct){
        const gain=usedHint?5:10;
        pr.punten=(pr.punten||0)+gain;
        pr.streak=(pr.streak||0)+1;
        const cur=pr.solved[ex.id]||{ok:0};
        pr.solved[ex.id]={ok:cur.ok+1};
      }else{
        pr.streak=0;
      }
      // badges
      pr.badges=[...(pr.badges||[])];
      BADGES.forEach(b=>{if(!pr.badges.includes(b.id)&&b.test(pr)) pr.badges.push(b.id);});
      return {...prev, prog:{...prev.prog,[pid]:pr}};
    });
  }

  const prog = profile? (store.prog[profile]||blankProg()) : null;

  return (
    <div>
      {view==='home' && <Home onPick={openProfile} store={store} onAuthor={()=>setView('author')} onFormules={()=>setView('formules')}/>}
      {view==='formules' && <FormulesView onBack={()=>setView('home')}/>}
      {view==='hub' && <Hub profile={profile} prog={prog} vak={vak} setVak={setVak} allEx={allEx}
        onBack={()=>setView('home')} onTopic={(t)=>{setTopic(t);setView('practice');}}/>}
      {view==='practice' && <Practice profile={profile} vak={vak} topic={topic} allEx={allEx}
        onBack={()=>setView('hub')} onResult={recordResult} prog={prog}/>}
      {view==='author' && <Author store={store} persist={persist} onBack={()=>setView('home')}/>}
    </div>
  );
}

/* ---------- HUB (vak + onderwerpen) ---------- */
function Hub({profile,prog,vak,setVak,allEx,onBack,onTopic}){
  const P=PROFILES[profile];
  const topics=useMemo(()=>{
    const list=allEx.filter(e=>e.p===profile&&e.v===vak);
    const map={};
    list.forEach(e=>{(map[e.t]=map[e.t]||[]).push(e);});
    return Object.entries(map).map(([t,exs])=>{
      const solved=exs.filter(e=>(prog.solved[e.id]||{}).ok>0).length;
      return {t, total:exs.length, solved};
    });
  },[allEx,profile,vak,prog]);

  return (
    <div>
      <div className="topbar">
        <button className="back" onClick={onBack}>← terug</button>
        <div className="scorechip">
          <span className="s">⭐ {prog.punten||0}</span>
          <span className="s">🔥 {prog.streak||0}</span>
          <span className="s">📅 {prog.dagstreak||0}</span>
        </div>
      </div>
      <h1 style={{fontSize:26}}>{P.emoji} {P.naam}</h1>
      <div className="wrap" style={{margin:'12px 0 18px'}}>
        {P.vakken.map(v=>(
          <button key={v} className={'btn sm '+(v===vak?'':'ghost')} onClick={()=>setVak(v)}>{VAKNAAM[v]}</button>
        ))}
      </div>

      {topics.map(({t,total,solved})=>{
        const pct=total?Math.round(solved/total*100):0;
        const sterren=pct>=100?'⭐⭐⭐':pct>=60?'⭐⭐':pct>0?'⭐':'☆☆☆';
        return (
          <div key={t} className="topic" onClick={()=>onTopic(t)}>
            <div className="ico">{TOPICICON[t]||'📘'}</div>
            <div className="grow">
              <div className="tt">{t}</div>
              <div className="muted" style={{fontSize:13}}>{solved} / {total} gedaan · <span className="stars">{sterren}</span></div>
              <div className="pbar"><i style={{width:pct+'%'}}></i></div>
            </div>
            <div>›</div>
          </div>
        );
      })}

      <div className="card" style={{marginTop:18}}>
        <b>Badges</b>
        <div className="wrap" style={{marginTop:10}}>
          {BADGES.map(b=>(
            <span key={b.id} className={'badge '+(prog.badges.includes(b.id)?'':'locked')}>{b.emoji} {b.naam}</span>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ---------- PRACTICE ---------- */
function Practice({profile,vak,topic,allEx,onBack,onResult,prog}){
  const pool=useMemo(()=>{
    return allEx.filter(e=>e.p===profile&&e.v===vak&&e.t===topic)
      .sort((a,b)=>(a.lvl||1)-(b.lvl||1));
  },[allEx,profile,vak,topic]);

  const [idx,setIdx]=useState(0);
  const [val,setVal]=useState('');
  const [hintN,setHintN]=useState(0);
  const [state,setState]=useState('open');   // open | goed | fout
  const [showSol,setShowSol]=useState(false);
  const [tries,setTries]=useState(0);
  const [celebrate,setCelebrate]=useState(false);
  const inputRef=useRef(null);

  const ex=pool[idx];
  useEffect(()=>{setVal('');setHintN(0);setState('open');setShowSol(false);setTries(0);
    setTimeout(()=>inputRef.current&&inputRef.current.focus(),50);},[idx,topic]);

  if(!ex) return (<div><button className="back" onClick={onBack}>← terug</button><p className="muted">Nog geen opgaven hier.</p></div>);

  function controleer(){
    if(state==='goed') return;
    const ok=checkAnswer(ex,val);
    setTries(t=>t+1);
    if(ok){
      setState('goed');
      onResult(profile,ex,true,hintN>0);
      setCelebrate(true); setTimeout(()=>setCelebrate(false),1100);
    }else{
      setState('fout');
      onResult(profile,ex,false,false);
    }
  }
  function volgende(){ if(idx+1<pool.length) setIdx(idx+1); else setIdx(0); }

  const isLast=idx+1>=pool.length;

  return (
    <div>
      {celebrate && <div className="confetti"><span>🎉</span><span>⭐</span><span>🎊</span><span>✨</span><span>👏</span></div>}
      <div className="topbar">
        <button className="back" onClick={onBack}>← terug</button>
        <div className="scorechip">
          <span className="s">⭐ {prog.punten||0}</span>
          <span className="s">🔥 {prog.streak||0}</span>
        </div>
      </div>
      <div className="row" style={{justifyContent:'space-between',marginBottom:10}}>
        <span className="pill">{topic}</span>
        <span className="muted" style={{fontSize:13}}>vraag {idx+1} / {pool.length} · niveau {ex.lvl||1}</span>
      </div>

      <div className="card">
        <div className="qbox">{ex.q}</div>
        <div className="answerrow">
          <input ref={inputRef} className="" value={val} placeholder="jouw antwoord"
            onChange={e=>{setVal(e.target.value); if(state==='fout') setState('open');}}
            onKeyDown={e=>{if(e.key==='Enter') controleer();}}
            disabled={state==='goed'} inputMode="text"/>
          {ex.u && <div className="unit">{ex.u}</div>}
        </div>

        {state==='goed' && <div className="feedback ok celebrate">✅ Goed gedaan! +{hintN>0?5:10} punten</div>}
        {state==='fout' && <div className="feedback no">Nog niet — kijk nog eens, of open een hint. Je kunt het! 💪</div>}

        {hintN>0 && ex.h && ex.h.slice(0,hintN).map((h,i)=>(
          <div key={i} className="hint"><b>Hint {i+1}:</b> {h}</div>
        ))}

        {showSol && <div className="solution"><b>Uitwerking</b>{"\n"}{ex.s}</div>}

        <div className="wrap" style={{marginTop:16}}>
          {state!=='goed' && <button className="btn" onClick={controleer}>Nakijken</button>}
          {state!=='goed' && ex.h && hintN<ex.h.length && <button className="btn gold sm" onClick={()=>setHintN(hintN+1)}>💡 Hint</button>}
          {state!=='goed' && (tries>=1) && !showSol && <button className="btn ghost sm" onClick={()=>setShowSol(true)}>Toon uitwerking</button>}
          {state==='goed' && <button className="btn" onClick={volgende}>{isLast?'Opnieuw vanaf 1 →':'Volgende →'}</button>}
          {state==='goed' && !showSol && <button className="btn ghost sm" onClick={()=>setShowSol(true)}>Bekijk uitwerking</button>}
        </div>
      </div>

      <p className="muted center" style={{marginTop:16,fontSize:13}}>
        Eerst zelf proberen = 10 punten · met hint = 5 punten 🌟
      </p>
    </div>
  );
}

/* ---------- AUTHOR (ouder-modus, PIN) ---------- */
function Author({store,persist,onBack}){
  const [unlocked,setUnlocked]=useState(false);
  const [pin,setPin]=useState('');
  const [form,setForm]=useState({p:'wassima',v:'wiskunde',t:'',lvl:'1',q:'',a:'',u:'',h1:'',h2:'',s:''});
  const [msg,setMsg]=useState('');
  const [impText,setImpText]=useState('');

  function tryPin(p){
    const np=(pin+p).slice(0,4); setPin(np);
    if(np.length===4){ if(np===store.pin){setUnlocked(true);} else {setMsg('Onjuiste PIN'); setTimeout(()=>{setPin('');setMsg('');},700);} }
  }

  if(!unlocked){
    return (
      <div>
        <button className="back" onClick={onBack}>← terug</button>
        <div className="center" style={{marginTop:30}}>
          <h2>Ouder-modus</h2>
          <p className="muted">Voer de PIN in (standaard 1234)</p>
          <div className="pindots">{'●'.repeat(pin.length)}{'○'.repeat(4-pin.length)}</div>
          {msg && <div style={{color:'var(--accent)',fontWeight:600}}>{msg}</div>}
          <div className="pinpad">
            {['1','2','3','4','5','6','7','8','9'].map(n=><button key={n} onClick={()=>tryPin(n)}>{n}</button>)}
            <button onClick={()=>setPin('')}>C</button>
            <button onClick={()=>tryPin('0')}>0</button>
            <button onClick={()=>setPin(pin.slice(0,-1))}>⌫</button>
          </div>
        </div>
      </div>
    );
  }

  const vakkenVoor = PROFILES[form.p].vakken;
  const bestaandeTopics = [...new Set([...SEED,...store.custom].filter(e=>e.p===form.p&&e.v===form.v).map(e=>e.t))];

  function voegToe(){
    if(!form.q.trim()||!form.a.trim()||!form.t.trim()){setMsg('Vul minstens onderwerp, vraag en antwoord in.');return;}
    const ex={id:'cust_'+Date.now(), p:form.p, v:form.v, t:form.t.trim(), lvl:Number(form.lvl)||1,
      q:form.q.trim(), a:form.a.trim(), u:form.u.trim()||undefined,
      h:[form.h1.trim(),form.h2.trim()].filter(Boolean), s:form.s.trim()||'(geen uitwerking toegevoegd)'};
    persist(prev=>({...prev, custom:[...prev.custom, ex]}));
    setForm({...form,t:form.t,q:'',a:'',u:'',h1:'',h2:'',s:''});
    setMsg('✅ Opgave toegevoegd — staat meteen klaar voor '+PROFILES[form.p].naam+'.');
    setTimeout(()=>setMsg(''),2500);
  }
  function verwijder(id){persist(prev=>({...prev, custom:prev.custom.filter(e=>e.id!==id)}));}
  function exporteer(){
    const blob=new Blob([JSON.stringify(store.custom,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='oefeningen-export.json'; a.click();
  }
  function importeer(){
    try{const arr=JSON.parse(impText); if(!Array.isArray(arr)) throw 0;
      persist(prev=>({...prev, custom:[...prev.custom, ...arr]}));
      setImpText(''); setMsg('✅ '+arr.length+' opgaven geïmporteerd.'); setTimeout(()=>setMsg(''),2500);
    }catch(e){setMsg('Kon JSON niet lezen.');}
  }

  return (
    <div>
      <div className="topbar"><button className="back" onClick={onBack}>← terug</button><span className="pill">Ouder-modus</span></div>
      <h2>Nieuwe opdracht toevoegen</h2>

      <div className="card" style={{marginTop:12}}>
        <div className="row" style={{gap:10}}>
          <div style={{flex:1}}>
            <label className="fld">Voor wie</label>
            <select className="f" value={form.p} onChange={e=>{const p=e.target.value;setForm({...form,p,v:PROFILES[p].vakken[0]});}}>
              {Object.entries(PROFILES).map(([id,p])=><option key={id} value={id}>{p.naam} ({p.niveau})</option>)}
            </select>
          </div>
          <div style={{flex:1}}>
            <label className="fld">Vak</label>
            <select className="f" value={form.v} onChange={e=>setForm({...form,v:e.target.value})}>
              {vakkenVoor.map(v=><option key={v} value={v}>{VAKNAAM[v]}</option>)}
            </select>
          </div>
        </div>
        <div className="row" style={{gap:10}}>
          <div style={{flex:2}}>
            <label className="fld">Onderwerp</label>
            <input className="f" list="tlist" value={form.t} onChange={e=>setForm({...form,t:e.target.value})} placeholder="bijv. Procenten"/>
            <datalist id="tlist">{bestaandeTopics.map(t=><option key={t} value={t}/>)}</datalist>
          </div>
          <div style={{flex:1}}>
            <label className="fld">Niveau</label>
            <select className="f" value={form.lvl} onChange={e=>setForm({...form,lvl:e.target.value})}>
              <option value="1">1 (makkelijk)</option><option value="2">2 (middel)</option><option value="3">3 (moeilijk)</option>
            </select>
          </div>
        </div>
        <label className="fld">Vraag</label>
        <textarea className="f" value={form.q} onChange={e=>setForm({...form,q:e.target.value})} placeholder="Typ hier de opgave…"/>
        <div className="row" style={{gap:10}}>
          <div style={{flex:2}}>
            <label className="fld">Antwoord</label>
            <input className="f" value={form.a} onChange={e=>setForm({...form,a:e.target.value})} placeholder="bijv. 30"/>
          </div>
          <div style={{flex:1}}>
            <label className="fld">Eenheid (optioneel)</label>
            <input className="f" value={form.u} onChange={e=>setForm({...form,u:e.target.value})} placeholder="bijv. cm²"/>
          </div>
        </div>
        <label className="fld">Hint 1 (optioneel)</label>
        <input className="f" value={form.h1} onChange={e=>setForm({...form,h1:e.target.value})}/>
        <label className="fld">Hint 2 (optioneel)</label>
        <input className="f" value={form.h2} onChange={e=>setForm({...form,h2:e.target.value})}/>
        <label className="fld">Uitwerking (stap voor stap)</label>
        <textarea className="f" value={form.s} onChange={e=>setForm({...form,s:e.target.value})} placeholder="Laat de tussenstappen zien…"/>
        {msg && <div style={{marginTop:12,fontWeight:600,color:'var(--primary-dark)'}}>{msg}</div>}
        <div style={{marginTop:14}}><button className="btn" onClick={voegToe}>+ Opgave toevoegen</button></div>
      </div>

      <h3 style={{marginTop:24}}>Mijn toegevoegde opgaven ({store.custom.length})</h3>
      <div style={{marginTop:10}}>
        {store.custom.length===0 && <p className="muted">Nog niets toegevoegd.</p>}
        {store.custom.map(e=>(
          <div key={e.id} className="exrow">
            <div className="grow" style={{flex:1}}>
              <span className="tag">{PROFILES[e.p].naam}</span> <span className="tag">{VAKNAAM[e.v]}</span> <span className="tag">{e.t}</span>
              <div style={{marginTop:4}}>{e.q}</div>
              <div className="muted" style={{fontSize:13}}>antwoord: {e.a} {e.u||''}</div>
            </div>
            <button className="btn accent sm" onClick={()=>verwijder(e.id)}>verwijder</button>
          </div>
        ))}
      </div>

      <div className="card" style={{marginTop:20}}>
        <b>Opslaan &amp; delen (back-up)</b>
        <p className="muted" style={{fontSize:13,marginTop:6}}>De opgaven staan in deze browser. Exporteer ze om te bewaren of op het apparaat van je dochter te zetten.</p>
        <div className="wrap" style={{marginTop:8}}>
          <button className="btn ghost sm" onClick={exporteer}>⬇️ Exporteer naar bestand</button>
        </div>
        <label className="fld">Importeren — plak hier een eerder geëxporteerde JSON</label>
        <textarea className="f" value={impText} onChange={e=>setImpText(e.target.value)} placeholder='[ {"p":"wassima", ...} ]'/>
        <div style={{marginTop:8}}><button className="btn ghost sm" onClick={importeer} disabled={!impText.trim()}>⬆️ Importeren</button></div>
      </div>
    </div>
  );
}

          <div style={{marginTop:8}}>
            {blok.items.map(([naam,f])=>(
              <div key={naam} style={{display:'flex',gap:10,alignItems:'baseline',padding:'5px 0',borderTop:'1px solid var(--line)'}}>
                <div style={{flex:'0 0 38%',fontWeight:600,fontSize:14}}>{naam}</div>
                <div className="formule" style={{flex:1,fontSize:14}}>{f}</div>
              </div>
            ))}
          </div>
        </div>
      ))}

      <p className="muted center" style={{marginTop:16,fontSize:13}}>
        Tip: leer formules niet uit je hoofd door staren — schrijf ze één keer over en hoor jezelf elke dag 5 minuten één blokje over. 🌟
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
