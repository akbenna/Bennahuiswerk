<style>
  :root{
    --primary:#5EA03A; --primary-dark:#48792c; --accent:#C23728;
    --blue:#3a6ea0; --blue-dark:#2c5680;
    --ink:#23271f; --muted:#6b7163; --line:#e6eade; --bg:#f4f7ef; --card:#fff;
    --gold:#e0a23a; --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'DM Sans',-apple-system,Segoe UI,Roboto,sans-serif;
    color:var(--ink); background:var(--bg);
    min-height:100vh; line-height:1.5;
  }
  #root{max-width:760px;margin:0 auto;padding:16px 16px 60px;}
  h1,h2,h3{font-family:'Playfair Display',Georgia,serif;margin:0;}
  button{font-family:inherit;cursor:pointer;border:none;}
  .btn{
    background:var(--primary);color:#fff;border-radius:999px;
    padding:12px 22px;font-size:16px;font-weight:700;transition:transform .08s, filter .15s;
  }
  .btn:active{transform:scale(.97);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line);}
  .btn.accent{background:var(--accent);}
  .btn.gold{background:var(--gold);}
  .btn.sm{padding:8px 16px;font-size:14px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;}
  .row{display:flex;gap:10px;align-items:center;}
  .wrap{display:flex;flex-wrap:wrap;gap:10px;}
  .pill{background:#eef4e7;color:var(--primary-dark);border-radius:999px;padding:4px 12px;font-size:13px;font-weight:600;}
  .muted{color:var(--muted);}
  .center{text-align:center;}
  /* top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:8px;}
  .back{background:none;color:var(--muted);font-size:15px;font-weight:600;padding:6px 4px;}
  .scorechip{display:flex;gap:10px;align-items:center;}
  .scorechip .s{background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-weight:700;font-size:14px;}
  /* profile cards */
  .profcard{
    flex:1;min-width:220px;border-radius:var(--radius);padding:22px;color:#fff;cursor:pointer;
    transition:transform .1s; position:relative;overflow:hidden;
  }
  .profcard:active{transform:scale(.98);}
  .profcard .emoji{font-size:46px;}
  .profcard h2{color:#fff;font-size:26px;margin:6px 0 2px;}
  .profcard .niv{opacity:.92;font-weight:600;}
  .profcard .vakken{margin-top:10px;font-size:13px;opacity:.92;}
  /* topic */
  .topic{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--line);border-radius:var(--radius);background:#fff;margin-bottom:10px;cursor:pointer;transition:transform .08s,border-color .15s;}
  .topic:active{transform:scale(.99);}
  .topic .ico{font-size:26px;width:34px;text-align:center;}
  .topic .grow{flex:1;min-width:0;}
  .topic .tt{font-weight:700;}
  .stars{letter-spacing:2px;font-size:14px;}
  .pbar{height:8px;background:#eef1ea;border-radius:999px;overflow:hidden;margin-top:6px;}
  .pbar > i{display:block;height:100%;background:var(--primary);border-radius:999px;transition:width .4s;}
  /* practice */
  .qbox{font-size:20px;font-weight:500;line-height:1.5;white-space:pre-wrap;}
  .answerrow{display:flex;gap:10px;margin-top:18px;align-items:stretch;}
  .answerrow input{
    flex:1;font-family:inherit;font-size:20px;padding:14px 16px;border:2px solid var(--line);
    border-radius:14px;outline:none;min-width:0;
  }
  .answerrow input:focus{border-color:var(--primary);}
  .unit{display:flex;align-items:center;padding:0 14px;background:#eef4e7;border-radius:14px;font-weight:700;color:var(--primary-dark);}
  /* meerkeuze */
  .optiegrid{display:flex;flex-direction:column;gap:9px;margin-top:16px;}
  .optiebtn{text-align:left;padding:13px 16px;border:2px solid var(--line);border-radius:13px;background:#fff;font-size:17px;font-weight:500;transition:transform .06s,border-color .15s;}
  .optiebtn:active{transform:scale(.99);}
  .optiebtn.sel{border-color:var(--primary);background:#eef4e7;font-weight:700;}
  .optiebtn:disabled{opacity:.6;cursor:not-allowed;}
  .hint{background:#fff7e8;border:1px solid #f0d9a8;border-left:4px solid var(--gold);border-radius:12px;padding:12px 14px;margin-top:12px;font-size:15px;}
  .hint b{color:#a9741a;}
  .feedback{border-radius:12px;padding:14px 16px;margin-top:14px;font-weight:600;font-size:16px;}
  .feedback.ok{background:#eaf7e2;border:1px solid #b9e3a0;color:#2f6d18;}
  .feedback.no{background:#fdecea;border:1px solid #f3c2bd;color:#9c2b20;}
  .solution{background:#f4f7ef;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-top:12px;font-size:15px;white-space:pre-wrap;}
  .formule{font-family:'Cambria Math',Georgia,serif;font-weight:700;color:var(--primary-dark);background:#eef4e7;border-radius:8px;padding:2px 7px;display:inline-block;}

  @keyframes pop{0%{transform:scale(.4);opacity:0}50%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
  .celebrate{animation:pop .4s ease-out;font-size:56px;text-align:center;}
  @keyframes floatup{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-120px);opacity:0}}
  .confetti{position:fixed;top:40%;left:0;right:0;pointer-events:none;text-align:center;z-index:50;}
  .confetti span{display:inline-block;font-size:30px;margin:0 6px;animation:floatup 1.1s ease-out forwards;}
  /* badges */
  .badge{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px;font-weight:600;}
  .badge.locked{opacity:.4;}
  /* author */
  label.fld{display:block;margin:12px 0 4px;font-weight:600;font-size:14px;}
  input.f,select.f,textarea.f{
    width:100%;font-family:inherit;font-size:15px;padding:10px 12px;border:1.5px solid var(--line);

  .pindots{font-size:30px;letter-spacing:10px;text-align:center;height:34px;}
  .exrow{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;font-size:14px;}

/* ============================ THEMA'S (motivatie) ============================ */
/* Per profiel een thema. Amine = voetbal/game: XP, rangen, doelpunten, voetbal-feedback. */
const THEMES = {
  standaard: {
    xp: 'punten',
    doel: 'sommen',
    goal: '✅ Goed gedaan!',
    feest: ['🎉', '⭐', '🎊', '✨', '👏'],
    rangen: [[0, 'Starter', '🌱'], [100, 'Op dreef', '⭐'], [250, 'Kanjer', '🌟'], [500, 'Uitblinker', '🏅'], [900, 'Ster', '💫'], [1400, 'Meester', '🎓'], [2000, 'Kampioen', '🏆'], [3000, 'Legende', '👑']]
  },
  voetbal: {
    xp: 'XP',
    doel: 'doelpunten',
    goal: '⚽ GOAL!',
    feest: ['⚽', '🥅', '🎉', '🔥', '👟'],
    rangen: [[0, 'Pupil', '⚽'], [100, 'Talent', '🌟'], [250, 'Basisspeler', '👕'], [500, 'Uitblinker', '⭐'], [900, 'Aanvoerder', '🎽'], [1400, 'Topscorer', '🥅'], [2000, 'Kampioen', '🏆'], [3000, 'Legende', '👑']]
  }
};
function themaVan(pid) {
  return THEMES[PROFILES[pid] && PROFILES[pid].thema || 'standaard'] || THEMES.standaard;
}
function rangVoor(thema, punten) {
  const r = thema.rangen;
  let i = 0;
  for (let k = 0; k < r.length; k++) {
    if (punten >= r[k][0]) i = k;
  }
  const huidig = r[i],
    volgende = r[i + 1] || null;
  const naar = volgende ? volgende[0] - punten : 0;
  const basis = huidig[0],
    top = volgende ? volgende[0] : huidig[0];
  const pct = volgende ? Math.round((punten - basis) / (top - basis) * 100) : 100;
  return {
    naam: huidig[1],
    emoji: huidig[2],
    volgendeNaam: volgende ? volgende[1] : null,
    naar,
    pct
  };
}

/* ==================== EERLIJKE BELONING (zakgeld, alleen meiden) ====================
   De app rekent zélf uit wat een sessie eerlijk waard is; de ouder betaalt pas uit.
   Alleen ÉCHT bewezen prestatie telt:
   - alleen 'sterk goed' = eerste keer, zónder hint, op een som die nog niet beheerst was;
   - een nauwkeurigheidspoort tegen gok-/haastwerk (te veel fouten → geen of half tarief);
   - een bonus als een oefentoets/proeftoets écht gehaald is (klaar voor de toets);
   - een dagplafond (standaard € 20) zodat het eerlijk en begrensd blijft.               */
const BELONING = {
  dagMax: 20,
  tarief: 0.40,
  werkMax: 12,
  drempel: 12,
  oefenBonus: 4,
  proefBonus: 8,
  hoog: 0.85,
  mid: 0.70
};
function euro(n) {
  return '€ ' + (Math.round(n * 2) / 2).toFixed(2).replace('.', ',');
}

/* ---- Geluid: korte, zelfgemaakte tonen (Web Audio, geen bestanden, werkt offline) ---- */
let _actx = null;
function speel(kind, aan) {
  if (!aan) return;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    _actx = _actx || new AC();
    const ac = _actx,
      t0 = ac.currentTime;
    if (ac.state === 'suspended') ac.resume();
    const noten = kind === 'goed' ? [[660, 0], [990, 0.10]] : [[220, 0]];
    noten.forEach(([f, dt]) => {
      const o = ac.createOscillator(),
        g = ac.createGain();
      o.type = kind === 'goed' ? 'sine' : 'square';
      o.frequency.value = f;
      const dur = kind === 'goed' ? 0.18 : 0.26;
      g.gain.setValueAtTime(0.0001, t0 + dt);
      g.gain.exponentialRampToValueAtTime(0.14, t0 + dt + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dt + dur);
      o.connect(g);
      g.connect(ac.destination);
      o.start(t0 + dt);
      o.stop(t0 + dt + dur + 0.02);
    });
  } catch (e) {}
}
function mmss(sec) {
  const m = Math.floor(sec / 60),
    s = sec % 60;
  return m + ':' + (s < 10 ? '0' : '') + s;
}
function berekenBeloning(pr) {
  const d = pr.dag || {},
    t = pr.toetsDag || {};
  const goed = d.goed || 0,
    fout = d.fout || 0,
    sterk = d.sterk || 0;
  const pogingen = goed + fout;
  const nauw = pogingen ? goed / pogingen : 0;
  const genoeg = pogingen >= BELONING.drempel;
  let factor = 0,
    poort = '';
  if (!genoeg) {
    poort = 'Doe eerst minstens ' + BELONING.drempel + ' sommen om mee te tellen.';
  } else if (nauw >= BELONING.hoog) {
    factor = 1;
    poort = 'Top nauwkeurig 💯 — vol tarief';
  } else if (nauw >= BELONING.mid) {
    factor = 0.5;
    poort = 'Redelijk — half tarief. Werk nog wat rustiger.';
  } else {
    factor = 0;
    poort = 'Te veel fouten — dit telt nog niet. Rustig en goed = beloning.';
  }
  const werkEuro = Math.min(BELONING.werkMax, sterk * BELONING.tarief) * factor;
  const proef = t.proef || 0,
    oefen = t.oefen || 0;
  const toetsEuro = proef >= 80 ? BELONING.proefBonus : oefen >= 80 ? BELONING.oefenBonus : 0;
  const bedrag = Math.min(BELONING.dagMax, Math.round((werkEuro + toetsEuro) * 2) / 2);
  const betaald = pr.betaaldOp === todayStr();
  return {
    bedrag,
    nauw,
    genoeg,
    factor,
    poort,
    sterk,
    goed,
    fout,
    pogingen,
    werkEuro: Math.round(werkEuro * 2) / 2,
    toetsEuro,
    proef,
    oefen,
    betaald
  };
}

/* Elke sjabloon-som krijgt bij elke beurt nieuwe getallen, zodat de méthode geoefend wordt
   en niet het antwoord uit het hoofd geleerd wordt. gen() levert {q,a,alt?,u?,h,s,ill?}. */
function ri(a, b) {
  return Math.floor(Math.random() * (b - a + 1)) + a;
}
function pick(a) {
  return a[Math.floor(Math.random() * a.length)];
}
function shuffle(a) {
  a = a.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const t = a[i];
    a[i] = a[j];
    a[j] = t;
  }
  return a;
}
function rnd(x, d) {
  const f = Math.pow(10, d === undefined ? 2 : d);
  return Math.round(x * f) / f;
}
function nl(x) {
  return String(rnd(x, 3)).replace('.', ',');
} // Nederlandse komma voor weergave
function pm(b) {
  return b >= 0 ? '+ ' + b : '− ' + -b;
} // teken voor in formules
